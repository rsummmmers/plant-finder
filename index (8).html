<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plant Palette Finder — Summers Gardening</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fafaf7; font-family: Georgia, serif; color: #2c2c2c; }
    @media print {
      .no-print { display: none !important; }
      .print-card { break-inside: avoid; }
      body { background: white; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useMemo, useEffect, useCallback } = React;

  const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRiUGIg_9Eqv8Uwgp__RzcAJqNcB5vq7MHTbY1ZMqoEVtgNVlxo4CtocWgvztvQwUEzXOmMvjgP5UGA/pub?output=csv&gid=1137105758";

  const MICROZONES = [
    { key:"Mesic South- Facing Heat", label:"South-Facing / Heat",  emoji:"☀️",  desc:"Hot, dry, south-facing slope or pavement edge" },
    { key:"Dry Upper Slope",          label:"Dry Upper Slope",       emoji:"🏔️", desc:"Elevated, exposed, drains fast" },
    { key:"Mid-Slope Mesic",          label:"Mid-Slope / Typical",   emoji:"🌿",  desc:"Average suburban yard, moderate moisture" },
    { key:"Moist Lower Area",         label:"Moist Lower Area",      emoji:"💧",  desc:"Low spot, rain garden, holds moisture" },
    { key:"Woodland Edge",            label:"Woodland Edge",         emoji:"🌳",  desc:"Where lawn meets trees; dappled light" },
    { key:"Conifer Shade",            label:"Conifer Shade",         emoji:"🌲",  desc:"Under pine or hemlock; dry, acidic, dark" },
    { key:"Dry Slope",                label:"Dry Slope",             emoji:"⛰️", desc:"Sloped, drains quickly, lean soil" },
  ];
  const ZONE_KEYS = MICROZONES.map(z => z.key);

  const ALL_SITES = [
    ...MICROZONES,
    { key:"white-pine",        label:"Under white pines",   emoji:"🌲", desc:"Dry, acidic, needle-carpeted understory" },
    { key:"norway-maple",      label:"Under Norway maple",  emoji:"🍁", desc:"Dense dry shade with allelopathic roots" },
    { key:"post-construction", label:"Post-construction",   emoji:"🏗️", desc:"Compacted, disturbed, or fill soil" },
  ];

  const SCORE_LABELS = ["","Don't Use","Marginal","OK","Strong","Best Fit"];
  const SCORE_COLORS = ["#ccc","#ef5350","#ff9800","#fdd835","#66bb6a","#2e7d32"];

  const STATUS_COLORS = {
    "Native":                    { bg:"#e8f5e9", text:"#2e7d32", label:"Native" },
    "Native Cultivar":           { bg:"#f3e5f5", text:"#6a1b9a", label:"Native Cultivar" },
    "Near-Native":               { bg:"#e3f2fd", text:"#1565c0", label:"Near-Native" },
    "Near Native":               { bg:"#e3f2fd", text:"#1565c0", label:"Near-Native" },
    "Safe Non-Native":           { bg:"#fff8e1", text:"#f57f17", label:"Safe Non-Native" },
    "Safe Non Native":           { bg:"#fff8e1", text:"#f57f17", label:"Safe Non-Native" },
    "Native/Non-Native Hybrid":  { bg:"#fce4ec", text:"#880e4f", label:"Hybrid" },
    "Native / Nonnative Hybrid": { bg:"#fce4ec", text:"#880e4f", label:"Hybrid" },
  };

  // Plant type groupings — coarse filter groups
  const PLANT_TYPE_GROUPS = [
    { key:"woody",    label:"Woody",              tooltip:"Trees & shrubs — plants with permanent stems", emoji:"🌳",
      cats: new Set(["Tree - Large","Tree - Small","Tall Canopy Tree","Midstory Tree","Shrub","Shrub – Large","Shrub – Small","Flowering Shrub","Broadleaf Evergreen"]) },
    { key:"perennial",label:"Perennials",         emoji:"🌼",
      cats: new Set(["Flowering Perennial","Foliage Perennial","Annual"]) },
    { key:"grass",    label:"Grasses & sedges",   emoji:"🌾",
      cats: new Set(["Grass"]) },
    { key:"fern",     label:"Ferns",              emoji:"🌿",
      cats: new Set(["Fern"]) },
    { key:"ground",   label:"Groundcovers",       emoji:"🍀",
      cats: new Set(["Groundcover"]) },
    { key:"vine",     label:"Vines",              emoji:"🌿",
      cats: new Set(["Vine"]) },
  ];

  function getPlantTypeKey(category) {
    for (const g of PLANT_TYPE_GROUPS) {
      if (g.cats.has(category)) return g.key;
    }
    return "perennial"; // fallback
  }

  const CATEGORY_ICONS = {
    "Tree - Large":        { emoji:"🌳", bg:"#e8f5e9", fg:"#2e7d32" },
    "Tree - Small":        { emoji:"🌲", bg:"#e8f5e9", fg:"#388e3c" },
    "Tall Canopy Tree":    { emoji:"🌳", bg:"#e8f5e9", fg:"#1b5e20" },
    "Midstory Tree":       { emoji:"🌿", bg:"#f1f8e9", fg:"#558b2f" },
    "Shrub":               { emoji:"🌾", bg:"#fff8e1", fg:"#f57f17" },
    "Shrub – Large":       { emoji:"🌾", bg:"#fff8e1", fg:"#e65100" },
    "Shrub – Small":       { emoji:"🌾", bg:"#fff8e1", fg:"#f57f17" },
    "Flowering Shrub":     { emoji:"🌸", bg:"#fce4ec", fg:"#c2185b" },
    "Flowering Perennial": { emoji:"🌼", bg:"#fffde7", fg:"#f9a825" },
    "Foliage Perennial":   { emoji:"🍃", bg:"#e8f5e9", fg:"#388e3c" },
    "Groundcover":         { emoji:"🌿", bg:"#e8f5e9", fg:"#2e7d32" },
    "Grass":               { emoji:"🌾", bg:"#f9fbe7", fg:"#827717" },
    "Fern":                { emoji:"🌿", bg:"#e0f2f1", fg:"#00695c" },
    "Broadleaf Evergreen": { emoji:"🍀", bg:"#e8f5e9", fg:"#1b5e20" },
    "Vine":                { emoji:"🌿", bg:"#f3e5f5", fg:"#6a1b9a" },
    "Annual":              { emoji:"🌻", bg:"#fff8e1", fg:"#f57f17" },
  };

  const WOODY_CATS = new Set(["Tree - Large","Tree - Small","Tall Canopy Tree","Midstory Tree","Shrub","Shrub – Large","Shrub – Small","Flowering Shrub","Broadleaf Evergreen","Vine"]);

  const COLOR_MAP = {
    white:"#ffffff", cream:"#fffdd0", yellow:"#fdd835", orange:"#ff9800",
    red:"#ef5350", pink:"#f48fb1", rose:"#e91e63", magenta:"#e040fb",
    purple:"#9c27b0", lavender:"#ce93d8", blue:"#42a5f5", violet:"#7e57c2",
    maroon:"#880e4f", green:"#66bb6a", "yellow-green":"#cddc39",
    "blue-gray":"#90a4ae", silver:"#cfd8dc", "dark green":"#1b5e20",
    "lime green":"#cddc39", "variegated green/white":"#c8e6c9",
    burgundy:"#6d1f1f", bronze:"#cd7f32", gold:"#ffc107", "blue-green":"#00695c",
  };

  // ── URL state ──────────────────────────────────────────────────────────────
  function readURL() {
    const p = new URLSearchParams(window.location.search);
    return {
      mode:      p.get("mode")     || "browse",
      label:     p.get("label")    || "",
      // Browse
      bzone:     p.get("bzone")    || null,
      bsearch:   p.get("bq")       || "",
      bwpine:    p.get("bwpine")   === "1",
      bnorway:   p.get("bnorway")  === "1",
      bwalnut:   p.get("bwalnut")  === "1",
      // Shared result filters
      statuses:  p.get("statuses") ? p.get("statuses").split(",") : ["native","nearnative"],
      ptypes:    p.get("ptypes")   ? p.get("ptypes").split(",")   : [],
      heightCap: p.get("hcap")     ? parseFloat(p.get("hcap"))    : null,
      rscore:    parseInt(p.get("rscore") || "3"),
      rflower:   p.get("rflower")  ? p.get("rflower").split(",")  : [],
      rfoliage:  p.get("rfoliage") ? p.get("rfoliage").split(",") : [],
      rwinter:   p.get("rwinter")  === "1",
      // Property profile
      psite:     p.get("psite")    || null,
      psun:      p.get("psun")     || null,
      pmoisture: p.get("pmoisture")|| null,
      pirrigated:p.get("pirrigated")==="1",
      pwpine:    p.get("pwpine")   === "1",
      pnorway:   p.get("pnorway")  === "1",
      pwalnut:   p.get("pwalnut")  === "1",
      ppostcon:  p.get("ppostcon") === "1",
      pdeer:     p.get("pdeer")    === "1",
      prabbits:  p.get("prabbits") === "1",
      pdogs:     p.get("pdogs")    === "1",
      pcats:     p.get("pcats")    === "1",
      pchildren: p.get("pchildren")=== "1",
      pspread:   p.get("pspread")  === "1",
      pdone:     p.get("pdone")    === "1",
      // Habitat
      hheight:   p.get("hheight")  || "any",
      hsun:      p.get("hsun")     || null,
      hmoisture: p.get("hmoisture")|| null,
      hnearnat:  p.get("hnearnat") === "1",
      hwpine:    p.get("hwpine")   === "1",
      hnorway:   p.get("hnorway")  === "1",
      hwalnut:   p.get("hwalnut")  === "1",
    };
  }

  function pushURL(s) {
    const p = new URLSearchParams();
    const set = (k,v,def) => { if(v && v!==def) p.set(k,String(v)); };
    set("mode",s.mode,"browse"); set("label",s.label,"");
    set("bzone",s.bzone,""); set("bq",s.bsearch,"");
    if(s.bwpine)  p.set("bwpine","1");
    if(s.bnorway) p.set("bnorway","1");
    if(s.bwalnut) p.set("bwalnut","1");
    // Only encode statuses if non-default
    const defStatus = ["native","nearnative"];
    if(JSON.stringify(s.statuses?.slice().sort()) !== JSON.stringify(defStatus.slice().sort()))
      p.set("statuses",s.statuses?.join(","));
    if(s.ptypes?.length)  p.set("ptypes",s.ptypes.join(","));
    if(s.heightCap)       p.set("hcap",String(s.heightCap));
    if(s.rscore&&s.rscore!==3) p.set("rscore",String(s.rscore));
    if(s.rflower?.length)  p.set("rflower",s.rflower.join(","));
    if(s.rfoliage?.length) p.set("rfoliage",s.rfoliage.join(","));
    if(s.rwinter) p.set("rwinter","1");
    set("psite",s.psite,""); set("psun",s.psun,""); set("pmoisture",s.pmoisture,"");
    if(s.pirrigated) p.set("pirrigated","1");
    if(s.pwpine)  p.set("pwpine","1"); if(s.pnorway) p.set("pnorway","1");
    if(s.pwalnut) p.set("pwalnut","1"); if(s.ppostcon) p.set("ppostcon","1");
    if(s.pdeer)    p.set("pdeer","1"); if(s.prabbits) p.set("prabbits","1");
    if(s.pdogs)    p.set("pdogs","1"); if(s.pcats)    p.set("pcats","1");
    if(s.pchildren)p.set("pchildren","1"); if(s.pspread) p.set("pspread","1");
    if(s.pdone)    p.set("pdone","1");
    if(s.hheight&&s.hheight!=="any") p.set("hheight",s.hheight);
    set("hsun",s.hsun,""); set("hmoisture",s.hmoisture,"");
    if(s.hnearnat) p.set("hnearnat","1"); if(s.hwpine)  p.set("hwpine","1");
    if(s.hnorway)  p.set("hnorway","1"); if(s.hwalnut) p.set("hwalnut","1");
    const str = p.toString();
    window.history.replaceState(null,"",str?`${window.location.pathname}?${str}`:window.location.pathname);
  }

  // ── Data ──────────────────────────────────────────────────────────────────
  function parseCSV(text) {
    const lines = text.split(/\r?\n/); if(!lines.length) return [];
    function pl(line) {
      const out=[]; let f=""; let q=false;
      for(let i=0;i<line.length;i++) {
        const c=line[i];
        if(c==='"'){if(q&&line[i+1]==='"'){f+='"';i++;}else q=!q;}
        else if(c===','&&!q){out.push(f);f="";}else f+=c;
      } out.push(f); return out;
    }
    const headers=pl(lines[0]); const rows=[];
    for(let i=1;i<lines.length;i++) {
      if(!lines[i].trim()) continue;
      const vals=pl(lines[i]); const row={};
      headers.forEach((h,idx)=>{row[h.trim()]=(vals[idx]||"").trim();});
      rows.push(row);
    } return rows;
  }

  function rowToPlant(row) {
    const scores={};
    ZONE_KEYS.forEach(k=>{const m=(row[k]||"").match(/\d/);scores[k]=m?parseInt(m[0]):0;});
    if(!Object.values(scores).some(s=>s>0)) return null;
    const curatedImg = row["curated image url"]||"";
    const inatImg    = row["inaturalist image url"]||"";
    return {
      common:        row["Common Name"]          ||"",
      latin:         row["Latin Name"]           ||"",
      category:      row["Category"]             ||"",
      status:        row["Ecological Status"]    ||"",
      bloom:         row["Bloom Period"]         ||"",
      seasonal:      row["Seasonal Interest"]    ||"",
      evergreen:     row["Evergreen"]            ||"",
      height:        row["Height Class"]         ||"",
      heightFt:      parseFloat(row["Max Height (ft)"])||0,
      sun:           row["Sun Exposure"]         ||"",
      moisture:      row["Moisture Preference"]  ||"",
      notes:         row["Notes"]                ||"",
      image:         curatedImg || inatImg,
      curatedImage:  curatedImg,
      role:          row["Habitat Patch Role"]   ||"",
      aggressive:    row["Aggressive"]           ||"",
      flowerColor:   row["Flower Color"]         ||"",
      foliageColor:  row["Foliage Color"]        ||"",
      deerPressure:  row["deer_pressure"]        ||"",
      rabbitDamage:  row["rabbit_damage"]        ||"",
      toxicDogs:     row["toxic_dogs"]           ||"",
      toxicCats:     row["toxic_cats"]           ||"",
      toxicChildren: row["toxic_children"]       ||"",
      juglone:       row["juglone_sensitivity"]  ||"",
      whitePine:     row["white_pine_tolerance"] ||"",
      norwayMaple:   row["norway_maple_tolerance"]||"",
      seedStart:     row["seed_ripe_start"]      ||"",
      seedEnd:       row["seed_ripe_end"]        ||"",
      seedNotes:     row["seed_notes"]           ||"",
      propagNotes:   row["propagation_notes"]    ||"",
      caterpillars:  parseInt(row["caterpillar_species"])||0,
      insectConf:    row["insect_data_confidence"]||"",
      isCultivar:    (row["Ecological Status"]||"").includes("Cultivar"),
      isWoody:       WOODY_CATS.has(row["Category"]||""),
      typeKey:       getPlantTypeKey(row["Category"]||""),
      scores,
    };
  }

  function getSiteScore(plant,key) {
    if(!key) return null;
    if(ZONE_KEYS.includes(key)) return plant.scores[key]||0;
    if(key==="white-pine")   { if(plant.whitePine==="avoid"||!plant.whitePine)return 0; const b=plant.scores["Conifer Shade"]||0; return plant.whitePine==="tolerant"?Math.min(5,b+1):b; }
    if(key==="norway-maple") { if(plant.norwayMaple==="avoid"||!plant.norwayMaple)return 0; const b=plant.scores["Conifer Shade"]||0; return plant.norwayMaple==="tolerant"?Math.min(5,b+1):b; }
    if(key==="black-walnut") { if(plant.juglone==="sensitive")return 0; return Math.max(plant.scores["Mid-Slope Mesic"]||0,plant.scores["Woodland Edge"]||0); }
    if(key==="post-construction") return Math.max(plant.scores["Dry Upper Slope"]||0,plant.scores["Dry Slope"]||0);
    return 0;
  }

  // Status filter matching
  function matchesStatus(plant, statuses) {
    if(!statuses||!statuses.length) return true;
    const s = plant.status.toLowerCase();
    if(statuses.includes("native") && s==="native") return true;
    if(statuses.includes("cultivar") && s.includes("cultivar")) return true;
    if(statuses.includes("nearnative") && (s==="near-native"||s==="near native")) return true;
    if(statuses.includes("nonnative") && (s==="safe non-native"||s==="safe non native"||s.includes("hybrid"))) return true;
    return false;
  }

  function applySharedFilters(plants, siteKey, f) {
    return plants.filter(p => {
      if(!matchesStatus(p, f.statuses)) return false;
      if(f.ptypes?.length && !f.ptypes.includes(p.typeKey)) return false;
      if(f.heightCap && p.heightFt > f.heightCap) return false;
      if(siteKey && f.rscore > 3 && (getSiteScore(p,siteKey)||0) < f.rscore) return false;
      if(f.rwinter) { const w=(p.seasonal||"").toLowerCase().includes("winter")||(p.evergreen||"").toLowerCase()==="yes"; if(!w)return false; }
      if(f.rflower?.length) { const cols=p.flowerColor.split(/\s*[|]\s*/).map(c=>c.trim().toLowerCase()); if(!f.rflower.some(rc=>cols.includes(rc)))return false; }
      if(f.rfoliage?.length) { const cols=p.foliageColor.split(/\s*[|]\s*/).map(c=>c.trim().toLowerCase()); if(!f.rfoliage.some(rc=>cols.includes(rc)))return false; }
      return true;
    });
  }

  function applyProfileFilters(plants, profile) {
    return plants.filter(p => {
      if(profile.psite) {
        const s = getSiteScore(p, profile.psite);
        if(s < 3) return false;
        if(profile.psite==="norway-maple" && (p.norwayMaple==="avoid"||!p.norwayMaple)) return false;
        if(profile.psite==="white-pine" && p.whitePine==="avoid") return false;
      }
      if(profile.psun) {
        const sun = (p.sun||"").toLowerCase();
        // If irrigated, relax sun slightly
        if(profile.psun==="full"  && !sun.startsWith("full sun")) return false;
        if(profile.psun==="shade" && !sun.includes("shade"))      return false;
        if(profile.psun==="part"  && !sun.includes("part"))       return false;
      }
      if(profile.pmoisture) {
        const m = (p.moisture||"").toLowerCase();
        // Irrigated shifts one tier wetter
        const eff = profile.pirrigated
          ? (profile.pmoisture==="dry" ? "average" : profile.pmoisture==="average" ? "moist" : "moist")
          : profile.pmoisture;
        if(eff==="dry"     && !m.includes("dry") && m!=="mesic") return false;
        if(eff==="moist"   && !m.includes("moist") && !m.includes("wet")) return false;
        if(eff==="average" && !m.includes("mesic")) return false;
      }
      if(profile.pwpine  && (p.whitePine==="avoid"||!p.whitePine))   return false;
      if(profile.pnorway && (p.norwayMaple==="avoid"||!p.norwayMaple)) return false;
      if(profile.pwalnut && p.juglone==="sensitive")                   return false;
      if(profile.ppostcon && (getSiteScore(p,"post-construction")||0)<3) return false;
      if(profile.pdeer    && p.deerPressure==="high")  return false;
      if(profile.prabbits && p.rabbitDamage==="high")  return false;
      if(profile.pdogs    && p.toxicDogs==="yes")      return false;
      if(profile.pcats    && p.toxicCats==="yes")      return false;
      if(profile.pchildren&& p.toxicChildren==="yes")  return false;
      if(profile.pspread  && p.aggressive==="Y")       return false;
      return true;
    });
  }

  // ── Small UI pieces ────────────────────────────────────────────────────────
  function PlantImage({plant,size=48,radius=8}) {
    const[failed,setFailed]=useState(false);
    const cat=CATEGORY_ICONS[plant.category]||{emoji:"🌿",bg:"#f0ede4",fg:"#4a7c59"};
    if(!plant.image||failed) return(
      <div style={{width:size,height:size,borderRadius:radius,flexShrink:0,background:cat.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <div style={{fontSize:size*0.38,lineHeight:1}}>{cat.emoji}</div>
        <div style={{fontSize:size*0.18,fontWeight:"bold",color:cat.fg}}>{plant.common.charAt(0)}</div>
      </div>
    );
    return <img src={plant.image} alt={plant.common} onError={()=>setFailed(true)} style={{width:size,height:size,borderRadius:radius,objectFit:"cover",flexShrink:0}} />;
  }

  function ColorDots({colorStr,size=10}) {
    if(!colorStr) return null;
    return <div style={{display:"flex",gap:3,flexWrap:"wrap",alignItems:"center"}}>{colorStr.split(/\s*[|]\s*/).map(c=>c.trim()).filter(Boolean).map((c,i)=><div key={i} title={c} style={{width:size,height:size,borderRadius:"50%",background:COLOR_MAP[c]||"#ccc",border:c==="white"?"1px solid #ccc":"none",flexShrink:0}} />)}</div>;
  }

  function RiskBadges({plant}) {
    const b=[];
    if(plant.deerPressure==="high")  b.push({t:"🦌 High deer pressure", bg:"#fff3e0",fg:"#e65100"});
    if(plant.rabbitDamage==="high")  b.push({t:"🐇 High rabbit damage", bg:"#fff3e0",fg:"#bf360c"});
    if(plant.aggressive==="Y")       b.push({t:"🌿 Fills space well",   bg:"#e8f5e9",fg:"#2e7d32"});
    if(plant.toxicDogs==="yes")      b.push({t:"🐕 Toxic to dogs",      bg:"#fce4ec",fg:"#c62828"});
    if(plant.toxicCats==="yes")      b.push({t:"🐈 Toxic to cats",      bg:"#fce4ec",fg:"#c62828"});
    if(plant.toxicChildren==="yes")  b.push({t:"👶 Toxic to children",  bg:"#fce4ec",fg:"#c62828"});
    if(!b.length) return null;
    return <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:8}}>{b.map((x,i)=><span key={i} style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:x.bg,color:x.fg,fontWeight:"bold"}}>{x.t}</span>)}</div>;
  }

  // ── Photo gallery ──────────────────────────────────────────────────────────
  function taxonQ(latin) {
    return latin.replace(/['''][^''']*[''']/g,"").replace(/\bcultivars?\b/ig,"")
      .replace(/\bhybrids?\b/ig,"").replace(/\bspp?\b/ig,"").replace(/\bvar\b.*/ig,"")
      .replace(/[×x]\s+/g,"").trim().split(/\s+/).slice(0,2).join(" ");
  }

  function PhotoGallery({latin,fallbackImage,curatedImage}) {
    const[photos,setPhotos]=useState(null);
    const[idx,setIdx]=useState(0);

    useEffect(()=>{
      if(photos!==null) return;
      // If curated image exists, use it as first photo but still fetch more
      const name = taxonQ(latin);
      if(!name){
        setPhotos(curatedImage?[{thumb:curatedImage,medium:curatedImage,large:curatedImage,credit:"Curated photo"}]:[]);
        return;
      }
      fetch(`https://api.inaturalist.org/v1/observations?taxon_name=${encodeURIComponent(name)}&quality_grade=research&photos=true&per_page=5&order_by=votes`)
        .then(r=>r.json())
        .then(d=>{
          const imgs=[];
          if(curatedImage) imgs.push({thumb:curatedImage,medium:curatedImage,large:curatedImage,credit:"Curated photo"});
          (d.results||[]).forEach(obs=>{
            (obs.photos||[]).forEach(ph=>{
              if(imgs.length>=5) return;
              const medium=(ph.url||"").replace("square","medium");
              if(!medium.includes("http")) return;
              // Don't duplicate curated image
              if(medium===curatedImage) return;
              imgs.push({thumb:ph.url||"",medium,large:(ph.url||"").replace("square","large"),credit:(ph.attribution||"").replace(/\(c\)/g,"©")});
            });
          });
          if(!imgs.length&&fallbackImage) imgs.push({thumb:fallbackImage,medium:fallbackImage,large:fallbackImage,credit:""});
          setPhotos(imgs); setIdx(0);
        })
        .catch(()=>setPhotos(curatedImage?[{thumb:curatedImage,medium:curatedImage,large:curatedImage,credit:""}]:fallbackImage?[{thumb:fallbackImage,medium:fallbackImage,large:fallbackImage,credit:""}]:[]));
    },[latin]);

    if(photos===null) return(
      <div style={{width:220,height:180,borderRadius:10,background:"#f0ede4",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <span style={{fontSize:11,color:"#aaa",fontStyle:"italic"}}>Loading photos…</span>
      </div>
    );
    if(!photos.length) return <PlantImage plant={{image:"",common:latin,category:""}} size={120} radius={10} />;
    const cur=photos[idx];
    return(
      <div style={{flexShrink:0,width:220}}>
        {/* No new window — just show full size inline on click */}
        <img src={cur.medium} alt={latin} onError={e=>{e.target.src=cur.thumb;}}
          style={{width:"100%",height:180,objectFit:"cover",borderRadius:10,display:"block"}} />
        {photos.length>1&&(
          <div style={{display:"flex",gap:5,marginTop:6,overflowX:"auto",paddingBottom:2}}>
            {photos.map((ph,i)=>(
              <img key={i} src={ph.thumb} alt="" onClick={()=>setIdx(i)}
                onError={e=>e.target.style.opacity="0.2"}
                style={{width:36,height:36,borderRadius:5,objectFit:"cover",flexShrink:0,
                  cursor:"pointer",border:`2px solid ${i===idx?"#2d4a2d":"transparent"}`,
                  opacity:i===idx?1:0.55,transition:"opacity 0.15s"}} />
            ))}
          </div>
        )}
        {cur.credit&&cur.credit!=="Curated photo"&&(
          <div style={{fontSize:9,color:"#bbb",marginTop:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
            {cur.credit.length>72?cur.credit.slice(0,72)+"…":cur.credit}
          </div>
        )}
        <div style={{fontSize:9,color:"#ccc",marginTop:1}}>via iNaturalist · {photos.length} photo{photos.length!==1?"s":""}</div>
      </div>
    );
  }

  // ── Seed section ───────────────────────────────────────────────────────────
  function SeedSection({plant}) {
    const[open,setOpen]=useState(false);
    const has = plant.seedStart||plant.seedNotes||plant.propagNotes;
    if(!has) return null;
    return(
      <div style={{marginTop:10}}>
        <button onClick={e=>{e.stopPropagation();setOpen(!open);}}
          style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#2d4a2d",fontFamily:"inherit",padding:0}}>
          <span style={{fontSize:14}}>🌱</span>
          <span style={{fontWeight:"bold"}}>{open?"▲ Hide":"▼ Seed & propagation"}</span>
        </button>
        {open&&(
          <div style={{marginTop:8,padding:"10px 12px",background:"#f0faf0",borderRadius:8,fontSize:12,lineHeight:1.6,color:"#444"}}>
            {plant.seedStart&&plant.seedEnd&&<div style={{marginBottom:6}}><span style={{color:"#888"}}>Seeds ripe: </span><span style={{fontWeight:"bold"}}>{plant.seedStart}–{plant.seedEnd}</span></div>}
            {plant.seedNotes&&<div style={{marginBottom:plant.propagNotes?8:0}}><span style={{color:"#888"}}>Collecting: </span>{plant.seedNotes}</div>}
            {plant.propagNotes&&<div><span style={{color:"#888"}}>Propagation: </span>{plant.propagNotes}</div>}
          </div>
        )}
      </div>
    );
  }

  // ── Plant card ─────────────────────────────────────────────────────────────
  function PlantCard({plant,siteKey}) {
    const[open,setOpen]=useState(false);
    const score = siteKey ? getSiteScore(plant,siteKey) : null;
    const ss = STATUS_COLORS[plant.status]||{bg:"#f5f5f5",text:"#555",label:plant.status};
    return(
      <div className="print-card" style={{background:"white",border:"1px solid #e0ddd5",borderRadius:10,overflow:"hidden",boxShadow:open?"0 4px 16px rgba(0,0,0,0.08)":"none"}}>
        <div onClick={()=>setOpen(!open)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",cursor:"pointer"}}>
          {score!==null&&<div style={{background:SCORE_COLORS[score],color:score>=3?"white":"#333",borderRadius:8,minWidth:56,textAlign:"center",padding:"4px 6px",flexShrink:0}}>
            <div style={{fontSize:15,fontWeight:"bold",letterSpacing:-1}}>{"●".repeat(score)}</div>
            <div style={{fontSize:9,opacity:0.85,lineHeight:1}}>{SCORE_LABELS[score]}</div>
          </div>}
          <PlantImage plant={plant} size={48} radius={8} />
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:"bold",fontSize:15}}>{plant.common}</div>
            <div style={{fontSize:12,color:"#888",fontStyle:"italic",marginBottom:3}}>{plant.latin}</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>
              <span style={{background:ss.bg,color:ss.text,fontSize:10,padding:"2px 7px",borderRadius:10,fontWeight:"bold"}}>{ss.label}</span>
              <span style={{background:"#f0ede4",color:"#666",fontSize:10,padding:"2px 7px",borderRadius:10}}>{plant.category}</span>
              {plant.flowerColor&&<ColorDots colorStr={plant.flowerColor} size={9} />}
            </div>
          </div>
          <span className="no-print" style={{color:"#aaa",fontSize:18,flexShrink:0}}>{open?"▲":"▼"}</span>
        </div>
        {open&&(
          <div style={{padding:"0 14px 16px",borderTop:"1px solid #f0ede4"}}>
            <div style={{display:"flex",gap:16,marginTop:12,flexWrap:"wrap"}}>
              <PhotoGallery latin={plant.latin} fallbackImage={plant.image} curatedImage={plant.curatedImage} />
              <div style={{flex:1,minWidth:200}}>
                {plant.notes&&<p style={{margin:"0 0 10px",fontSize:14,lineHeight:1.5,color:"#444"}}>{plant.notes}</p>}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"5px 12px",fontSize:12}}>
                  {plant.sun&&<div><span style={{color:"#888"}}>Sun: </span>{plant.sun}</div>}
                  {plant.moisture&&<div><span style={{color:"#888"}}>Moisture: </span>{plant.moisture}</div>}
                  {plant.heightFt?<div><span style={{color:"#888"}}>Height: </span>{plant.heightFt} ft</div>:plant.height?<div><span style={{color:"#888"}}>Height: </span>{plant.height}</div>:null}
                  {plant.bloom&&plant.bloom!=="N/A"&&<div><span style={{color:"#888"}}>Bloom: </span>{plant.bloom}</div>}
                  {plant.seasonal&&<div><span style={{color:"#888"}}>Interest: </span>{plant.seasonal}</div>}
                  {plant.role&&<div><span style={{color:"#888"}}>Role: </span>{plant.role}</div>}
                  {plant.aggressive&&<div><span style={{color:"#888"}}>Spreads: </span>{plant.aggressive==="Y"?"🌿 Fills space well":plant.aggressive==="M"?"Moderately":"Stays put"}</div>}
                  {plant.deerPressure&&<div><span style={{color:"#888"}}>Deer: </span>{plant.deerPressure}</div>}
                  {plant.rabbitDamage&&<div><span style={{color:"#888"}}>Rabbit: </span>{plant.rabbitDamage}</div>}
                  {plant.flowerColor&&<div style={{display:"flex",alignItems:"center",gap:6}}><span style={{color:"#888"}}>Flower: </span><ColorDots colorStr={plant.flowerColor} size={11} /></div>}
                  {plant.foliageColor&&<div style={{display:"flex",alignItems:"center",gap:6}}><span style={{color:"#888"}}>Foliage: </span><ColorDots colorStr={plant.foliageColor} size={11} /></div>}
                  {plant.caterpillars>0&&(()=>{
                    const n=plant.caterpillars;
                    const lbl=plant.insectConf==="estimated"?`~${n}`:`${n}`;
                    const col=n>=100?"#2e7d32":n>=20?"#f57f17":"#999";
                    return <div style={{gridColumn:"1/-1"}}><span style={{color:"#888"}}>🦋 Caterpillar host: </span><span style={{color:col,fontWeight:"bold"}}>{lbl} species</span>{plant.insectConf==="estimated"&&<span style={{color:"#ccc",fontSize:10}}> est.</span>}</div>;
                  })()}
                </div>
                <RiskBadges plant={plant} />
                <SeedSection plant={plant} />
              </div>
            </div>
            {siteKey&&ZONE_KEYS.includes(siteKey)&&(
              <div style={{marginTop:14}}>
                <div style={{fontSize:11,letterSpacing:1,textTransform:"uppercase",color:"#aaa",marginBottom:6}}>Suitability across all zones</div>
                <div style={{display:"flex",flexDirection:"column",gap:3}}>
                  {MICROZONES.map(z=>{const s=plant.scores[z.key]||0;return(
                    <div key={z.key} style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{fontSize:11,width:150,color:z.key===siteKey?"#2d4a2d":"#666",fontWeight:z.key===siteKey?"bold":"normal"}}>{z.emoji} {z.label}</div>
                      <div style={{flex:1,height:6,background:"#f0ede4",borderRadius:3,overflow:"hidden"}}><div style={{width:`${(s/5)*100}%`,height:"100%",background:SCORE_COLORS[s],borderRadius:3}} /></div>
                      <div style={{fontSize:10,color:"#aaa",width:50}}>{SCORE_LABELS[s]}</div>
                    </div>

                </div>
              </div>
            )}
          </div>
        )}
      </div>
    );
  }

  // ── Shared filter bar (plant type + height + status) ────────────────────────
  function SharedFilterBar({plants, filters, onChange, siteKey}) {
    const[openColor,setOpenColor]=useState(false);
    const[statusOpen,setStatusOpen]=useState(false);

    const flowerColors=useMemo(()=>{const c={};plants.forEach(p=>p.flowerColor.split(/\s*[|]\s*/).forEach(x=>{const t=x.trim().toLowerCase();if(t&&COLOR_MAP[t])c[t]=(c[t]||0)+1;}));return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,12).map(([x])=>x);},[plants]);
    const foliageColors=useMemo(()=>{const c={};plants.forEach(p=>p.foliageColor.split(/\s*[|]\s*/).forEach(x=>{const t=x.trim().toLowerCase();if(t&&COLOR_MAP[t])c[t]=(c[t]||0)+1;}));return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([x])=>x);},[plants]);

    const togglePtype = key => onChange({...filters, ptypes: filters.ptypes?.includes(key)?filters.ptypes.filter(x=>x!==key):[...(filters.ptypes||[]),key]});
    const toggleStatus = key => {
      const cur = filters.statuses||[];
      onChange({...filters, statuses: cur.includes(key)?cur.filter(x=>x!==key):[...cur,key]});
    };
    const toggleColor = (field,c) => {
      const cur = filters[field]||[];
      onChange({...filters,[field]:cur.includes(c)?cur.filter(x=>x!==c):[...cur,c]});
    };

    const STATUS_OPTIONS = [
      {key:"native",   label:"Native",           bg:"#e8f5e9",fg:"#2e7d32"},
      {key:"cultivar", label:"Native Cultivar",  bg:"#f3e5f5",fg:"#6a1b9a"},
      {key:"nearnative",label:"Near-Native",     bg:"#e3f2fd",fg:"#1565c0"},
      {key:"nonnative",label:"Safe Non-Native",  bg:"#fff8e1",fg:"#f57f17"},
    ];

    const activeFilters = (filters.ptypes?.length||0)+(filters.heightCap?1:0)+(filters.rwinter?1:0)+
      (filters.rflower?.length||0)+(filters.rfoliage?.length||0)+(filters.rscore>3?1:0);

    return(
      <div className="no-print" style={{background:"white",border:"1px solid #e0ddd5",borderRadius:10,padding:"12px 14px",marginBottom:10}}>
        {/* Plant type pills */}
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10,alignItems:"center"}}>
          <span style={{fontSize:11,color:"#aaa",marginRight:2}}>Show:</span>
          {PLANT_TYPE_GROUPS.map(g=>{
            const active=filters.ptypes?.includes(g.key);
            return(
              <button key={g.key} onClick={()=>togglePtype(g.key)}
                title={g.tooltip||g.label}
                style={{display:"flex",alignItems:"center",gap:4,padding:"4px 11px",borderRadius:20,border:`1px solid ${active?"#2d4a2d":"#e0ddd5"}`,background:active?"#2d4a2d":"transparent",color:active?"white":"#555",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>
                {g.emoji} {g.label}
                {g.key==="woody"&&<span style={{fontSize:9,opacity:0.6,marginLeft:2}} title="Trees & shrubs — plants with permanent stems">ⓘ</span>}
              </button>
            );
          })}
          {filters.ptypes?.length>0&&<button onClick={()=>onChange({...filters,ptypes:[]})} style={{fontSize:11,color:"#aaa",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>✕ all</button>}
        </div>

        {/* Height cap + status + more */}
        <div style={{display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}}>
          {/* Height cap */}
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:12,color:"#666"}}>Max height:</span>
            <div style={{position:"relative"}}>
              <input
                type="number" min="1" max="120"
                value={filters.heightCap||""}
                onChange={e=>{const v=parseFloat(e.target.value);onChange({...filters,heightCap:v>0?v:null});}}
                placeholder="e.g. 8 for shrubs, 25 for small trees"
                style={{border:"1px solid #ddd",borderRadius:6,padding:"4px 8px",fontSize:12,fontFamily:"inherit",width:filters.heightCap?80:220,outline:"none"}}
              />
              {filters.heightCap&&<button onClick={()=>onChange({...filters,heightCap:null})} style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#aaa"}}>✕</button>}
            </div>
            {filters.heightCap&&<span style={{fontSize:11,color:"#888"}}>ft</span>}
          </div>

          <div style={{width:1,height:18,background:"#e0ddd5"}} />

          {/* Status filter */}
          <div style={{position:"relative"}}>
            <button onClick={()=>setStatusOpen(!statusOpen)}
              style={{display:"flex",alignItems:"center",gap:5,padding:"4px 11px",borderRadius:6,border:"1px solid #e0ddd5",background:"white",cursor:"pointer",fontSize:12,fontFamily:"inherit",color:"#555"}}>
              Status {statusOpen?"▲":"▼"}
            </button>
            {statusOpen&&(
              <div style={{position:"absolute",top:"100%",left:0,marginTop:4,background:"white",border:"1px solid #e0ddd5",borderRadius:10,padding:"10px 12px",zIndex:100,boxShadow:"0 4px 16px rgba(0,0,0,0.1)",minWidth:200}}>
                <div style={{fontSize:11,color:"#aaa",marginBottom:8}}>Include plants with status:</div>
                {STATUS_OPTIONS.map(opt=>{
                  const on=(filters.statuses||[]).includes(opt.key);
                  return(
                    <label key={opt.key} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,cursor:"pointer"}}>
                      <input type="checkbox" checked={on} onChange={()=>toggleStatus(opt.key)} style={{accentColor:"#2d4a2d"}} />
                      <span style={{background:opt.bg,color:opt.fg,fontSize:11,padding:"1px 8px",borderRadius:10,fontWeight:"bold"}}>{opt.label}</span>
                    </label>
                  );
                })}
              </div>
            )}
          </div>

          <div style={{width:1,height:18,background:"#e0ddd5"}} />

          {/* More filters toggle */}
          <button onClick={()=>setOpenColor(!openColor)}
            style={{display:"flex",alignItems:"center",gap:4,padding:"4px 11px",borderRadius:6,border:`1px solid ${activeFilters>0?"#2d4a2d":"#e0ddd5"}`,background:activeFilters>0?"#f0faf0":"white",cursor:"pointer",fontSize:12,fontFamily:"inherit",color:activeFilters>0?"#2d4a2d":"#555"}}>
            More filters {activeFilters>0&&<span style={{background:"#2d4a2d",color:"white",borderRadius:10,padding:"0 6px",fontSize:10}}>{activeFilters}</span>} {openColor?"▲":"▼"}
          </button>

          {activeFilters>0&&<button onClick={()=>onChange({...filters,rscore:3,rflower:[],rfoliage:[],rwinter:false})} style={{fontSize:11,color:"#aaa",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>Clear more</button>}
        </div>

        {/* Expanded more filters */}
        {openColor&&(
          <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid #f0ede4"}}>
            {siteKey&&(
              <div style={{marginBottom:12}}>
                <div style={{fontSize:11,color:"#aaa",letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Suitability for conditions</div>
                <div style={{display:"flex",gap:6}}>
                  {[3,4,5].map(s=><button key={s} onClick={()=>onChange({...filters,rscore:s})}
                    style={{padding:"4px 12px",borderRadius:6,border:"none",cursor:"pointer",fontSize:12,fontFamily:"inherit",
                      background:filters.rscore===s?SCORE_COLORS[s]:"#f0ede4",
                      color:filters.rscore===s?(s>=4?"white":"#333"):"#555",
                      fontWeight:filters.rscore===s?"bold":"normal"}}>{SCORE_LABELS[s]}</button>)}
                </div>
              </div>
            )}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,color:"#aaa",letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Flower color</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {flowerColors.map(c=>{const sel=filters.rflower?.includes(c);return(
                  <button key={c} onClick={()=>toggleColor("rflower",c)} title={c}
                    style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:20,border:`1px solid ${sel?"#2d4a2d":"#ddd"}`,background:sel?"#f0faf0":"white",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>
                    <div style={{width:11,height:11,borderRadius:"50%",background:COLOR_MAP[c]||"#ccc",border:c==="white"?"1px solid #ccc":"none",flexShrink:0}} />{c}
                  </button>
                );})}
              </div>
            </div>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,color:"#aaa",letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Foliage color</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {foliageColors.map(c=>{const sel=filters.rfoliage?.includes(c);return(
                  <button key={c} onClick={()=>toggleColor("rfoliage",c)} title={c}
                    style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:20,border:`1px solid ${sel?"#2d4a2d":"#ddd"}`,background:sel?"#f0faf0":"white",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>
                    <div style={{width:11,height:11,borderRadius:"50%",background:COLOR_MAP[c]||"#ccc",border:c==="white"?"1px solid #ccc":"none",flexShrink:0}} />{c}
                  </button>
                );})}
              </div>
            </div>
            <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:12}}>
              <input type="checkbox" checked={!!filters.rwinter} onChange={e=>onChange({...filters,rwinter:e.target.checked})} style={{accentColor:"#2d4a2d"}} />
              ❄️ Winter interest only
            </label>
          </div>
        )}
      </div>
    );
  }

  // ── Share bar ──────────────────────────────────────────────────────────────
  function ShareBar({urlState,onLabelChange}) {
    const[copied,setCopied]=useState(false);
    const[editing,setEditing]=useState(false);
    const[val,setVal]=useState(urlState.label||"");
    const copy=()=>navigator.clipboard.writeText(window.location.href).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
    const save=()=>{onLabelChange(val.trim());setEditing(false);};
    return(
      <div className="no-print" style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",background:"white",border:"1px solid #e0ddd5",borderRadius:10,padding:"10px 14px",marginBottom:12}}>
        {editing?(
          <><input autoFocus value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")save();if(e.key==="Escape")setEditing(false);}} placeholder="e.g. Johnson Residence" style={{flex:1,minWidth:160,border:"1px solid #ddd",borderRadius:6,padding:"5px 10px",fontSize:13,fontFamily:"inherit",outline:"none"}} />
          <button onClick={save} style={{background:"#2d4a2d",color:"white",border:"none",borderRadius:6,padding:"5px 14px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Save</button>
          <button onClick={()=>setEditing(false)} style={{background:"#f0ede4",color:"#555",border:"none",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Cancel</button></>
        ):(
          <><button onClick={()=>setEditing(true)} style={{background:"#f0ede4",color:"#555",border:"none",borderRadius:6,padding:"6px 13px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>{urlState.label?`✏️ ${urlState.label}`:"📋 Name this palette"}</button>
          <button onClick={copy} style={{background:copied?"#e8f5e9":"#f0ede4",color:copied?"#2e7d32":"#555",border:"none",borderRadius:6,padding:"6px 13px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>{copied?"✓ Link copied!":"🔗 Copy shareable link"}</button>
          <button onClick={()=>window.print()} style={{background:"#f0ede4",color:"#555",border:"none",borderRadius:6,padding:"6px 13px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>🖨️ Print / save PDF</button></>
        )}
      </div>
    );
  }

  // ── Browse mode ────────────────────────────────────────────────────────────
  function BrowseMode({plants,urlState,onURLChange}) {
    const[search,setSearch]=useState(urlState.bsearch||"");
    const[zone,setZone]=useState(urlState.bzone||null);
    const[showZones,setShowZones]=useState(false);
    const[wpine,setWpine]=useState(urlState.bwpine||false);
    const[norway,setNorway]=useState(urlState.bnorway||false);
    const[walnut,setWalnut]=useState(urlState.bwalnut||false);
    const[filters,setFilters]=useState({
      statuses:urlState.statuses||["native","nearnative"],
      ptypes:urlState.ptypes||[],
      heightCap:urlState.heightCap||null,
      rscore:urlState.rscore||3,
      rflower:urlState.rflower||[],
      rfoliage:urlState.rfoliage||[],
      rwinter:urlState.rwinter||false,
    });

    useEffect(()=>{onURLChange({bzone:zone,bsearch:search,bwpine:wpine,bnorway:norway,bwalnut:walnut,...filters});},[zone,search,wpine,norway,walnut,filters]);

    const base=useMemo(()=>plants.filter(p=>{
      if(!matchesStatus(p,filters.statuses)) return false;
      if(zone&&getSiteScore(p,zone)<1) return false;
      if(wpine&&(p.whitePine==="avoid"||!p.whitePine)) return false;
      if(norway&&(p.norwayMaple==="avoid"||!p.norwayMaple)) return false;
      if(walnut&&p.juglone==="sensitive") return false;
      if(search){const q=search.toLowerCase();if(!p.common.toLowerCase().includes(q)&&!p.latin.toLowerCase().includes(q))return false;}
      return true;
    }),[plants,zone,search,wpine,norway,walnut,filters.statuses]);

    const results=useMemo(()=>applySharedFilters(base,zone,filters).sort((a,b)=>{
      if(zone){const d=getSiteScore(b,zone)-getSiteScore(a,zone);if(d!==0)return d;}
      return a.common.localeCompare(b.common);
    }),[base,zone,filters]);

    const zoneInfo=zone?ALL_SITES.find(z=>z.key===zone):null;
    const activeChallenges=[wpine&&"🌲 White pines",norway&&"🍁 Norway maple",walnut&&"🌰 Black walnut"].filter(Boolean);

    return(
      <div>
        {/* Search */}
        <div style={{padding:"20px 0 10px",position:"relative"}}>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder={`Search ${plants.length} plants by name…`}
            style={{width:"100%",border:"1px solid #ddd",borderRadius:8,padding:"11px 40px 11px 16px",fontSize:15,fontFamily:"inherit",background:"white",outline:"none"}} />
          {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:16,color:"#aaa",lineHeight:1}}>✕</button>}
        </div>

        {/* Site + challenges bar */}
        <div className="no-print" style={{background:"white",border:"1px solid #e0ddd5",borderRadius:10,padding:"10px 14px",marginBottom:10,display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}}>
          <button onClick={()=>setShowZones(!showZones)}
            style={{background:zone?"#2d4a2d":showZones?"#2d4a2d":"#f0ede4",color:zone||showZones?"white":"#555",border:"none",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>
            {zone?`📍 ${zoneInfo?.label||zone}`:(showZones?"▲ Site type":"▼ Site type")}
          </button>
          {zone&&<button onClick={()=>setZone(null)} style={{fontSize:11,color:"#aaa",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>✕</button>}
          <div style={{width:1,height:18,background:"#e0ddd5"}} />
          {[{val:wpine,set:setWpine,emoji:"🌲",label:"White pines"},{val:norway,set:setNorway,emoji:"🍁",label:"Norway maple"},{val:walnut,set:setWalnut,emoji:"🌰",label:"Black walnut"}].map(({val,set,emoji,label})=>(
            <button key={label} onClick={()=>set(!val)}
              style={{display:"flex",alignItems:"center",gap:4,padding:"4px 10px",borderRadius:20,border:`1px solid ${val?"#2d4a2d":"#e0ddd5"}`,background:val?"#f0faf0":"transparent",cursor:"pointer",fontSize:11,fontFamily:"inherit",color:val?"#2d4a2d":"#666"}}>
              {emoji} {label}
            </button>
          ))}
        </div>

        {activeChallenges.length>0&&<div style={{background:"#fff8e1",border:"1px solid #ffe082",borderRadius:8,padding:"6px 12px",marginBottom:10,fontSize:12,color:"#5d4037"}}>Showing plants that grow under or near: {activeChallenges.join(", ")}</div>}

        {showZones&&(
          <div className="no-print" style={{background:"white",border:"1px solid #e0ddd5",borderRadius:10,padding:"14px",marginBottom:10}}>
            <div style={{fontSize:12,color:"#888",marginBottom:10,fontStyle:"italic"}}>Choose a site type to sort plants by how well they fit.</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(165px, 1fr))",gap:8}}>
              {ALL_SITES.map(z=>(
                <button key={z.key} onClick={()=>{setZone(z.key);setShowZones(false);}} style={{background:zone===z.key?"#2d4a2d":"#fafaf7",color:zone===z.key?"white":"#2c2c2c",border:`2px solid ${zone===z.key?"#2d4a2d":"#e0ddd5"}`,borderRadius:8,padding:"10px 12px",cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>
                  <div style={{fontSize:18,marginBottom:2}}>{z.emoji}</div>
                  <div style={{fontWeight:"bold",fontSize:12,marginBottom:2}}>{z.label}</div>
                  <div style={{fontSize:10,opacity:0.65,lineHeight:1.4}}>{z.desc}</div>
                </button>
              ))}
            </div>
          </div>
        )}

        <SharedFilterBar plants={base} filters={filters} onChange={setFilters} siteKey={zone} />

        <div style={{fontSize:13,color:"#888",marginBottom:12,fontStyle:"italic"}}>{results.length} plant{results.length!==1?"s":""}{zone?` rated for ${zoneInfo?.label||zone}`:" in database"}</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {results.map(p=><PlantCard key={p.latin} plant={p} siteKey={zone} />)}
          {results.length===0&&<div style={{textAlign:"center",padding:40,color:"#aaa",fontStyle:"italic"}}>No plants match — try adjusting your filters.</div>}
        </div>
      </div>
    );
  }

  // ── Property Profile mode (replaces wizard) ────────────────────────────────
  const PROFILE_SITES = [
    {value:"Mesic South- Facing Heat",emoji:"☀️", label:"Hot and sunny",        desc:"South-facing, near pavement, or against a wall", impliesSun:"full"},
    {value:"Dry Upper Slope",         emoji:"🏔️",label:"High and exposed",     desc:"Top of a slope, drains fast after rain",         impliesSun:"full"},
    {value:"Mid-Slope Mesic",         emoji:"🌿", label:"Typical yard",         desc:"Normal moisture — not especially wet or dry"},
    {value:"Moist Lower Area",        emoji:"💧", label:"Low or soggy spot",    desc:"Holds water after rain, or a rain garden"},
    {value:"Woodland Edge",           emoji:"🌳", label:"Edge of trees",        desc:"Where the lawn meets the woods, dappled light",  impliesSun:"part"},
    {value:"white-pine",             emoji:"🌲", label:"Under white pines",    desc:"Dry, acidic, needle-carpeted understory",         impliesSun:"shade"},
    {value:"norway-maple",           emoji:"🍁", label:"Under Norway maple",   desc:"Dense dry shade with allelopathic roots",         impliesSun:"shade"},
    {value:"post-construction",      emoji:"🏗️",label:"Post-construction",    desc:"Compacted or disturbed soil"},
    {value:"Conifer Shade",           emoji:"🌲", label:"Under other conifers", desc:"Under hemlock, spruce, or fir",                  impliesSun:"shade"},
    {value:"Dry Slope",              emoji:"⛰️",label:"Sloped and dry",       desc:"Grades downhill, drains fast, lean soil",         impliesSun:"full"},
  ];

  function ProfileMode({plants,urlState,onURLChange}) {
    const init = {
      psite:urlState.psite||null, psun:urlState.psun||null,
      pmoisture:urlState.pmoisture||null, pirrigated:urlState.pirrigated||false,
      pwpine:urlState.pwpine||false, pnorway:urlState.pnorway||false,
      pwalnut:urlState.pwalnut||false, ppostcon:urlState.ppostcon||false,
      pdeer:urlState.pdeer||false, prabbits:urlState.prabbits||false,
      pdogs:urlState.pdogs||false, pcats:urlState.pcats||false,
      pchildren:urlState.pchildren||false, pspread:urlState.pspread||false,
    };
    const[profile,setProfile]=useState(init);
    const[filters,setFilters]=useState({
      statuses:urlState.statuses||["native","nearnative"],
      ptypes:urlState.ptypes||[],
      heightCap:urlState.heightCap||null,
      rscore:3, rflower:[], rfoliage:[], rwinter:false,
    });

    const set = (key,val) => setProfile(prev=>({...prev,[key]:val}));

    // Infer sun from site selection
    const inferredSun = useMemo(()=>{
      const site = PROFILE_SITES.find(s=>s.value===profile.psite);
      return site?.impliesSun||null;
    },[profile.psite]);

    const effectiveSun = inferredSun || profile.psun;

    useEffect(()=>{onURLChange({...profile,...filters,pdone:true});},[profile,filters]);

    const base=useMemo(()=>applyProfileFilters(plants,{...profile,psun:effectiveSun}),[plants,profile,effectiveSun]);
    const results=useMemo(()=>applySharedFilters(base,profile.psite,filters).sort((a,b)=>{
      if(profile.psite){const d=getSiteScore(b,profile.psite)-getSiteScore(a,profile.psite);if(d!==0)return d;}
      return a.common.localeCompare(b.common);
    }),[base,profile.psite,filters]);

    const hasAnyProfile = profile.psite||profile.psun||profile.pmoisture;
    const activeConditions = [profile.pwpine&&"🌲 White pines",profile.pnorway&&"🍁 Norway maple",profile.pwalnut&&"🌰 Black walnut",profile.ppostcon&&"🏗️ Post-construction"].filter(Boolean);
    const activeConcerns = [profile.pdeer&&"🦌 Deer",profile.prabbits&&"🐇 Rabbits",profile.pdogs&&"🐕 Dogs",profile.pcats&&"🐈 Cats",profile.pchildren&&"👶 Children",profile.pspread&&"🚫 No spreaders"].filter(Boolean);

    function ToggleBtn({value,label,emoji,desc,active,onClick}) {
      return(
        <button onClick={onClick} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",borderRadius:8,
          border:`2px solid ${active?"#2d4a2d":"#e0ddd5"}`,background:active?"#f0faf0":"white",
          cursor:"pointer",textAlign:"left",fontFamily:"inherit",flex:"0 0 auto"}}>
          {emoji&&<span style={{fontSize:18,flexShrink:0}}>{emoji}</span>}
          <div>
            <div style={{fontWeight:"bold",fontSize:13,color:active?"#2d4a2d":"#2c2c2c"}}>{label}</div>
            {desc&&<div style={{fontSize:10,color:"#888",marginTop:1}}>{desc}</div>}
          </div>
          {active&&<span style={{marginLeft:"auto",color:"#2d4a2d",fontSize:14}}>✓</span>}
        </button>
      );
    }

    function CheckBtn({val,onChange,emoji,label,desc}) {
      return(
        <button onClick={()=>onChange(!val)} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 12px",borderRadius:8,
          border:`1px solid ${val?"#2d4a2d":"#e0ddd5"}`,background:val?"#f0faf0":"white",
          cursor:"pointer",fontFamily:"inherit",fontSize:12,color:val?"#2d4a2d":"#555"}}>
          <span>{emoji}</span><span>{label}</span>
          {desc&&<span style={{fontSize:10,color:"#888",marginLeft:2}}>— {desc}</span>}
        </button>
      );
    }

    return(
      <div style={{paddingTop:16}}>
        <div style={{background:"#f0faf0",border:"1px solid #c8e6c9",borderRadius:10,padding:"14px 16px",marginBottom:20}}>
          <div style={{fontWeight:"bold",fontSize:15,color:"#2d4a2d",marginBottom:3}}>Tell us about your site</div>
          <div style={{fontSize:13,color:"#555"}}>Fill in what you know — results update as you go. Leave anything blank to see everything.</div>
        </div>

        {/* Site type */}
        <div style={{background:"white",border:"1px solid #e0ddd5",borderRadius:10,padding:"16px",marginBottom:12}}>
          <div style={{fontSize:11,color:"#aaa",letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>Where is this spot?</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(175px, 1fr))",gap:8}}>
            {PROFILE_SITES.map(s=>(
              <button key={s.value} onClick={()=>set("psite",profile.psite===s.value?null:s.value)}
                style={{background:profile.psite===s.value?"#2d4a2d":"#fafaf7",color:profile.psite===s.value?"white":"#2c2c2c",
                  border:`2px solid ${profile.psite===s.value?"#2d4a2d":"#e0ddd5"}`,
                  borderRadius:8,padding:"10px 12px",cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>
                <div style={{fontSize:18,marginBottom:2}}>{s.emoji}</div>
                <div style={{fontWeight:"bold",fontSize:12,marginBottom:2}}>{s.label}</div>
                <div style={{fontSize:10,opacity:0.65,lineHeight:1.4}}>{s.desc}</div>
              </button>
            ))}
          </div>
        </div>

        {/* Light + Moisture */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
          <div style={{background:"white",border:"1px solid #e0ddd5",borderRadius:10,padding:"14px"}}>
            <div style={{fontSize:11,color:"#aaa",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>
              Light
              {inferredSun&&<span style={{fontSize:10,color:"#2d4a2d",marginLeft:8,fontWeight:"bold",textTransform:"none"}}>inferred from site ✓</span>}
            </div>
            {inferredSun?(
              <div style={{fontSize:13,color:"#2d4a2d",fontWeight:"bold",padding:"6px 0"}}>
                {inferredSun==="full"?"☀️ Full sun":inferredSun==="shade"?"🌥️ Shade":"⛅ Part shade"}
                <div style={{fontSize:11,color:"#888",fontWeight:"normal",marginTop:2}}>Based on your site selection</div>
              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {[{v:"full",e:"☀️",l:"Full sun"},{v:"part",e:"⛅",l:"Part shade"},{v:"shade",e:"🌥️",l:"Mostly shade"}].map(o=>(
                  <ToggleBtn key={o.v} value={o.v} label={o.l} emoji={o.e} active={profile.psun===o.v} onClick={()=>set("psun",profile.psun===o.v?null:o.v)} />
                ))}
              </div>
            )}
          </div>
          <div style={{background:"white",border:"1px solid #e0ddd5",borderRadius:10,padding:"14px"}}>
            <div style={{fontSize:11,color:"#aaa",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Moisture</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {[{v:"dry",e:"🏜️",l:"Dry"},{v:"average",e:"🌱",l:"Average"},{v:"moist",e:"💧",l:"Moist or wet"}].map(o=>(
                <ToggleBtn key={o.v} value={o.v} label={o.l} emoji={o.e} active={profile.pmoisture===o.v} onClick={()=>set("pmoisture",profile.pmoisture===o.v?null:o.v)} />
              ))}
              <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:12,padding:"6px 0",borderTop:"1px solid #f0ede4",marginTop:2}}>
                <input type="checkbox" checked={profile.pirrigated} onChange={e=>set("pirrigated",e.target.checked)} style={{accentColor:"#2d4a2d"}} />
                💦 Will be irrigated <span style={{fontSize:10,color:"#888"}}>(opens up moisture options)</span>
              </label>
            </div>
          </div>
        </div>

        {/* Challenging conditions */}
        <div style={{background:"white",border:"1px solid #e0ddd5",borderRadius:10,padding:"14px",marginBottom:12}}>
          <div style={{fontSize:11,color:"#aaa",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Challenging conditions <span style={{fontSize:10,fontWeight:"normal",textTransform:"none"}}>— select all that apply</span></div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            <CheckBtn val={profile.pwpine}  onChange={v=>set("pwpine",v)}  emoji="🌲" label="Under white pines"   desc="dry, acidic, needle-carpeted" />
            <CheckBtn val={profile.pnorway} onChange={v=>set("pnorway",v)} emoji="🍁" label="Under Norway maple"  desc="allelopathic dry shade" />
            <CheckBtn val={profile.pwalnut} onChange={v=>set("pwalnut",v)} emoji="🌰" label="Near black walnut"   desc="juglone-sensitive plants excluded" />
            <CheckBtn val={profile.ppostcon}onChange={v=>set("ppostcon",v)}emoji="🏗️" label="Post-construction"   desc="compacted or disturbed soil" />
          </div>
        </div>

        {/* Concerns */}
        <div style={{background:"white",border:"1px solid #e0ddd5",borderRadius:10,padding:"14px",marginBottom:16}}>
          <div style={{fontSize:11,color:"#aaa",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Concerns <span style={{fontSize:10,fontWeight:"normal",textTransform:"none"}}>— select all that apply</span></div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            <CheckBtn val={profile.pdeer}    onChange={v=>set("pdeer",v)}    emoji="🦌" label="Deer browse here" />
            <CheckBtn val={profile.prabbits} onChange={v=>set("prabbits",v)} emoji="🐇" label="Rabbit damage" />
            <CheckBtn val={profile.pdogs}    onChange={v=>set("pdogs",v)}    emoji="🐕" label="Dogs in this area" />
            <CheckBtn val={profile.pcats}    onChange={v=>set("pcats",v)}    emoji="🐈" label="Cats in the garden" />
            <CheckBtn val={profile.pchildren}onChange={v=>set("pchildren",v)}emoji="👶" label="Young children play here" />
            <CheckBtn val={profile.pspread}  onChange={v=>set("pspread",v)}  emoji="🚫" label="Limit aggressive spreaders" />
          </div>
        </div>

        {/* Active summary */}
        {(activeConditions.length>0||activeConcerns.length>0)&&(
          <div style={{background:"#fff8e1",border:"1px solid #ffe082",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#5d4037"}}>
            {activeConditions.length>0&&<div>Site conditions: {activeConditions.join(", ")}</div>}
            {activeConcerns.length>0&&<div style={{marginTop:activeConditions.length?4:0}}>Filtering for: {activeConcerns.join(", ")}</div>}
          </div>
        )}

        {/* Shared filters */}
        <SharedFilterBar plants={base} filters={filters} onChange={setFilters} siteKey={profile.psite} />

        {/* Results */}
        <div style={{fontSize:13,color:"#888",marginBottom:12,fontStyle:"italic"}}>
          {hasAnyProfile
            ? `${results.length} plant${results.length!==1?"s":""} match your site`
            : `${results.length} plant${results.length!==1?"s":""} — add site details above to narrow results`}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {results.map(p=><PlantCard key={p.latin} plant={p} siteKey={profile.psite||null} />)}
          {results.length===0&&(
            <div style={{textAlign:"center",padding:"40px 20px",color:"#888"}}>
              <div style={{fontSize:36,marginBottom:12}}>🤔</div>
              <div style={{fontStyle:"italic",marginBottom:12}}>No plants match all criteria.</div>
              <div style={{fontSize:12}}>Try relaxing the height cap, checking fewer concerns, or broadening the moisture or sun settings.</div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── Habitat Builder ────────────────────────────────────────────────────────
  function HabitatMode({plants,urlState,onURLChange}) {
    const[height,setHeight]=useState(urlState.hheight||"any");
    const[sun,setSun]=useState(urlState.hsun||null);
    const[moisture,setMoisture]=useState(urlState.hmoisture||null);
    const[nearNat,setNearNat]=useState(urlState.hnearnat||false);
    const[wpine,setWpine]=useState(urlState.hwpine||false);
    const[norway,setNorway]=useState(urlState.hnorway||false);
    const[walnut,setWalnut]=useState(urlState.hwalnut||false);
    const[sortBy,setSortBy]=useState("alpha");
    useEffect(()=>{onURLChange({hheight:height,hsun:sun,hmoisture:moisture,hnearnat:nearNat,hwpine:wpine,hnorway:norway,hwalnut:walnut});},[height,sun,moisture,nearNat,wpine,norway,walnut]);

    const results=useMemo(()=>{
      return plants.filter(p=>{
        // No cultivars in habitat builder
        if(p.isCultivar) return false;
        if(!nearNat&&!p.status.startsWith("Native")) return false;
        if(nearNat&&!p.status.startsWith("Native")&&p.status!=="Near-Native"&&p.status!=="Near Native") return false;
        if(wpine&&(p.whitePine==="avoid"||!p.whitePine)) return false;
        if(norway&&(p.norwayMaple==="avoid"||!p.norwayMaple)) return false;
        if(walnut&&p.juglone==="sensitive") return false;
        const hft=p.heightFt||0;
        if(height==="8"&&hft>8) return false;
        if(height==="25"&&hft>25) return false;
        if(sun){const s=(p.sun||"").toLowerCase();if(sun==="full"&&!s.startsWith("full sun"))return false;if(sun==="shade"&&!s.includes("shade"))return false;if(sun==="part"&&!s.includes("part"))return false;}
        if(moisture){const m=(p.moisture||"").toLowerCase();if(moisture==="dry"&&!m.includes("dry")&&m!=="mesic")return false;if(moisture==="moist"&&!m.includes("moist")&&!m.includes("wet"))return false;if(moisture==="mesic"&&!m.includes("mesic"))return false;}
        return true;
      }).sort((a,b)=>sortBy==="wildlife"?(b.caterpillars||0)-(a.caterpillars||0):a.common.localeCompare(b.common));
    },[plants,height,sun,moisture,nearNat,wpine,norway,walnut,sortBy]);

    const woody=results.filter(p=>p.isWoody);
    const herby=results.filter(p=>!p.isWoody);

    const Tog=({value,current,onChange,label,emoji})=>{
      const active=current===value;
      return(
        <button onClick={()=>onChange(active?null:value)} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 14px",borderRadius:8,border:`2px solid ${active?"#2d4a2d":"#e0ddd5"}`,background:active?"#2d4a2d":"white",color:active?"white":"#555",cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:active?"bold":"normal"}}>
          {emoji&&<span>{emoji}</span>}{label}
        </button>
      );
    };
    const Chk=({value,onChange,emoji,label,desc})=>(
      <button onClick={()=>onChange(!value)} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",borderRadius:8,border:`2px solid ${value?"#2d4a2d":"#e0ddd5"}`,background:value?"#f0faf0":"white",cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>
        <span style={{fontSize:18}}>{emoji}</span>
        <div style={{flex:1}}><div style={{fontWeight:"bold",fontSize:13,color:value?"#2d4a2d":"#2c2c2c"}}>{label}</div>{desc&&<div style={{fontSize:11,color:"#888"}}>{desc}</div>}</div>
        <div style={{width:20,height:20,borderRadius:4,flexShrink:0,border:`2px solid ${value?"#2d4a2d":"#ccc"}`,background:value?"#2d4a2d":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{value&&<span style={{color:"white",fontSize:11}}>✓</span>}</div>
      </button>
    );
    function Group({title,emoji,group}) {
      if(!group.length) return <div style={{background:"white",border:"1px solid #e0ddd5",borderRadius:10,padding:"20px",textAlign:"center",marginBottom:16}}><div style={{fontSize:13,color:"#aaa",fontStyle:"italic"}}>No {title.toLowerCase()} match these conditions.</div></div>;
      return(
        <div style={{marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <span style={{fontSize:20}}>{emoji}</span>
            <span style={{fontWeight:"bold",fontSize:16,color:"#2d4a2d"}}>{title}</span>
            <span style={{fontSize:13,color:"#888",background:"#f0ede4",borderRadius:20,padding:"1px 10px"}}>{group.length}</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>{group.map(p=><PlantCard key={p.latin} plant={p} siteKey={null} />)}</div>
        </div>
      );
    }

    return(
      <div style={{paddingTop:20}}>
        <div style={{background:"#f0faf0",border:"1px solid #c8e6c9",borderRadius:10,padding:"14px 16px",marginBottom:20}}>
          <div style={{fontWeight:"bold",fontSize:15,color:"#2d4a2d",marginBottom:4}}>Native Habitat Builder</div>
          <div style={{fontSize:13,color:"#555",lineHeight:1.6}}>Native plants for ecological habitat patches in the Lexington area. A typical patch mixes roughly equal parts woody and herbaceous plants. Cultivars excluded — straight species only.</div>
        </div>

        <div style={{background:"white",border:"1px solid #e0ddd5",borderRadius:10,padding:"16px",marginBottom:16}}>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:"#aaa",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Max height</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <Tog value="8"   current={height} onChange={v=>setHeight(v||"any")} label="Under 8 ft"  emoji="🌼" />
              <Tog value="25"  current={height} onChange={v=>setHeight(v||"any")} label="Under 25 ft" emoji="🌳" />
              <Tog value="any" current={height} onChange={v=>setHeight(v||"any")} label="No limit"    emoji="✨" />
            </div>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:"#aaa",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Sun</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <Tog value="full"  current={sun} onChange={setSun} label="Full sun"   emoji="☀️" />
              <Tog value="part"  current={sun} onChange={setSun} label="Part shade" emoji="⛅" />
              <Tog value="shade" current={sun} onChange={setSun} label="Shade"      emoji="🌥️" />
            </div>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:"#aaa",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Moisture</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <Tog value="dry"   current={moisture} onChange={setMoisture} label="Dry"     emoji="🏜️" />
              <Tog value="mesic" current={moisture} onChange={setMoisture} label="Average" emoji="🌱" />
              <Tog value="moist" current={moisture} onChange={setMoisture} label="Moist"   emoji="💧" />
            </div>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:"#aaa",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Challenging conditions</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <Chk value={wpine}  onChange={setWpine}  emoji="🌲" label="Under white pines" desc="Dry, acidic, needle-carpeted" />
              <Chk value={norway} onChange={setNorway} emoji="🍁" label="Under Norway maple" desc="Allelopathic dry shade" />
              <Chk value={walnut} onChange={setWalnut} emoji="🌰" label="Near black walnut"  desc="Exclude juglone-sensitive plants" />
            </div>
          </div>
          <div>
            <div style={{fontSize:11,color:"#aaa",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Status</div>
            <Chk value={nearNat} onChange={setNearNat} emoji="🌿" label="Include near-native species" desc="Native to eastern North America but not necessarily Massachusetts" />
          </div>
        </div>

        {(wpine||norway||walnut)&&<div style={{background:"#fff8e1",border:"1px solid #ffe082",borderRadius:8,padding:"8px 14px",marginBottom:14,fontSize:12,color:"#5d4037"}}>Showing plants that tolerate: {[wpine&&"white pine understory",norway&&"Norway maple shade",walnut&&"black walnut proximity"].filter(Boolean).join(" and ")}</div>}

        <div style={{display:"flex",alignItems:"center",gap:10,fontSize:13,color:"#888",marginBottom:16,flexWrap:"wrap"}}>
          <span style={{fontStyle:"italic"}}>{results.length} native plants match · {woody.length} woody · {herby.length} herbaceous</span>
          <div style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center"}}>
            <span style={{fontSize:11,color:"#aaa"}}>Sort:</span>
            {[{val:"alpha",label:"A–Z"},{val:"wildlife",label:"🦋 Wildlife value"}].map(({val,label})=>(
              <button key={val} onClick={()=>setSortBy(val)} style={{padding:"3px 10px",borderRadius:20,border:`1px solid ${sortBy===val?"#2d4a2d":"#e0ddd5"}`,background:sortBy===val?"#2d4a2d":"transparent",color:sortBy===val?"white":"#666",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{label}</button>
            ))}
          </div>
        </div>

        <Group title="Woody plants"      emoji="🌳" group={woody} />
        <Group title="Herbaceous plants" emoji="🌿" group={herby} />
      </div>
    );
  }

  // ── Root App ───────────────────────────────────────────────────────────────
  function App() {
    const[plants,setPlants]=useState([]);
    const[loading,setLoading]=useState(true);
    const[error,setError]=useState(null);
    const[urlState,setURLState]=useState(readURL);

    const setMode=mode=>{const next={...urlState,mode};setURLState(next);pushURL(next);};
    const handleURLChange=useCallback(partial=>{setURLState(prev=>{const next={...prev,...partial};pushURL(next);return next;});},[]);
    const handleLabelChange=useCallback(label=>{setURLState(prev=>{const next={...prev,label};pushURL(next);return next;});},[]);

    useEffect(()=>{
      fetch(SHEET_CSV_URL)
        .then(r=>{if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.text();})
        .then(text=>{setPlants(parseCSV(text).map(rowToPlant).filter(Boolean));setLoading(false);})
        .catch(err=>{setError(err.message);setLoading(false);});
    },[]);

    const showShare=!loading&&!error&&(urlState.mode==="browse"||urlState.mode==="palette");

    return(
      <div style={{fontFamily:"Georgia, serif",background:"#fafaf7",minHeight:"100vh",color:"#2c2c2c"}}>
        <div style={{background:"#2d4a2d",color:"#f0ede4",padding:"24px 24px 0",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:0,right:0,width:200,height:200,background:"rgba(255,255,255,0.03)",borderRadius:"0 0 0 100%"}} />
          <div style={{maxWidth:860,margin:"0 auto"}}>
            {urlState.label&&<div className="no-print" style={{fontSize:12,background:"rgba(255,255,255,0.12)",display:"inline-block",borderRadius:20,padding:"2px 12px",marginBottom:8,color:"#c8e6c9"}}>📋 {urlState.label}</div>}
            <div style={{fontSize:11,letterSpacing:3,textTransform:"uppercase",opacity:0.55,marginBottom:5}}>Summers Gardening</div>
            <h1 style={{margin:0,fontSize:26,fontWeight:"normal",letterSpacing:"-0.5px"}}>Plant Palette Finder</h1>
            <p style={{margin:"6px 0 22px",opacity:0.65,fontSize:14,fontStyle:"italic"}}>Match your site conditions to the right plants</p>
            <div className="no-print" style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {[
                {key:"browse",  label:"Browse all plants"},
                {key:"palette", label:"Get a plant palette ✨"},
                {key:"habitat", label:"Native Habitat Builder 🌿"},
              ].map(tab=>(
                <button key={tab.key} onClick={()=>setMode(tab.key)}
                  style={{padding:"10px 18px",border:"none",cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:"bold",borderRadius:"8px 8px 0 0",
                    background:urlState.mode===tab.key?"#fafaf7":"rgba(255,255,255,0.1)",
                    color:urlState.mode===tab.key?"#2d4a2d":"rgba(240,237,228,0.75)",
                    transition:"all 0.2s"}}>
                  {tab.label}
                </button>
              ))}
            </div>
          </div>
        </div>

        <div style={{maxWidth:860,margin:"0 auto",padding:"0 16px 60px"}}>
          {showShare&&<div style={{marginTop:16}}><ShareBar urlState={urlState} onLabelChange={handleLabelChange} /></div>}

          {loading&&<div style={{textAlign:"center",padding:"60px 20px",color:"#888"}}><div style={{fontSize:36,marginBottom:12}}>🌱</div><div style={{fontStyle:"italic"}}>Loading plant data…</div></div>}
          {error&&<div style={{textAlign:"center",padding:"60px 20px"}}><div style={{fontSize:36,marginBottom:12}}>⚠️</div><div style={{fontWeight:"bold",color:"#b71c1c",marginBottom:8}}>Could not load plant data</div><div style={{fontSize:12,color:"#888",maxWidth:400,margin:"0 auto"}}>Make sure the Google Sheet is published as CSV. Error: {error}</div></div>}

          {!loading&&!error&&urlState.mode==="browse"  &&<BrowseMode  plants={plants} urlState={urlState} onURLChange={handleURLChange} />}
          {!loading&&!error&&urlState.mode==="palette" &&<ProfileMode  plants={plants} urlState={urlState} onURLChange={handleURLChange} />}
          {!loading&&!error&&urlState.mode==="habitat" &&<HabitatMode  plants={plants} urlState={urlState} onURLChange={handleURLChange} />}
        </div>

        <div style={{textAlign:"center",padding:16,color:"#aaa",fontSize:11,borderTop:"1px solid #e0ddd5"}}>
          <a href="https://www.summersgardening.com" target="_blank" rel="noopener noreferrer" style={{color:"#2d4a2d",textDecoration:"none"}}>summersgardening.com</a>
          {" · "}Plant data by Rachel Summers · Photos via iNaturalist (CC BY-NC)
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
