<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plant Palette Builder — Summers Gardening</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    :root {
      --forest: #2d4a2d; --leaf: #4a7c59; --sage: #8aab8a;
      --mist: #f0ede4; --cream: #fafaf7; --bark: #2c2c2c;
      --stone: #888; --border: #e0ddd5; --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--cream); font-family: 'DM Sans', sans-serif; color: var(--bark); font-size: 14px; }
    @media print {
      .no-print { display: none !important; }
      .print-card { break-inside: avoid; }
      body { background: white; }
    }
    /* Tooltip */
    .tip-wrap { position: relative; display: inline-flex; }
    .tip-wrap .tip {
      display: none; position: absolute; bottom: calc(100% + 6px); left: 50%;
      transform: translateX(-50%); background: #333; color: white;
      font-size: 11px; padding: 5px 9px; border-radius: 6px; white-space: nowrap;
      z-index: 300; pointer-events: none; font-family: 'DM Sans', sans-serif;
      max-width: 220px; white-space: normal; text-align: center; line-height: 1.4;
    }
    .tip-wrap:hover .tip { display: block; }
    /* Lightbox */
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.92); align-items: center; justify-content: center;
      flex-direction: column;
    }
    .lightbox.open { display: flex; }
    .lb-img { max-width: 90vw; max-height: 80vh; border-radius: 12px; object-fit: contain; }
    .lb-close {
      position: absolute; top: 20px; right: 20px;
      background: rgba(255,255,255,0.15); border: none; color: white;
      font-size: 20px; border-radius: 50%; width: 44px; height: 44px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>
<div id="root"></div>
<!-- Lightbox (outside React) -->
<div class="lightbox" id="lightbox" onclick="document.getElementById('lightbox').classList.remove('open')">
  <button class="lb-close">✕</button>
  <img class="lb-img" id="lbImg" src="" alt="" />
  <div id="lbCredit" style="color:rgba(255,255,255,0.4);font-size:11px;margin-top:10px;"></div>
</div>

<script type="text/babel">

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRiUGIg_9Eqv8Uwgp__RzcAJqNcB5vq7MHTbY1ZMqoEVtgNVlxo4CtocWgvztvQwUEzXOmMvjgP5UGA/pub?output=csv&gid=1137105758";

    cats: new Set(["Tree - Large","Tree - Small","Tall Canopy Tree","Midstory Tree","Shrub","Shrub – Large","Shrub – Small","Flowering Shrub","Broadleaf Evergreen"]) },

const CONCERN_OPTS = [

  { key:"shadedby_pine",    emoji:"🌲", label:"White pines",    tip:"Dry acidic needle duff; very few plants tolerate this well", group:"shaded" },

  { key:"near_walnut",      emoji:"🌰", label:"Black walnut",   tip:"Produces juglone, a chemical toxic to many plants; excludes sensitive species", group:"near" },

  { key:"nospread",  emoji:"🚫", label:"No spreaders", tip:"Excludes plants that fill space aggressively — good near lawns or tidy borders", group:"concern" },

const CATEGORY_ICONS = {
  "Tree - Large":"🌳","Tree - Small":"🌲","Tall Canopy Tree":"🌳","Midstory Tree":"🌿",
  "Shrub":"🌾","Shrub – Large":"🌾","Shrub – Small":"🌾","Flowering Shrub":"🌸",
  "Flowering Perennial":"🌼","Foliage Perennial":"🍃","Groundcover":"🌿",
  "Grass":"🌾","Fern":"🌿","Broadleaf Evergreen":"🍀","Vine":"🌿","Annual":"🌻",
};
const CAT_ICON_STYLES = {
  "Tree - Large":{bg:"#e8f5e9",fg:"#2e7d32"},"Tree - Small":{bg:"#e8f5e9",fg:"#388e3c"},
  "Tall Canopy Tree":{bg:"#e8f5e9",fg:"#1b5e20"},"Midstory Tree":{bg:"#f1f8e9",fg:"#558b2f"},
  "Shrub":{bg:"#fff8e1",fg:"#f57f17"},"Shrub – Large":{bg:"#fff8e1",fg:"#e65100"},
  "Shrub – Small":{bg:"#fff8e1",fg:"#f57f17"},"Flowering Shrub":{bg:"#fce4ec",fg:"#c2185b"},
  "Flowering Perennial":{bg:"#fffde7",fg:"#f9a825"},"Foliage Perennial":{bg:"#e8f5e9",fg:"#388e3c"},
  "Groundcover":{bg:"#e8f5e9",fg:"#2e7d32"},"Grass":{bg:"#f9fbe7",fg:"#827717"},
  "Fern":{bg:"#e0f2f1",fg:"#00695c"},"Broadleaf Evergreen":{bg:"#e8f5e9",fg:"#1b5e20"},
  "Vine":{bg:"#f3e5f5",fg:"#6a1b9a"},"Annual":{bg:"#fff8e1",fg:"#f57f17"},
};
const COLOR_MAP = {
  white:"#ffffff",cream:"#fffdd0",yellow:"#fdd835",orange:"#ff9800",red:"#ef5350",
  pink:"#f48fb1",rose:"#e91e63",magenta:"#e040fb",purple:"#9c27b0",lavender:"#ce93d8",
  blue:"#42a5f5",violet:"#7e57c2",maroon:"#880e4f",green:"#66bb6a","yellow-green":"#cddc39",
  "blue-gray":"#90a4ae",silver:"#cfd8dc","dark green":"#1b5e20","lime green":"#cddc39",
  burgundy:"#6d1f1f",bronze:"#cd7f32",gold:"#ffc107","blue-green":"#00695c",
};

const WOODY_CATS = new Set(["Tree - Large","Tree - Small","Tall Canopy Tree","Midstory Tree","Shrub","Shrub – Large","Shrub – Small","Flowering Shrub","Broadleaf Evergreen","Vine"]);
const CANOPY_CATS = new Set(["Tree - Large","Tall Canopy Tree"]);

// ── localStorage hearts ────────────────────────────────────────────────────
const LS_KEY = "ppb_hearts_v1";
function loadHearts() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)||"[]"); } catch { return []; }
}
function saveHearts(arr) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(arr)); } catch {}
}

// ── URL helpers ────────────────────────────────────────────────────────────
function readURL() {
  const p = new URLSearchParams(window.location.search);
  return {
    search:    p.get("q")       || "",
    zone:      p.get("zone")    || null,
    ptypes:    p.get("pt")      ? p.get("pt").split(",") : [],
    statuses:  p.get("st")      ? p.get("st").split(",") : ["native","nearnative"],
    concerns:  p.get("cx")      ? p.get("cx").split(",") : [],
    heightCap: p.get("hc")      ? parseFloat(p.get("hc")) : null,
    moisture:  p.get("mo")      || null,
    sun:       p.get("su")      || null,
    irrigated: p.get("ir")      === "1",
    rflower:   p.get("fl")      ? p.get("fl").split(",") : [],
    rwinter:   p.get("wi")      === "1",
    sortBy:    p.get("sb")      || "fit",
    label:     p.get("label")   || "",
    sharedHearts: p.get("hearts") ? p.get("hearts").split(",") : [],
  };
}
function pushURL(s) {
  const p = new URLSearchParams();
  if(s.search)    p.set("q",s.search);
  if(s.zone)      p.set("zone",s.zone);
  if(s.ptypes?.length) p.set("pt",s.ptypes.join(","));
  const defSt = ["native","nearnative"];
  if(JSON.stringify([...s.statuses].sort()) !== JSON.stringify([...defSt].sort())) p.set("st",s.statuses.join(","));
  if(s.concerns?.length) p.set("cx",s.concerns.join(","));
  if(s.heightCap) p.set("hc",String(s.heightCap));
  if(s.moisture)  p.set("mo",s.moisture);
  if(s.sun)       p.set("su",s.sun);
  if(s.irrigated) p.set("ir","1");
  if(s.rflower?.length) p.set("fl",s.rflower.join(","));
  if(s.rwinter)   p.set("wi","1");
  if(s.sortBy && s.sortBy!=="fit") p.set("sb",s.sortBy);
  if(s.label)     p.set("label",s.label);
  const str = p.toString();
  window.history.replaceState(null,"",str?`${location.pathname}?${str}`:location.pathname);
}

// ── Data parsing ───────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.split(/\r?\n/);
  function pl(line) {
    const out=[]; let f=""; let q=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){if(q&&line[i+1]==='"'){f+='"';i++;}else q=!q;}
      else if(c===','&&!q){out.push(f);f="";}else f+=c;
    } out.push(f); return out;
  }
  const headers=pl(lines[0]); const rows=[];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    const vals=pl(lines[i]); const row={};
    headers.forEach((h,idx)=>{row[h.trim()]=(vals[idx]||"").trim();});
    rows.push(row);
  } return rows;
}

function getTypeKey(cat) {
  for(const g of PLANT_TYPES) if(g.cats.has(cat)) return g.key;
  return "perennial";
}

function rowToPlant(row) {
  const scores={};
  ZONE_KEYS.forEach(k=>{const m=(row[k]||"").match(/\d/);scores[k]=m?parseInt(m[0]):0;});
  if(!Object.values(scores).some(s=>s>0)) return null;
  const curatedImg = row["curated image url"]||"";
  const inatImg    = row["inaturalist image url"]||"";
  const status     = row["Ecological Status"]||"";
  return {
    common:      row["Common Name"]||"",
    latin:       row["Latin Name"]||"",
    category:    row["Category"]||"",
    status,
    bloom:       row["Bloom Period"]||"",
    seasonal:    row["Seasonal Interest"]||"",
    evergreen:   row["Evergreen"]||"",
    height:      row["Height Class"]||"",
    heightFt:    parseFloat(row["Max Height (ft)"])||0,
    sun:         row["Sun Exposure"]||"",
    moisture:    row["Moisture Preference"]||"",
    notes:       row["Notes"]||"",
    image:       curatedImg||inatImg,
    curatedImage:curatedImg,
    inatImage:   inatImg,
    role:        row["Habitat Patch Role"]||"",
    aggressive:  row["Aggressive"]||"",
    flowerColor: row["Flower Color"]||"",
    foliageColor:row["Foliage Color"]||"",
    deerPressure:row["deer_pressure"]||"",
    rabbitDamage:row["rabbit_damage"]||"",
    toxicDogs:   row["toxic_dogs"]||"",
    toxicCats:   row["toxic_cats"]||"",
    toxicChildren:row["toxic_children"]||"",
    juglone:     row["juglone_sensitivity"]||"",
    whitePine:   row["white_pine_tolerance"]||"",
    norwayMaple: row["norway_maple_tolerance"]||"",
    seedStart:   row["seed_ripe_start"]||"",
    seedEnd:     row["seed_ripe_end"]||"",
    seedNotes:   row["seed_notes"]||"",
    propagNotes: row["propagation_notes"]||"",
    caterpillars:parseInt(row["caterpillar_species"])||0,
    insectConf:  row["insect_data_confidence"]||"",
    isCultivar:  status.includes("Cultivar"),
    isWoody:     WOODY_CATS.has(row["Category"]||""),
    isCanopy:    CANOPY_CATS.has(row["Category"]||""),
    typeKey:     getTypeKey(row["Category"]||""),
    scores,
  };
}

function getSiteScore(plant, key) {
  if(!key) return null;
  if(ZONE_KEYS.includes(key)) return plant.scores[key]||0;
  if(key==="shadedby_norway"||key==="norway-maple") {
    if(plant.norwayMaple==="avoid"||!plant.norwayMaple) return 0;
    const b=plant.scores["Conifer Shade"]||0;
    return plant.norwayMaple==="tolerant"?Math.min(5,b+1):b;
  }
  if(key==="shadedby_pine"||key==="white-pine") {
    if(plant.whitePine==="avoid"||!plant.whitePine) return 0;
    const b=plant.scores["Conifer Shade"]||0;
    return plant.whitePine==="tolerant"?Math.min(5,b+1):b;
  }
  if(key==="shadedby_conifer") return plant.scores["Conifer Shade"]||0;
  if(key==="near_walnut") { if(plant.juglone==="sensitive") return 0; return Math.max(plant.scores["Mid-Slope Mesic"]||0,plant.scores["Woodland Edge"]||0); }
  if(key==="postconstruction") return Math.max(plant.scores["Dry Upper Slope"]||0,plant.scores["Dry Slope"]||0);
  return 0;
}

function matchStatus(plant, statuses) {
  if(!statuses?.length) return true;
  const s = plant.status.toLowerCase().replace(/-/g,"").replace(/ /g,"");
  if(statuses.includes("native") && s==="native") return true;
  if(statuses.includes("cultivar") && s.includes("cultivar")) return true;
  if(statuses.includes("nearnative") && (s==="nearnative"||s==="near native")) return true;
  if(statuses.includes("nonnative") && (s==="safenonnative"||s.includes("hybrid"))) return true;
  return false;
}

function applyFilters(plants, f, siteKey) {
  return plants.filter(p => {
    if(!matchStatus(p, f.statuses)) return false;
    if(f.ptypes?.length && !f.ptypes.includes(p.typeKey)) return false;
    if(f.heightCap && p.heightFt > f.heightCap) return false;
    if(f.search) {
      const q=f.search.toLowerCase();
      if(!p.common.toLowerCase().includes(q)&&!p.latin.toLowerCase().includes(q)) return false;
    }
    // Zone score
    if(siteKey && ZONE_KEYS.includes(siteKey) && (p.scores[siteKey]||0)<1) return false;
    // Concerns
    const cx = f.concerns||[];
    if(cx.includes("shadedby_norway")&&(p.norwayMaple==="avoid"||!p.norwayMaple)) return false;
    if(cx.includes("shadedby_pine")&&(p.whitePine==="avoid"||!p.whitePine)) return false;
    if(cx.includes("shadedby_conifer")&&(p.scores["Conifer Shade"]||0)<2) return false;
    if(cx.includes("near_walnut")&&p.juglone==="sensitive") return false;
    if(cx.includes("postconstruction")&&(getSiteScore(p,"postconstruction")||0)<3) return false;
    if(cx.includes("deer")&&p.deerPressure==="high") return false;
    if(cx.includes("rabbits")&&p.rabbitDamage==="high") return false;
    if(cx.includes("dogs")&&p.toxicDogs==="yes") return false;
    if(cx.includes("cats")&&p.toxicCats==="yes") return false;
    if(cx.includes("children")&&p.toxicChildren==="yes") return false;
    if(cx.includes("nospread")&&p.aggressive==="Y") return false;
    // Sun
    if(f.sun) {
      const sun=(p.sun||"").toLowerCase();
      if(f.sun==="full"&&!sun.startsWith("full sun")) return false;
      if(f.sun==="shade"&&!sun.includes("shade")) return false;
      if(f.sun==="part"&&!sun.includes("part")) return false;
    }
    // Moisture (irrigated shifts one tier wetter)
    if(f.moisture) {
      const m=(p.moisture||"").toLowerCase();
      const eff = f.irrigated
        ? (f.moisture==="dry"?"average":f.moisture==="average"?"moist":"moist")
        : f.moisture;
      if(eff==="dry"&&!m.includes("dry")&&!m.includes("mesic")) return false;
      if(eff==="moist"&&!m.includes("moist")&&!m.includes("wet")) return false;
      if(eff==="average"&&!m.includes("mesic")) return false;
    }
    if(f.rflower?.length) {
      const cols=p.flowerColor.split(/\s*[|]\s*/).map(c=>c.trim().toLowerCase());
      if(!f.rflower.some(rc=>cols.includes(rc))) return false;
    }
    if(f.rwinter) {
      const w=(p.seasonal||"").toLowerCase().includes("winter")||(p.evergreen||"").toLowerCase()==="yes";
      if(!w) return false;
    }
    return true;
  });
}

function sortPlants(plants, sortBy, siteKey) {
  return [...plants].sort((a,b)=>{
    if(sortBy==="wildlife") return (b.caterpillars||0)-(a.caterpillars||0);
    if(sortBy==="fit" && siteKey) {
      const d=(getSiteScore(b,siteKey)||0)-(getSiteScore(a,siteKey)||0);
      if(d!==0) return d;
    }
    return a.common.localeCompare(b.common);
  });
}

// ── Small UI pieces ────────────────────────────────────────────────────────
function Tip({text, children}) {
  return (
    <span className="tip-wrap">
      {children}
      <span className="tip">{text}</span>
    </span>
  );
}

function PlantThumb({plant, size=48, radius=8}) {
  const[failed,setFailed]=useState(false);
  const st=CAT_ICON_STYLES[plant.category]||{bg:"#f0ede4",fg:"#4a7c59"};
  const em=CATEGORY_ICONS[plant.category]||"🌿";
  if(!plant.image||failed) return(
    <div style={{width:size,height:size,borderRadius:radius,flexShrink:0,background:st.bg,
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <div style={{fontSize:size*0.38,lineHeight:1}}>{em}</div>
      <div style={{fontSize:size*0.18,fontWeight:"bold",color:st.fg}}>{plant.common.charAt(0)}</div>
    </div>
  );
  return <img src={plant.image} alt={plant.common} onError={()=>setFailed(true)}
    style={{width:size,height:size,borderRadius:radius,objectFit:"cover",flexShrink:0}} />;
}

function ColorDots({colorStr, size=9}) {
  if(!colorStr) return null;
  return(
    <div style={{display:"flex",gap:3,flexWrap:"wrap",alignItems:"center"}}>
      {colorStr.split(/\s*[|]\s*/).map(c=>c.trim()).filter(Boolean).map((c,i)=>(
        <div key={i} title={c} style={{width:size,height:size,borderRadius:"50%",
          background:COLOR_MAP[c]||"#ccc",border:c==="white"?"1px solid #ccc":"none",flexShrink:0}} />
      ))}
    </div>
  );
}

function RiskBadges({plant}) {
  const b=[];
  if(plant.deerPressure==="high")  b.push({t:"🦌 High deer pressure",bg:"#fff3e0",fg:"#e65100"});
  if(plant.rabbitDamage==="high")  b.push({t:"🐇 High rabbit damage",bg:"#fff3e0",fg:"#bf360c"});
  if(plant.aggressive==="Y")       b.push({t:"🌿 Fills space well",  bg:"#e8f5e9",fg:"#2e7d32"});
  if(plant.toxicDogs==="yes")      b.push({t:"🐕 Toxic to dogs",     bg:"#fce4ec",fg:"#c62828"});
  if(plant.toxicCats==="yes")      b.push({t:"🐈 Toxic to cats",     bg:"#fce4ec",fg:"#c62828"});
  if(plant.toxicChildren==="yes")  b.push({t:"👶 Toxic to children", bg:"#fce4ec",fg:"#c62828"});
  if(!b.length) return null;
  return(
    <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:8}}>
      {b.map((x,i)=><span key={i} style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:x.bg,color:x.fg,fontWeight:"bold"}}>{x.t}</span>)}
    </div>
  );
}

// ── Photo gallery ──────────────────────────────────────────────────────────
function taxonQ(latin) {
  return latin.replace(/['''][^''']*[''']/g,"").replace(/\bcultivars?\b/ig,"")
    .replace(/\bhybrids?\b/ig,"").replace(/\bspp?\b/ig,"").replace(/\bvar\b.*/ig,"")
    .replace(/[×x]\s+/g,"").trim().split(/\s+/).slice(0,2).join(" ");
}

function PhotoGallery({plant}) {
  const[photos,setPhotos]=useState(null);
  const[idx,setIdx]=useState(0);

  useEffect(()=>{
    if(photos!==null) return;
    const name=taxonQ(plant.latin);
    const curated=plant.curatedImage;
    if(!name){
      setPhotos(curated?[{medium:curated,large:curated,thumb:curated,credit:""}]:[]);
      return;
    }
    fetch(`https://api.inaturalist.org/v1/observations?taxon_name=${encodeURIComponent(name)}&quality_grade=research&photos=true&per_page=5&order_by=votes`)
      .then(r=>r.json())
      .then(d=>{
        const imgs=[];
        if(curated) imgs.push({medium:curated,large:curated,thumb:curated,credit:""});
        (d.results||[]).forEach(obs=>{
          (obs.photos||[]).forEach(ph=>{
            if(imgs.length>=5) return;
            const medium=(ph.url||"").replace("square","medium");
            if(!medium.includes("http")||medium===curated) return;
            imgs.push({thumb:ph.url||"",medium,large:(ph.url||"").replace("square","large"),credit:(ph.attribution||"").replace(/\(c\)/g,"©")});
          });
        });
        if(!imgs.length&&plant.inatImage) imgs.push({medium:plant.inatImage,large:plant.inatImage,thumb:plant.inatImage,credit:""});
        setPhotos(imgs); setIdx(0);
      })
      .catch(()=>{
        const fb=curated||plant.inatImage;
        setPhotos(fb?[{medium:fb,large:fb,thumb:fb,credit:""}]:[]);
      });
  },[plant.latin]);

  const openLightbox=(img,credit)=>{
    document.getElementById("lbImg").src=img;
    document.getElementById("lbCredit").textContent=credit||"";
    document.getElementById("lightbox").classList.add("open");
  };

  if(photos===null) return(
    <div style={{width:200,height:165,borderRadius:10,background:"#f0ede4",flexShrink:0,
      display:"flex",alignItems:"center",justifyContent:"center"}}>
      <span style={{fontSize:11,color:"#aaa",fontStyle:"italic"}}>Loading…</span>
    </div>
  );
  if(!photos.length) return <PlantThumb plant={plant} size={120} radius={10} />;
  const cur=photos[idx];
  return(
    <div style={{flexShrink:0,width:200}}>
      <img src={cur.medium} alt={plant.common}
        onClick={()=>openLightbox(cur.large,cur.credit)}
        onError={e=>{e.target.src=cur.thumb;}}
        style={{width:200,height:165,objectFit:"cover",borderRadius:10,display:"block",cursor:"zoom-in"}} />
      {photos.length>1&&(
        <div style={{display:"flex",gap:5,marginTop:6,overflowX:"auto",paddingBottom:2}}>
          {photos.map((ph,i)=>(
            <img key={i} src={ph.thumb} alt="" onClick={()=>setIdx(i)}
              onError={e=>e.target.style.opacity="0.2"}
              style={{width:34,height:34,borderRadius:5,objectFit:"cover",flexShrink:0,cursor:"pointer",
                border:`2px solid ${i===idx?"#2d4a2d":"transparent"}`,opacity:i===idx?1:0.55,transition:"opacity 0.15s"}} />
          ))}
        </div>
      )}
      {cur.credit&&<div style={{fontSize:9,color:"#bbb",marginTop:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{cur.credit.length>70?cur.credit.slice(0,70)+"…":cur.credit}</div>}
      <div style={{fontSize:9,color:"#ccc",marginTop:1}}>via iNaturalist · {photos.length} photo{photos.length!==1?"s":""}</div>
    </div>
  );
}

// ── Hearts panel ───────────────────────────────────────────────────────────
function HeartsPanel({hearts, plants, open, onClose, isHabitat}) {
  const[label,setLabel]=useState("");
  const[copied,setCopied]=useState(false);
  const hearted=useMemo(()=>plants.filter(p=>hearts.includes(p.latin)),[plants,hearts]);
  const mixCounts=useMemo(()=>{
    const c={woody:0,perennial:0,grass:0,fern:0,ground:0,vine:0};
    hearted.forEach(p=>{const k=p.typeKey; if(c[k]!==undefined) c[k]++;});
    return c;
  },[hearted]);

  const tips=[];
  if(isHabitat){
    if(mixCounts.woody<5) tips.push("Add more woody plants for habitat structure");
    if(mixCounts.grass<2) tips.push("Consider adding grasses or sedges");
    if(mixCounts.ground<1) tips.push("A groundcover layer helps close the canopy");
  } else {
    if(mixCounts.grass===0) tips.push("Consider adding grasses or sedges for texture");
    if(mixCounts.woody===0&&hearted.length>3) tips.push("A shrub or small tree adds structure");
  }

  const copyLink=()=>{
    const p=new URLSearchParams(window.location.search);
    p.set("hearts",hearts.join(","));
    if(label) p.set("label",label);
    navigator.clipboard.writeText(`${location.origin}${location.pathname}?${p.toString()}`)
      .then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
  };

  if(!open) return null;
  return(
    <>
      <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.3)",zIndex:199}} />
      <div style={{position:"fixed",right:0,top:0,bottom:0,width:320,background:"white",

            style={{width:"100%",border:"1.5px solid #e0ddd5",borderRadius:8,padding:"7px 12px",
              fontFamily:"inherit",fontSize:13,outline:"none",color:"#2c2c2c"}} />
        </div>
        <div style={{padding:"12px 16px",borderBottom:"1px solid #e0ddd5",flexShrink:0}}>

            {[{k:"woody",e:"🌳",l:"Woody"},{k:"perennial",e:"🌼",l:"Perennial"},{k:"grass",e:"🌾",l:"Grass"},{k:"ground",e:"🍀",l:"Groundcover"}].map(({k,e,l})=>(

// ── Habitat layer display ──────────────────────────────────────────────────
function HabitatView({plants, concerns, heightCap, hearts, onHeart, onLoosen}) {
  // Proportions: 10 forbs, 6 grasses, 4 groundcovers, 10 shrubs/large, 10 trees
  const HTARGETS={perennial:10,grass:6,ground:4,woody:10,canopy:10};
  const[sortBy,setSortBy]=useState("wildlife");

  const base=useMemo(()=>plants.filter(p=>{
    if(p.isCultivar) return false;
    if(!p.status.startsWith("Native")&&p.status!=="Near-Native"&&p.status!=="Near Native") return false;
    return true;
  }),[plants]);

  const layers=useMemo(()=>{
    const scored=[...base].sort((a,b)=>
      sortBy==="wildlife"?(b.caterpillars||0)-(a.caterpillars||0):a.common.localeCompare(b.common)
    );
    const trees=scored.filter(p=>p.isCanopy).slice(0,HTARGETS.canopy);
    const woody=scored.filter(p=>p.isWoody&&!p.isCanopy).slice(0,HTARGETS.woody);
    const perennial=scored.filter(p=>p.typeKey==="perennial").slice(0,HTARGETS.perennial);
    const grass=scored.filter(p=>p.typeKey==="grass").slice(0,HTARGETS.grass);
    const ground=scored.filter(p=>p.typeKey==="ground").slice(0,HTARGETS.ground);
    return {trees,woody,perennial,grass,ground};
  },[base,sortBy,heightCap]);

  const thinLayers=Object.entries(layers).filter(([k,v])=>v.length<(HTARGETS[k]||0)/2);

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        <div style={{fontSize:13,color:"#888",fontStyle:"italic"}}>
          {Object.values(layers).flat().length} native plants · Massachusetts natives + near-natives · straight species only
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:5,alignItems:"center"}}>
          <span style={{fontSize:11,color:"#aaa"}}>Sort:</span>
          {[{v:"wildlife",l:"🦋 Wildlife value"},{v:"alpha",l:"A–Z"}].map(({v,l})=>(
            <button key={v} onClick={()=>setSortBy(v)}
              style={{padding:"3px 10px",borderRadius:16,border:`1px solid ${sortBy===v?"#2d4a2d":"#e0ddd5"}`,
                background:sortBy===v?"#2d4a2d":"transparent",color:sortBy===v?"white":"#666",
                cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>{l}</button>
          ))}
        </div>
      </div>

      {thinLayers.length>0&&(
        <div style={{background:"#fff8e1",border:"1px solid #ffe082",borderRadius:10,padding:"12px 16px",marginBottom:14,fontSize:13,color:"#5d4037"}}>
          <strong style={{display:"block",marginBottom:6}}>⚠️ Some layers have limited options</strong>
          Try loosening one of these:
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8}}>
            {concerns.some(c=>c.startsWith("shadedby"))&&<button onClick={()=>onLoosen("shadedby")} style={{background:"white",border:"1px solid #ffe082",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:"inherit",color:"#5d4037"}}>Remove shade filter</button>}
            {concerns.includes("near_walnut")&&<button onClick={()=>onLoosen("near_walnut")} style={{background:"white",border:"1px solid #ffe082",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:"inherit",color:"#5d4037"}}>Remove black walnut filter</button>}
            {heightCap&&<button onClick={()=>onLoosen("height")} style={{background:"white",border:"1px solid #ffe082",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:"inherit",color:"#5d4037"}}>Raise height cap</button>}
          </div>
        </div>
      )}

      {[
        {key:"trees",    title:"Canopy trees",         emoji:"🌳", plants:layers.trees},
        {key:"woody",    title:"Shrubs & understory",  emoji:"🌿", plants:layers.woody},
        {key:"perennial",title:"Flowering perennials", emoji:"🌼", plants:layers.perennial},
        {key:"grass",    title:"Grasses & sedges",     emoji:"🌾", plants:layers.grass},
        {key:"ground",   title:"Groundcovers",         emoji:"🍀", plants:layers.ground},
      ].map(({key,title,emoji,plants:lp})=>{
        if(!lp.length) return null;
        return(
          <div key={key} style={{marginBottom:20}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <span style={{fontSize:20}}>{emoji}</span>
              <span style={{fontFamily:"'Playfair Display',serif",fontSize:16,color:"#2d4a2d"}}>{title}</span>
              <span style={{background:"#f0ede4",borderRadius:20,padding:"2px 10px",fontSize:12,color:"#888"}}>{lp.length}</span>
            </div>
            {lp.map(p=><PlantCard key={p.latin} plant={p} siteKey={null} hearted={hearts.includes(p.latin)} onHeart={onHeart} />)}
          </div>
        );
      })}
    </div>
  );
}

// ── Share bar ──────────────────────────────────────────────────────────────
function ShareBar({label, onLabelChange}) {
  const[editing,setEditing]=useState(false);
  const[val,setVal]=useState(label||"");
  const[copied,setCopied]=useState(false);
  const save=()=>{onLabelChange(val.trim());setEditing(false);};
  const copy=()=>navigator.clipboard.writeText(window.location.href).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
  return(
    <div className="no-print" style={{display:"flex",gap:7,flexWrap:"wrap",alignItems:"center",
      background:"white",border:"1px solid #e0ddd5",borderRadius:10,padding:"9px 14px",marginTop:12,marginBottom:4}}>
      {editing?(
        <>
          <input autoFocus value={val} onChange={e=>setVal(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter")save();if(e.key==="Escape")setEditing(false);}}
            placeholder="Name this palette…"
            style={{flex:1,minWidth:140,border:"1px solid #ddd",borderRadius:6,padding:"5px 10px",fontSize:13,fontFamily:"inherit",outline:"none"}} />
          <button onClick={save} style={{background:"#2d4a2d",color:"white",border:"none",borderRadius:6,padding:"5px 14px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Save</button>
          <button onClick={()=>setEditing(false)} style={{background:"#f0ede4",color:"#555",border:"none",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Cancel</button>
        </>
      ):(
        <>
          <button onClick={()=>setEditing(true)} style={{background:"#f0ede4",color:"#555",border:"none",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>
            {label?`✏️ ${label}`:"📋 Name this palette"}
          </button>
          <button onClick={copy} style={{background:copied?"#e8f5e9":"#f0ede4",color:copied?"#2e7d32":"#555",border:"none",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>
            {copied?"✓ Copied!":"🔗 Copy link"}
          </button>
          <button onClick={()=>window.print()} style={{background:"#f0ede4",color:"#555",border:"none",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>🖨️ Print</button>
        </>
      )}
    </div>
  );
}

// ── Root App ───────────────────────────────────────────────────────────────
function App() {
  const[plants,setPlants]=useState([]);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState(null);
  const initURL=useMemo(readURL,[]);

  // Filter state
  const[search,setSearch]=useState(initURL.search);
  const[zone,setZone]=useState(initURL.zone);
  const[ptypes,setPtypes]=useState(initURL.ptypes);
  const[statuses,setStatuses]=useState(initURL.statuses);
  const[concerns,setConcerns]=useState(initURL.concerns);
  const[heightCap,setHeightCap]=useState(initURL.heightCap);
  const[moisture,setMoisture]=useState(initURL.moisture);
  const[sun,setSun]=useState(initURL.sun);
  const[irrigated,setIrrigated]=useState(initURL.irrigated);
  const[rflower,setRflower]=useState(initURL.rflower);
  const[rwinter,setRwinter]=useState(initURL.rwinter);
  const[sortBy,setSortBy]=useState(initURL.sortBy);
  const[label,setLabel]=useState(initURL.label);
  const[showZones,setShowZones]=useState(false);
  const[showMore,setShowMore]=useState(false);
  const[showSuggest,setShowSuggest]=useState(false);
  const[habitatMode,setHabitatMode]=useState(false);
  const[panelOpen,setPanelOpen]=useState(false);

  // Hearts
  const[hearts,setHearts]=useState(()=>{
    if(initURL.sharedHearts.length) return initURL.sharedHearts;
    return loadHearts();
  });
  const toggleHeart=useCallback(latin=>{
    setHearts(prev=>{
      const next=prev.includes(latin)?prev.filter(x=>x!==latin):[...prev,latin];
      saveHearts(next);
      return next;
    });
  },[]);

  // Sync URL
  useEffect(()=>{
    pushURL({search,zone,ptypes,statuses,concerns,heightCap,moisture,sun,irrigated,rflower,rwinter,sortBy,label});
  },[search,zone,ptypes,statuses,concerns,heightCap,moisture,sun,irrigated,rflower,rwinter,sortBy,label]);

  // Load data
  useEffect(()=>{
    fetch(SHEET_URL)
      .then(r=>{if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.text();})
      .then(text=>{setPlants(parseCSV(text).map(rowToPlant).filter(Boolean));setLoading(false);})
      .catch(err=>{setError(err.message);setLoading(false);});
  },[]);

  // Infer sun from zone
  const inferredSun=useMemo(()=>MICROZONES.find(z=>z.key===zone)?.impliesSun||null,[zone]);
  const effectiveSun=inferredSun||sun;

  // Filtered results
  const filters={search,ptypes,statuses,concerns,heightCap,moisture:moisture,sun:effectiveSun,irrigated,rflower,rwinter};
  const filtered=useMemo(()=>applyFilters(plants,filters,zone),[plants,search,zone,ptypes,statuses,concerns,heightCap,moisture,effectiveSun,irrigated,rflower,rwinter]);
  const results=useMemo(()=>sortPlants(filtered,sortBy,zone),[filtered,sortBy,zone]);

  const zoneInfo=MICROZONES.find(z=>z.key===zone);
  const activeFilters=[
    zone&&{label:`📍 ${zoneInfo?.label||zone}`,clear:()=>{setZone(null);setShowZones(false);}},
    ...concerns.map(c=>{const opt=CONCERN_OPTS.find(o=>o.key===c);return opt&&{label:`${opt.emoji} ${opt.label}`,clear:()=>setConcerns(prev=>prev.filter(x=>x!==c))}}),
    ...ptypes.map(k=>{const g=PLANT_TYPES.find(t=>t.key===k);return g&&{label:`${g.emoji} ${g.label}`,clear:()=>setPtypes(prev=>prev.filter(x=>x!==k))}}),
    heightCap&&{label:`Under ${heightCap} ft`,clear:()=>setHeightCap(null)},
    moisture&&{label:moisture==="dry"?"🏜️ Dry":moisture==="moist"?"💧 Moist":"🌱 Average",clear:()=>setMoisture(null)},
    (sun&&!inferredSun)&&{label:sun==="full"?"☀️ Full sun":sun==="shade"?"🌥️ Shade":"⛅ Part shade",clear:()=>setSun(null)},
    rflower.length&&{label:`🌸 ${rflower.join(", ")}`,clear:()=>setRflower([])},
    rwinter&&{label:"❄️ Winter interest",clear:()=>setRwinter(false)},
  ].filter(Boolean);

  const toggleStatus=k=>setStatuses(prev=>prev.includes(k)?prev.filter(x=>x!==k):[...prev,k]);
  const toggleConcern=k=>setConcerns(prev=>prev.includes(k)?prev.filter(x=>x!==k):[...prev,k]);
  const togglePtype=k=>setPtypes(prev=>prev.includes(k)?prev.filter(x=>x!==k):[...prev,k]);
  const toggleFlower=c=>setRflower(prev=>prev.includes(c)?prev.filter(x=>x!==c):[...prev,c]);

  const flowerColors=useMemo(()=>{const c={};plants.forEach(p=>p.flowerColor.split(/\s*[|]\s*/).forEach(x=>{const t=x.trim().toLowerCase();if(t&&COLOR_MAP[t])c[t]=(c[t]||0)+1;}));return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([x])=>x);},[plants]);

  const moreCount=[moisture,sun&&!inferredSun,irrigated,...rflower,rwinter].filter(Boolean).length;

  // Pill style helper
  const pillStyle=(active,dark=false)=>({
    display:"inline-flex",alignItems:"center",gap:4,
    padding:"5px 12px",borderRadius:20,cursor:"pointer",
    fontFamily:"'DM Sans',sans-serif",fontSize:12,whiteSpace:"nowrap",
    border:`1.5px solid ${active?"#2d4a2d":"#e0ddd5"}`,
    background:active?(dark?"#2d4a2d":"#f0faf0"):"transparent",
    color:active?(dark?"white":"#2d4a2d"):"#555",
    fontWeight:active?"500":"normal",
  });
  const btnStyle=(bg,fg,extra={})=>({background:bg,color:fg,border:"none",borderRadius:8,
    padding:"8px 16px",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:500,...extra});

  return(
    <div style={{fontFamily:"'DM Sans',sans-serif",background:"#fafaf7",minHeight:"100vh",color:"#2c2c2c"}}>

      {/* ── Header ── */}
      <div style={{background:"#2d4a2d",color:"#f0ede4",padding:"18px 20px 16px"}}>
        <div style={{maxWidth:900,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",gap:16}}>
          <div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:400,letterSpacing:"-0.3px"}}>Plant Palette Builder</div>
            <div style={{fontSize:11,opacity:0.55,letterSpacing:2,textTransform:"uppercase",marginTop:2}}>for Massachusetts · Summers Gardening</div>
          </div>
          <button onClick={()=>setPanelOpen(true)}
            style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,0.12)",
              borderRadius:24,padding:"8px 16px",border:"none",color:"#f0ede4",cursor:"pointer",fontSize:13,flexShrink:0}}>
            ♥ My palette
            <span style={{background:"#e57373",color:"white",borderRadius:10,padding:"1px 7px",fontSize:11,fontWeight:500}}>{hearts.length}</span>
          </button>
        </div>
      </div>

      {/* ── Sticky filter bar ── */}
      <div className="no-print" style={{position:"sticky",top:0,zIndex:100,background:"#fafaf7",
        borderBottom:"1px solid #e0ddd5",padding:"10px 20px 0"}}>
        <div style={{maxWidth:900,margin:"0 auto"}}>

          {/* Search */}
          <div style={{position:"relative",marginBottom:8}}>
            <input value={search} onChange={e=>setSearch(e.target.value)}
              placeholder={`Search ${plants.length||""}  Massachusetts native plants…`}
              style={{width:"100%",padding:"12px 44px 12px 18px",border:"1.5px solid #e0ddd5",
                borderRadius:10,fontFamily:"inherit",fontSize:15,background:"white",outline:"none",color:"#2c2c2c"}} />
            {search&&<button onClick={()=>setSearch("")}
              style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",
                background:"none",border:"none",cursor:"pointer",fontSize:16,color:"#aaa"}}>✕</button>}
          </div>

          {/* Row 1: Status pills (prominent) + plant type + height */}
          <div style={{display:"flex",flexWrap:"wrap",gap:6,alignItems:"center",paddingBottom:8}}>
            <span style={{fontSize:11,color:"#888",marginRight:2}}>Include:</span>
            {STATUS_OPTS.map(opt=>(
              <button key={opt.key} onClick={()=>toggleStatus(opt.key)}
                style={{...pillStyle(statuses.includes(opt.key)),
                  background:statuses.includes(opt.key)?opt.bg:"transparent",
                  color:statuses.includes(opt.key)?opt.fg:"#666",
                  border:`1.5px solid ${statuses.includes(opt.key)?opt.fg+"44":"#e0ddd5"}`}}>
                {opt.label}
              </button>
            ))}
            <div style={{width:1,height:18,background:"#e0ddd5",flexShrink:0}} />
            <span style={{fontSize:11,color:"#888"}}>Type:</span>
            {PLANT_TYPES.map(g=>(
              <Tip key={g.key} text={g.tip||g.label}>
                <button onClick={()=>togglePtype(g.key)} style={pillStyle(ptypes.includes(g.key))}>
                  {g.emoji} {g.label}
                </button>
              </Tip>
            ))}
            <div style={{width:1,height:18,background:"#e0ddd5",flexShrink:0}} />
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <span style={{fontSize:11,color:"#888"}}>Max height:</span>
              <div style={{position:"relative"}}>
                <input type="number" min="1" max="120" value={heightCap||""}
                  onChange={e=>{const v=parseFloat(e.target.value);setHeightCap(v>0?v:null);}}
                  placeholder="e.g. 8 for shrubs, 25 for small trees"
                  style={{border:"1.5px solid #e0ddd5",borderRadius:8,padding:"5px 8px",
                    fontFamily:"inherit",fontSize:12,outline:"none",color:"#2c2c2c",background:"white",
                    width:heightCap?70:230}} />
                {heightCap&&<button onClick={()=>setHeightCap(null)}
                  style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",
                    background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#aaa"}}>✕</button>}
              </div>
              {heightCap&&<span style={{fontSize:11,color:"#aaa"}}>ft</span>}
            </div>
          </div>

          {/* Row 2: Site + concerns/conditions + more */}
          <div style={{display:"flex",flexWrap:"wrap",gap:6,alignItems:"center",paddingBottom:10}}>
            <span style={{fontSize:11,color:"#888"}}>Site:</span>
            <button onClick={()=>setShowZones(!showZones)}
              style={{...pillStyle(!!zone,!!zone),position:"relative"}}>
              {zone?`📍 ${zoneInfo?.label||zone}`:"▼ Choose site type"}
              {zone&&<span onClick={e=>{e.stopPropagation();setZone(null);}} style={{marginLeft:4,opacity:0.7,fontSize:13}}>×</span>}
            </button>

            <div style={{width:1,height:18,background:"#e0ddd5",flexShrink:0}} />
            <span style={{fontSize:11,color:"#888"}}>Shaded by:</span>
            {CONCERN_OPTS.filter(c=>c.group==="shaded").map(c=>(
              <Tip key={c.key} text={c.tip}>
                <button onClick={()=>toggleConcern(c.key)} style={pillStyle(concerns.includes(c.key))}>
                  {c.emoji} {c.label}
                </button>
              </Tip>
            ))}
            <span style={{fontSize:11,color:"#888",marginLeft:2}}>Near:</span>
            {CONCERN_OPTS.filter(c=>c.group==="near").map(c=>(
              <Tip key={c.key} text={c.tip}>
                <button onClick={()=>toggleConcern(c.key)} style={pillStyle(concerns.includes(c.key))}>
                  {c.emoji} {c.label}
                </button>
              </Tip>
            ))}
            <div style={{width:1,height:18,background:"#e0ddd5",flexShrink:0}} />
            {CONCERN_OPTS.filter(c=>c.group==="site"||c.group==="concern"||c.group==="safety").map(c=>(
              <Tip key={c.key} text={c.tip}>
                <button onClick={()=>toggleConcern(c.key)} style={pillStyle(concerns.includes(c.key))}>
                  {c.emoji} {c.label}
                </button>
              </Tip>
            ))}
            <div style={{width:1,height:18,background:"#e0ddd5",flexShrink:0}} />
            <button onClick={()=>setShowMore(!showMore)}
              style={{...pillStyle(moreCount>0),padding:"5px 12px",borderRadius:8}}>
              More {moreCount>0&&<span style={{background:"#2d4a2d",color:"white",borderRadius:10,padding:"0 6px",fontSize:10,marginLeft:2}}>{moreCount}</span>} {showMore?"▲":"▼"}
            </button>
          </div>

          {/* Zone picker */}
          {showZones&&(
            <div style={{background:"white",border:"1px solid #e0ddd5",borderRadius:12,padding:14,marginBottom:10}}>
              <div style={{fontSize:12,color:"#888",marginBottom:10,fontStyle:"italic"}}>Choose a site type to sort plants by how well they fit there.</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:8}}>
                {MICROZONES.map(z=>(
                  <button key={z.key} onClick={()=>{setZone(z.key===zone?null:z.key);setShowZones(false);}}
                    style={{background:zone===z.key?"#2d4a2d":"#fafaf7",color:zone===z.key?"white":"#2c2c2c",
                      border:`2px solid ${zone===z.key?"#2d4a2d":"#e0ddd5"}`,borderRadius:8,padding:"10px 12px",
                      cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>
                    <div style={{fontSize:18,marginBottom:2}}>{z.emoji}</div>
                    <div style={{fontWeight:500,fontSize:12,marginBottom:2}}>{z.label}</div>
                    <div style={{fontSize:10,opacity:0.6,lineHeight:1.4}}>{z.desc}</div>
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* More filters */}
          {showMore&&(
            <div style={{background:"white",border:"1px solid #e0ddd5",borderRadius:12,padding:16,marginBottom:10}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                <div>
                  <div style={{fontSize:11,color:"#aaa",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Moisture</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {[{v:"dry",e:"🏜️",l:"Dry"},{v:"average",e:"🌱",l:"Average"},{v:"moist",e:"💧",l:"Moist"}].map(o=>(
                      <button key={o.v} onClick={()=>setMoisture(moisture===o.v?null:o.v)} style={pillStyle(moisture===o.v)}>{o.e} {o.l}</button>
                    ))}
                    <label style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",fontSize:12}}>
                      <input type="checkbox" checked={irrigated} onChange={e=>setIrrigated(e.target.checked)} style={{accentColor:"#2d4a2d"}} />
                      💦 Irrigated
                    </label>
                  </div>
                </div>
                <div>
                  <div style={{fontSize:11,color:"#aaa",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>
                    Sun {inferredSun&&<span style={{color:"#2d4a2d",textTransform:"none",fontWeight:500}}> — inferred from site ✓</span>}
                  </div>
                  {inferredSun?(
                    <div style={{fontSize:13,color:"#2d4a2d",fontWeight:500}}>
                      {inferredSun==="full"?"☀️ Full sun":inferredSun==="shade"?"🌥️ Shade":"⛅ Part shade"}
                    </div>
                  ):(
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      {[{v:"full",e:"☀️",l:"Full sun"},{v:"part",e:"⛅",l:"Part shade"},{v:"shade",e:"🌥️",l:"Shade"}].map(o=>(
                        <button key={o.v} onClick={()=>setSun(sun===o.v?null:o.v)} style={pillStyle(sun===o.v)}>{o.e} {o.l}</button>
                      ))}
                    </div>
                  )}
                </div>
                <div>
                  <div style={{fontSize:11,color:"#aaa",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Flower color</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                    {flowerColors.map(c=>(
                      <button key={c} onClick={()=>toggleFlower(c)} style={{...pillStyle(rflower.includes(c)),display:"inline-flex",alignItems:"center",gap:4}}>
                        <div style={{width:10,height:10,borderRadius:"50%",background:COLOR_MAP[c]||"#ccc",border:c==="white"?"1px solid #ccc":"none"}} />{c}
                      </button>
                    ))}
                  </div>
                </div>
                <div>
                  <div style={{fontSize:11,color:"#aaa",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Other</div>
                  <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:12}}>
                    <input type="checkbox" checked={rwinter} onChange={e=>setRwinter(e.target.checked)} style={{accentColor:"#2d4a2d"}} />
                    ❄️ Winter interest only
                  </label>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>

      {/* ── Content ── */}
      <div style={{maxWidth:900,margin:"0 auto",padding:"0 20px 80px"}}>
        <ShareBar label={label} onLabelChange={setLabel} />

        {/* Active filter chips */}
        {activeFilters.length>0&&(
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10,marginTop:6}}>
            {activeFilters.map((f,i)=>(
              <div key={i} style={{display:"inline-flex",alignItems:"center",gap:5,padding:"4px 10px",
                borderRadius:20,background:"#f0faf0",border:"1px solid #c8e6c9",fontSize:11,color:"#2d4a2d"}}>
                {f.label}
                <span onClick={f.clear} style={{cursor:"pointer",opacity:0.5,fontSize:13}}>×</span>
              </div>
            ))}
            <button onClick={()=>{setSearch("");setZone(null);setPtypes([]);setConcerns([]);setHeightCap(null);setMoisture(null);setSun(null);setIrrigated(false);setRflower([]);setRwinter(false);setStatuses(["native","nearnative"]);}}
              style={{fontSize:11,color:"#aaa",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>
              Clear all
            </button>
          </div>
        )}

        {/* Loading / error */}
        {loading&&<div style={{textAlign:"center",padding:"60px 20px",color:"#888"}}><div style={{fontSize:36,marginBottom:12}}>🌱</div><div style={{fontStyle:"italic"}}>Loading plant data…</div></div>}
        {error&&<div style={{textAlign:"center",padding:"60px 20px"}}><div style={{fontSize:36,marginBottom:12}}>⚠️</div><div style={{fontWeight:"bold",color:"#b71c1c",marginBottom:8}}>Could not load plant data</div><div style={{fontSize:12,color:"#888"}}>{error}</div></div>}

        {!loading&&!error&&(
          <>
            {/* Preset buttons */}
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
              <button onClick={()=>{setShowSuggest(!showSuggest);setHabitatMode(false);}}
                style={{...btnStyle(showSuggest?"#2d4a2d":"white",showSuggest?"white":"#2d4a2d"),
                  border:"2px solid #2d4a2d",borderRadius:10}}>
                ✨ Suggest a palette
              </button>
              <button onClick={()=>{setHabitatMode(!habitatMode);setShowSuggest(false);}}
                style={{...btnStyle(habitatMode?"#2d4a2d":"white",habitatMode?"white":"#2d4a2d"),
                  border:"2px solid #2d4a2d",borderRadius:10}}>
                🌿 Habitat patch {habitatMode&&"✓"}
              </button>
              {!zone&&!showSuggest&&!habitatMode&&(
                <span style={{fontSize:12,color:"#aaa",alignSelf:"center",fontStyle:"italic"}}>
                  Choose a site type to get the best suggestions
                </span>
              )}
            </div>

            {/* Suggested palette panel */}
            {showSuggest&&(
              <SuggestPanel
                plants={filtered}
                siteKey={zone}
                hearts={hearts}
                onHeart={toggleHeart}
                onClose={()=>setShowSuggest(false)}
              />
            )}

            {/* Habitat view */}
            {habitatMode?(
              <HabitatView
                plants={filtered}
                concerns={concerns}
                heightCap={heightCap}
                hearts={hearts}
                onHeart={toggleHeart}
                onLoosen={type=>{
                  if(type==="shadedby") setConcerns(prev=>prev.filter(c=>!c.startsWith("shadedby")));
                  if(type==="near_walnut") setConcerns(prev=>prev.filter(c=>c!=="near_walnut"));
                  if(type==="height") setHeightCap(null);
                }}
              />
            ):(
              <>
                {/* Normal results */}
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
                  <div style={{fontSize:13,color:"#888",fontStyle:"italic"}}>
                    {results.length} plant{results.length!==1?"s":""}{zone?` for ${zoneInfo?.label}`:""} · Massachusetts
                  </div>
                  <div style={{display:"flex",gap:5,alignItems:"center"}}>
                    <span style={{fontSize:11,color:"#aaa"}}>Sort:</span>
                    {[{v:"fit",l:"📍 Best fit"},{v:"wildlife",l:"🦋 Wildlife"},{v:"alpha",l:"A–Z"}].map(({v,l})=>(
                      <button key={v} onClick={()=>setSortBy(v)}
                        style={{padding:"3px 10px",borderRadius:16,fontSize:11,fontFamily:"inherit",cursor:"pointer",
                          border:`1px solid ${sortBy===v?"#2d4a2d":"#e0ddd5"}`,
                          background:sortBy===v?"#2d4a2d":"transparent",
                          color:sortBy===v?"white":"#666"}}>{l}</button>
                    ))}
                  </div>
                </div>
                {results.map(p=>(
                  <PlantCard key={p.latin} plant={p} siteKey={zone} hearted={hearts.includes(p.latin)} onHeart={toggleHeart} />
                ))}
                {results.length===0&&(
                  <div style={{textAlign:"center",padding:"50px 20px",color:"#888"}}>
                    <div style={{fontSize:36,marginBottom:12}}>🤔</div>
                    <div style={{fontStyle:"italic",marginBottom:10}}>No plants match all your filters.</div>
                    <div style={{fontSize:12}}>Try loosening the height cap, removing a concern, or broadening moisture or sun settings.</div>
                  </div>
                )}
              </>
            )}
          </>
        )}
      </div>

      {/* Hearts panel */}
      <HeartsPanel
        hearts={hearts}
        plants={plants}
        open={panelOpen}
        onClose={()=>setPanelOpen(false)}
        isHabitat={habitatMode}
      />

      {/* Footer */}
      <div style={{textAlign:"center",padding:16,color:"#aaa",fontSize:11,borderTop:"1px solid #e0ddd5"}}>
        <a href="https://www.summersgardening.com" target="_blank" rel="noopener noreferrer" style={{color:"#2d4a2d",textDecoration:"none"}}>summersgardening.com</a>
        {" · "}Plant data by Rachel Summers · Photos via iNaturalist (CC BY-NC) · Native status per Massachusetts (Go Botany)
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
