<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plant Palette Builder — for Massachusetts</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    :root {
      --forest:#2d4a2d; --leaf:#4a7c59; --sage:#8aab8a;
      --mist:#f0ede4; --cream:#fafaf7; --bark:#2c2c2c;
      --stone:#888; --border:#e0ddd5; --radius:12px;
      --shadow:0 2px 12px rgba(0,0,0,0.08);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html{font-size:16px;}
    body{background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--bark);font-size:1rem;}
    @media print{.no-print{display:none!important;}.print-card{break-inside:avoid;}body{background:white;}}
    .tip-wrap{position:relative;display:inline-flex;}
    .tip-wrap .tip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#333;color:white;font-size:11px;padding:5px 9px;border-radius:6px;z-index:400;pointer-events:none;font-family:'DM Sans',sans-serif;max-width:220px;white-space:normal;text-align:center;line-height:1.4;}
    .tip-wrap:hover .tip{display:block;}
    /* Mobile filter drawer */
    .filter-drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:199;}
    .filter-drawer-overlay.open{display:block;}
    .filter-drawer{display:none;position:fixed;left:0;right:0;bottom:0;background:white;border-radius:16px 16px 0 0;z-index:200;max-height:85vh;overflow-y:auto;padding:0 0 env(safe-area-inset-bottom);}
    .filter-drawer.open{display:block;}
    .drawer-handle{width:40px;height:4px;background:#ccc;border-radius:2px;margin:12px auto 16px;}
    /* Swipe lightbox */
    .lightbox{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.94);flex-direction:column;align-items:center;justify-content:center;}
    .lightbox.open{display:flex;}
    .lb-img{max-width:90vw;max-height:75vh;border-radius:12px;object-fit:contain;user-select:none;}
    .lb-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.15);border:none;color:white;font-size:20px;border-radius:50%;width:44px;height:44px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.15);border:none;color:white;font-size:22px;border-radius:50%;width:48px;height:48px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .lb-nav:hover{background:rgba(255,255,255,0.28);}
    .lb-prev{left:16px;} .lb-next{right:16px;}
    .lb-dots{display:flex;gap:7px;margin-top:14px;}
    .lb-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.3);cursor:pointer;}
    .lb-dot.on{background:white;}
    .lb-credit{color:rgba(255,255,255,0.4);font-size:11px;margin-top:8px;max-width:80vw;text-align:center;}
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const {useState,useMemo,useEffect,useCallback,useRef,useLayoutEffect} = React;

const SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRiUGIg_9Eqv8Uwgp__RzcAJqNcB5vq7MHTbY1ZMqoEVtgNVlxo4CtocWgvztvQwUEzXOmMvjgP5UGA/pub?output=csv&gid=1137105758";
const SHEET_VIEW_URL="https://docs.google.com/spreadsheets/d/1W1CL_Q4guXnsLfCoPmM61rYXzBwHKB765L_rSAocjEY/edit?usp=sharing";

const MICROZONES=[
  {key:"Mesic South- Facing Heat",label:"South-facing / Hot",emoji:"☀️",desc:"Hot, dry, south-facing slope or pavement edge",impliesSun:"full"},
  {key:"Dry Upper Slope",label:"High and exposed",emoji:"🏔️",desc:"Top of a slope, drains fast after rain",impliesSun:"full"},
  {key:"Mid-Slope Mesic",label:"Typical yard",emoji:"🌿",desc:"Average suburban yard, moderate moisture"},
  {key:"Moist Lower Area",label:"Low or soggy",emoji:"💧",desc:"Low spot, rain garden, holds moisture"},
  {key:"Woodland Edge",label:"Woodland edge",emoji:"🌳",desc:"Where lawn meets trees; dappled light",impliesSun:"part"},
  {key:"Conifer Shade",label:"Under conifers",emoji:"🌲",desc:"Under hemlock, spruce, or fir",impliesSun:"shade"},
  {key:"Dry Slope",label:"Sloped and dry",emoji:"⛰️",desc:"Grades downhill, drains fast, lean soil",impliesSun:"full"},
];
const ZONE_KEYS=MICROZONES.map(z=>z.key);

const SCORE_LABELS=["","Don't Use","Marginal","OK","Strong","Best Fit"];
const SCORE_COLORS=["#ccc","#ef5350","#ff9800","#fdd835","#66bb6a","#2e7d32"];

const STATUS_OPTS=[
  {key:"native",    label:"Native to MA",   bg:"#e8f5e9",fg:"#2e7d32"},
  {key:"nearnative",label:"Near-Native",    bg:"#e3f2fd",fg:"#1565c0"},
  {key:"cultivar",  label:"Native Cultivar",bg:"#f3e5f5",fg:"#6a1b9a"},
  {key:"nonnative", label:"Safe Non-Native",bg:"#fff8e1",fg:"#f57f17"},
];
const STATUS_COLORS={
  "Native":                   {bg:"#e8f5e9",text:"#2e7d32",label:"Native to MA"},
  "Native Cultivar":          {bg:"#f3e5f5",text:"#6a1b9a",label:"Native Cultivar"},
  "Near-Native":              {bg:"#e3f2fd",text:"#1565c0",label:"Near-Native"},
  "Near Native":              {bg:"#e3f2fd",text:"#1565c0",label:"Near-Native"},
  "Safe Non-Native":          {bg:"#fff8e1",text:"#f57f17",label:"Safe Non-Native"},
  "Safe Non Native":          {bg:"#fff8e1",text:"#f57f17",label:"Safe Non-Native"},
  "Native/Non-Native Hybrid": {bg:"#fce4ec",text:"#880e4f",label:"Hybrid"},
  "Native / Nonnative Hybrid":{bg:"#fce4ec",text:"#880e4f",label:"Hybrid"},
};

const PLANT_TYPES=[
  {key:"woody",    label:"Woody",           emoji:"🌳",tip:"Trees & shrubs — plants with permanent stems",
   cats:new Set(["Tree - Large","Tree - Small","Tall Canopy Tree","Midstory Tree","Shrub","Shrub – Large","Shrub – Small","Flowering Shrub","Broadleaf Evergreen"])},
  {key:"perennial",label:"Perennials",      emoji:"🌼",cats:new Set(["Flowering Perennial","Foliage Perennial","Annual"])},
  {key:"grass",   label:"Grasses & sedges", emoji:"🌾",cats:new Set(["Grass"])},
  {key:"fern",    label:"Ferns",            emoji:"🌿",cats:new Set(["Fern"])},
  {key:"ground",  label:"Groundcovers",     emoji:"🍀",cats:new Set(["Groundcover"])},
  {key:"vine",    label:"Vines",            emoji:"🌿",cats:new Set(["Vine"])},
];

const CONCERN_OPTS=[
  {key:"shadedby_norway", emoji:"🍁",label:"Norway maple",  tip:"Allelopathic roots and dense shade — one of the hardest sites for plants",group:"shaded"},
  {key:"shadedby_pine",   emoji:"🌲",label:"White pines",   tip:"Dry acidic needle duff; very few plants tolerate this well",group:"shaded"},
  {key:"shadedby_conifer",emoji:"🌲",label:"Other conifers",tip:"Under hemlock, spruce, or fir — dry, dark, acidic",group:"shaded"},
  {key:"near_walnut",     emoji:"🌰",label:"Black walnut",  tip:"Produces juglone, a chemical toxic to many plants",group:"near"},
  {key:"postconstruction",emoji:"🏗️",label:"Post-construction",tip:"Compacted or disturbed fill soil — favor tough, adaptable pioneers",group:"site"},
  {key:"deer",    emoji:"🦌",label:"Deer",        tip:"Excludes plants frequently browsed to the ground",group:"concern"},
  {key:"rabbits", emoji:"🐇",label:"Rabbits",     tip:"Excludes plants vulnerable to rabbit chewing, especially young woody stems",group:"concern"},
  {key:"dogs",    emoji:"🐕",label:"Dogs",        tip:"Excludes plants toxic to dogs",group:"safety"},
  {key:"cats",    emoji:"🐈",label:"Cats",        tip:"Excludes plants toxic to cats",group:"safety"},
  {key:"children",emoji:"👶",label:"Children",   tip:"Excludes plants with parts toxic to children",group:"safety"},
  {key:"nospread",emoji:"🚫",label:"No spreaders",tip:"Excludes plants that fill space aggressively",group:"concern"},
];

const CATEGORY_ICONS={"Tree - Large":"🌳","Tree - Small":"🌲","Tall Canopy Tree":"🌳","Midstory Tree":"🌿","Shrub":"🌾","Shrub – Large":"🌾","Shrub – Small":"🌾","Flowering Shrub":"🌸","Flowering Perennial":"🌼","Foliage Perennial":"🍃","Groundcover":"🌿","Grass":"🌾","Fern":"🌿","Broadleaf Evergreen":"🍀","Vine":"🌿","Annual":"🌻"};
const CAT_STYLES={"Tree - Large":{bg:"#e8f5e9",fg:"#2e7d32"},"Tree - Small":{bg:"#e8f5e9",fg:"#388e3c"},"Tall Canopy Tree":{bg:"#e8f5e9",fg:"#1b5e20"},"Midstory Tree":{bg:"#f1f8e9",fg:"#558b2f"},"Shrub":{bg:"#fff8e1",fg:"#f57f17"},"Shrub – Large":{bg:"#fff8e1",fg:"#e65100"},"Shrub – Small":{bg:"#fff8e1",fg:"#f57f17"},"Flowering Shrub":{bg:"#fce4ec",fg:"#c2185b"},"Flowering Perennial":{bg:"#fffde7",fg:"#f9a825"},"Foliage Perennial":{bg:"#e8f5e9",fg:"#388e3c"},"Groundcover":{bg:"#e8f5e9",fg:"#2e7d32"},"Grass":{bg:"#f9fbe7",fg:"#827717"},"Fern":{bg:"#e0f2f1",fg:"#00695c"},"Broadleaf Evergreen":{bg:"#e8f5e9",fg:"#1b5e20"},"Vine":{bg:"#f3e5f5",fg:"#6a1b9a"},"Annual":{bg:"#fff8e1",fg:"#f57f17"}};
const COLOR_MAP={white:"#ffffff",cream:"#fffdd0",yellow:"#fdd835",orange:"#ff9800",red:"#ef5350",pink:"#f48fb1",rose:"#e91e63",magenta:"#e040fb",purple:"#9c27b0",lavender:"#ce93d8",blue:"#42a5f5",violet:"#7e57c2",maroon:"#880e4f",green:"#66bb6a","yellow-green":"#cddc39","blue-gray":"#90a4ae",silver:"#cfd8dc","dark green":"#1b5e20","lime green":"#cddc39",burgundy:"#6d1f1f",bronze:"#cd7f32",gold:"#ffc107","blue-green":"#00695c"};

const WOODY_CATS=new Set(["Tree - Large","Tree - Small","Tall Canopy Tree","Midstory Tree","Shrub","Shrub – Large","Shrub – Small","Flowering Shrub","Broadleaf Evergreen","Vine"]);
const CANOPY_CATS=new Set(["Tree - Large","Tall Canopy Tree"]);

const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const MONTHS_SHORT=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

// ── localStorage ───────────────────────────────────────────────────────────
const LS_KEY="ppb_hearts_v2";
function loadHearts(){try{return JSON.parse(localStorage.getItem(LS_KEY)||"[]");}catch(e){return[];}}
function saveHearts(a){try{localStorage.setItem(LS_KEY,JSON.stringify(a));}catch(e){}}

// ── URL ────────────────────────────────────────────────────────────────────
function readURL(){
  const p=new URLSearchParams(window.location.search);
  return{
    view:       p.get("view")||"main",
    search:     p.get("q")||"",
    zone:       p.get("zone")||null,
    ptypes:     p.get("pt")?p.get("pt").split(","):[],
    statuses:   p.get("st")?p.get("st").split(","):["native","nearnative"],
    concerns:   p.get("cx")?p.get("cx").split(","):[],
    heightCap:  p.get("hc")?parseFloat(p.get("hc")):null,
    moisture:   p.get("mo")||null,
    sun:        p.get("su")||null,
    irrigated:  p.get("ir")==="1",
    rflower:    p.get("fl")?p.get("fl").split(","):[],
    rwinter:    p.get("wi")==="1",
    sortBy:     p.get("sb")||"fit",
    label:      p.get("label")||"",
    sharedHearts:p.get("hearts")?p.get("hearts").split(","):[],
  };
}
function pushURL(s){
  const p=new URLSearchParams();
  if(s.view&&s.view!=="main") p.set("view",s.view);
  if(s.search) p.set("q",s.search);
  if(s.zone)   p.set("zone",s.zone);
  if(s.ptypes?.length)   p.set("pt",s.ptypes.join(","));
  const def=["native","nearnative"];
  if(JSON.stringify([...s.statuses].sort())!==JSON.stringify([...def].sort())) p.set("st",s.statuses.join(","));
  if(s.concerns?.length) p.set("cx",s.concerns.join(","));
  if(s.heightCap) p.set("hc",String(s.heightCap));
  if(s.moisture)  p.set("mo",s.moisture);
  if(s.sun)       p.set("su",s.sun);
  if(s.irrigated) p.set("ir","1");
  if(s.rflower?.length) p.set("fl",s.rflower.join(","));
  if(s.rwinter)   p.set("wi","1");
  if(s.sortBy&&s.sortBy!=="fit") p.set("sb",s.sortBy);
  if(s.label)     p.set("label",s.label);
  const str=p.toString();
  window.history.replaceState(null,"",str?`${location.pathname}?${str}`:location.pathname);
}

// ── Data ───────────────────────────────────────────────────────────────────
function parseCSV(text){
  const lines=text.split(/\r?\n/);
  function pl(line){const out=[];let f="";let q=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){if(q&&line[i+1]==='"'){f+='"';i++;}else q=!q;}else if(c===','&&!q){out.push(f);f="";}else f+=c;}out.push(f);return out;}
  const headers=pl(lines[0]);const rows=[];
  for(let i=1;i<lines.length;i++){if(!lines[i].trim())continue;const vals=pl(lines[i]);const row={};headers.forEach((h,idx)=>{row[h.trim()]=(vals[idx]||"").trim();});rows.push(row);}
  return rows;
}
function getTypeKey(cat){for(const g of PLANT_TYPES)if(g.cats.has(cat))return g.key;return"perennial";}
function monthIndex(s){const m=MONTHS_SHORT.findIndex(x=>s?.toLowerCase().startsWith(x.toLowerCase()));return m>=0?m:MONTHS.findIndex(x=>s?.toLowerCase().startsWith(x.toLowerCase()));}

function rowToPlant(row){
  const scores={};
  ZONE_KEYS.forEach(k=>{const m=(row[k]||"").match(/\d/);scores[k]=m?parseInt(m[0]):0;});
  if(!Object.values(scores).some(s=>s>0))return null;
  const cur=row["curated image url"]||"";
  const inat=row["inaturalist image url"]||"";
  const status=row["Ecological Status"]||"";
  const seedStartIdx=monthIndex(row["seed_ripe_start"]||"");
  const seedEndIdx=monthIndex(row["seed_ripe_end"]||"");
  return{
    common:row["Common Name"]||"",latin:row["Latin Name"]||"",
    category:row["Category"]||"",status,
    bloom:row["Bloom Period"]||"",seasonal:row["Seasonal Interest"]||"",
    evergreen:row["Evergreen"]||"",height:row["Height Class"]||"",
    heightFt:parseFloat(row["Max Height (ft)"])||0,
    sun:row["Sun Exposure"]||"",moisture:row["Moisture Preference"]||"",
    notes:row["Notes"]||"",
    image:cur||inat,curatedImage:cur,inatImage:inat,
    role:row["Habitat Patch Role"]||"",aggressive:row["Aggressive"]||"",
    flowerColor:row["Flower Color"]||"",foliageColor:row["Foliage Color"]||"",
    deerPressure:row["deer_pressure"]||"",rabbitDamage:row["rabbit_damage"]||"",
    toxicDogs:row["toxic_dogs"]||"",toxicCats:row["toxic_cats"]||"",toxicChildren:row["toxic_children"]||"",
    juglone:row["juglone_sensitivity"]||"",whitePine:row["white_pine_tolerance"]||"",norwayMaple:row["norway_maple_tolerance"]||"",
    seedStart:row["seed_ripe_start"]||"",seedEnd:row["seed_ripe_end"]||"",
    seedStartIdx,seedEndIdx,
    seedNotes:row["seed_notes"]||"",propagNotes:row["propagation_notes"]||"",
    caterpillars:parseInt(row["caterpillar_species"])||0,
    insectConf:row["insect_data_confidence"]||"",
    isCultivar:status.includes("Cultivar"),
    isWoody:WOODY_CATS.has(row["Category"]||""),
    isCanopy:CANOPY_CATS.has(row["Category"]||""),
    typeKey:getTypeKey(row["Category"]||""),
    scores,
  };
}

function getSiteScore(plant,key){
  if(!key)return null;
  if(ZONE_KEYS.includes(key))return plant.scores[key]||0;
  if(key==="shadedby_norway"||key==="norway-maple"){if(plant.norwayMaple==="avoid"||!plant.norwayMaple)return 0;const b=plant.scores["Conifer Shade"]||0;return plant.norwayMaple==="tolerant"?Math.min(5,b+1):b;}
  if(key==="shadedby_pine"||key==="white-pine"){if(plant.whitePine==="avoid"||!plant.whitePine)return 0;const b=plant.scores["Conifer Shade"]||0;return plant.whitePine==="tolerant"?Math.min(5,b+1):b;}
  if(key==="shadedby_conifer")return plant.scores["Conifer Shade"]||0;
  if(key==="near_walnut"){if(plant.juglone==="sensitive")return 0;return Math.max(plant.scores["Mid-Slope Mesic"]||0,plant.scores["Woodland Edge"]||0);}
  if(key==="postconstruction")return Math.max(plant.scores["Dry Upper Slope"]||0,plant.scores["Dry Slope"]||0);
  return 0;
}

function matchStatus(plant,statuses){
  if(!statuses?.length)return true;
  const s=plant.status.toLowerCase().replace(/-/g,"").replace(/ /g,"");
  if(statuses.includes("native")&&s==="native")return true;
  if(statuses.includes("cultivar")&&s.includes("cultivar"))return true;
  if(statuses.includes("nearnative")&&(s==="nearnative"||s==="near native"))return true;
  if(statuses.includes("nonnative")&&(s==="safenonnative"||s.includes("hybrid")))return true;
  return false;
}

function applyFilters(plants,f,siteKey){
  return plants.filter(p=>{
    if(!matchStatus(p,f.statuses))return false;
    if(f.ptypes?.length&&!f.ptypes.includes(p.typeKey))return false;
    if(f.heightCap&&p.heightFt>f.heightCap)return false;
    if(f.search){const q=f.search.toLowerCase();if(!p.common.toLowerCase().includes(q)&&!p.latin.toLowerCase().includes(q))return false;}
    if(siteKey&&ZONE_KEYS.includes(siteKey)&&(p.scores[siteKey]||0)<1)return false;
    const cx=f.concerns||[];
    if(cx.includes("shadedby_norway")&&(p.norwayMaple==="avoid"||!p.norwayMaple))return false;
    if(cx.includes("shadedby_pine")&&(p.whitePine==="avoid"||!p.whitePine))return false;
    if(cx.includes("shadedby_conifer")&&(p.scores["Conifer Shade"]||0)<2)return false;
    if(cx.includes("near_walnut")&&p.juglone==="sensitive")return false;
    if(cx.includes("postconstruction")&&(getSiteScore(p,"postconstruction")||0)<3)return false;
    if(cx.includes("deer")&&p.deerPressure==="high")return false;
    if(cx.includes("rabbits")&&p.rabbitDamage==="high")return false;
    if(cx.includes("dogs")&&p.toxicDogs==="yes")return false;
    if(cx.includes("cats")&&p.toxicCats==="yes")return false;
    if(cx.includes("children")&&p.toxicChildren==="yes")return false;
    if(cx.includes("nospread")&&p.aggressive==="Y")return false;
    if(f.sun){const sun=(p.sun||"").toLowerCase();if(f.sun==="full"&&!sun.startsWith("full sun"))return false;if(f.sun==="shade"&&!sun.includes("shade"))return false;if(f.sun==="part"&&!sun.includes("part"))return false;}
    if(f.moisture){const m=(p.moisture||"").toLowerCase();const eff=f.irrigated?(f.moisture==="dry"?"average":f.moisture==="average"?"moist":"moist"):f.moisture;if(eff==="dry"&&!m.includes("dry")&&!m.includes("mesic"))return false;if(eff==="moist"&&!m.includes("moist")&&!m.includes("wet"))return false;if(eff==="average"&&!m.includes("mesic"))return false;}
    if(f.rflower?.length){const cols=p.flowerColor.split(/\s*[|]\s*/).map(c=>c.trim().toLowerCase());if(!f.rflower.some(rc=>cols.includes(rc)))return false;}
    if(f.rwinter){const w=(p.seasonal||"").toLowerCase().includes("winter")||(p.evergreen||"").toLowerCase()==="yes";if(!w)return false;}
    return true;
  });
}

function sortPlants(plants,sortBy,siteKey){
  return[...plants].sort((a,b)=>{
    if(sortBy==="wildlife")return(b.caterpillars||0)-(a.caterpillars||0);
    if(sortBy==="fit"&&siteKey){const d=(getSiteScore(b,siteKey)||0)-(getSiteScore(a,siteKey)||0);if(d!==0)return d;}
    return a.common.localeCompare(b.common);
  });
}

// ── Lightbox (React-managed) ───────────────────────────────────────────────
function Lightbox({photos,startIdx,onClose}){
  const[idx,setIdx]=useState(startIdx||0);
  const touchX=useRef(null);

  useEffect(()=>{
    setIdx(startIdx||0);
    const onKey=e=>{
      if(e.key==="ArrowLeft")setIdx(i=>Math.max(0,i-1));
      if(e.key==="ArrowRight")setIdx(i=>Math.min(photos.length-1,i+1));
      if(e.key==="Escape")onClose();
    };
    window.addEventListener("keydown",onKey);
    return()=>window.removeEventListener("keydown",onKey);
  },[startIdx,photos.length]);

  const onTouchStart=e=>touchX.current=e.touches[0].clientX;
  const onTouchEnd=e=>{
    if(touchX.current===null)return;
    const dx=e.changedTouches[0].clientX-touchX.current;
    if(dx<-50)setIdx(i=>Math.min(photos.length-1,i+1));
    if(dx>50) setIdx(i=>Math.max(0,i-1));
    touchX.current=null;
  };

  if(!photos.length)return null;
  const cur=photos[idx];
  return(
    <div style={{position:"fixed",inset:0,zIndex:500,background:"rgba(0,0,0,0.94)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}
      onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
      <button onClick={onClose} style={{position:"absolute",top:16,right:16,background:"rgba(255,255,255,0.15)",border:"none",color:"white",fontSize:20,borderRadius:"50%",width:44,height:44,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
      {idx>0&&<button onClick={()=>setIdx(i=>i-1)} style={{position:"absolute",left:16,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,0.15)",border:"none",color:"white",fontSize:22,borderRadius:"50%",width:48,height:48,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>}
      {idx<photos.length-1&&<button onClick={()=>setIdx(i=>i+1)} style={{position:"absolute",right:16,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,0.15)",border:"none",color:"white",fontSize:22,borderRadius:"50%",width:48,height:48,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>}
      <img src={cur.large||cur.medium} alt="" style={{maxWidth:"90vw",maxHeight:"75vh",borderRadius:12,objectFit:"contain"}} />
      {photos.length>1&&(
        <div style={{display:"flex",gap:7,marginTop:14}}>
          {photos.map((_,i)=>(
            <div key={i} onClick={()=>setIdx(i)} style={{width:8,height:8,borderRadius:"50%",background:i===idx?"white":"rgba(255,255,255,0.3)",cursor:"pointer"}} />
          ))}
        </div>
      )}
      {cur.credit&&<div style={{color:"rgba(255,255,255,0.4)",fontSize:11,marginTop:8,maxWidth:"80vw",textAlign:"center"}}>{cur.credit}</div>}
      <div style={{color:"rgba(255,255,255,0.3)",fontSize:11,marginTop:4}}>Tap outside or press Esc to close · swipe to browse</div>
    </div>
  );
}

// ── Tip wrapper ────────────────────────────────────────────────────────────
function Tip({text,children}){
  return <span className="tip-wrap">{children}<span className="tip">{text}</span></span>;
}

// ── Plant thumb ────────────────────────────────────────────────────────────
function PlantThumb({plant,size=48,radius=8}){
  const[failed,setFailed]=useState(false);
  const st=CAT_STYLES[plant.category]||{bg:"#f0ede4",fg:"#4a7c59"};
  const em=CATEGORY_ICONS[plant.category]||"🌿";
  if(!plant.image||failed)return(
    <div style={{width:size,height:size,borderRadius:radius,flexShrink:0,background:st.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <div style={{fontSize:size*0.38,lineHeight:1}}>{em}</div>
      <div style={{fontSize:size*0.18,fontWeight:"bold",color:st.fg}}>{plant.common.charAt(0)}</div>
    </div>
  );
  return <img src={plant.image} alt={plant.common} onError={()=>setFailed(true)} style={{width:size,height:size,borderRadius:radius,objectFit:"cover",flexShrink:0}} />;
}

function ColorDots({colorStr,size=9}){
  if(!colorStr)return null;
  return <div style={{display:"flex",gap:3,flexWrap:"wrap",alignItems:"center"}}>{colorStr.split(/\s*[|]\s*/).map(c=>c.trim()).filter(Boolean).map((c,i)=><div key={i} title={c} style={{width:size,height:size,borderRadius:"50%",background:COLOR_MAP[c]||"#ccc",border:c==="white"?"1px solid #ccc":"none",flexShrink:0}} />)}</div>;
}

function RiskBadges({plant}){
  const b=[];
  if(plant.deerPressure==="high") b.push({t:"🦌 High deer pressure",bg:"#fff3e0",fg:"#e65100"});
  if(plant.rabbitDamage==="high") b.push({t:"🐇 High rabbit damage",bg:"#fff3e0",fg:"#bf360c"});
  if(plant.aggressive==="Y")      b.push({t:"🌿 Fills space well",  bg:"#e8f5e9",fg:"#2e7d32"});
  if(plant.toxicDogs==="yes")     b.push({t:"🐕 Toxic to dogs",     bg:"#fce4ec",fg:"#c62828"});
  if(plant.toxicCats==="yes")     b.push({t:"🐈 Toxic to cats",     bg:"#fce4ec",fg:"#c62828"});
  if(plant.toxicChildren==="yes") b.push({t:"👶 Toxic to children", bg:"#fce4ec",fg:"#c62828"});
  if(!b.length)return null;
  return <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:8}}>{b.map((x,i)=><span key={i} style={{fontSize:11,padding:"2px 8px",borderRadius:10,background:x.bg,color:x.fg,fontWeight:"bold"}}>{x.t}</span>)}</div>;
}

// ── Photo gallery ──────────────────────────────────────────────────────────
function taxonQ(latin){return latin.replace(/['''][^''']*[''']/g,"").replace(/\bcultivars?\b/ig,"").replace(/\bhybrids?\b/ig,"").replace(/\bspp?\b/ig,"").replace(/\bvar\b.*/ig,"").replace(/[×x]\s+/g,"").trim().split(/\s+/).slice(0,2).join(" ");}

function PhotoGallery({plant}){
  const[photos,setPhotos]=useState(null);
  const[lbIdx,setLbIdx]=useState(null);

  useEffect(()=>{
    if(photos!==null)return;
    const name=taxonQ(plant.latin);
    const cur=plant.curatedImage;
    if(!name){setPhotos(cur?[{medium:cur,large:cur,thumb:cur,credit:""}]:[]);return;}
    fetch(`https://api.inaturalist.org/v1/observations?taxon_name=${encodeURIComponent(name)}&quality_grade=research&photos=true&per_page=5&order_by=votes`)
      .then(r=>r.json())
      .then(d=>{
        const imgs=[];
        if(cur)imgs.push({medium:cur,large:cur,thumb:cur,credit:""});
        (d.results||[]).forEach(obs=>{(obs.photos||[]).forEach(ph=>{if(imgs.length>=5)return;const med=(ph.url||"").replace("square","medium");if(!med.includes("http")||med===cur)return;imgs.push({thumb:ph.url||"",medium:med,large:(ph.url||"").replace("square","large"),credit:(ph.attribution||"").replace(/\(c\)/g,"©")});});});
        if(!imgs.length&&plant.inatImage)imgs.push({medium:plant.inatImage,large:plant.inatImage,thumb:plant.inatImage,credit:""});
        setPhotos(imgs);
      })
      .catch(()=>{const fb=cur||plant.inatImage;setPhotos(fb?[{medium:fb,large:fb,thumb:fb,credit:""}]:[]);});
  },[plant.latin]);

  if(photos===null)return <div style={{width:200,height:165,borderRadius:10,background:"#f0ede4",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:11,color:"#aaa",fontStyle:"italic"}}>Loading…</span></div>;
  if(!photos.length)return <PlantThumb plant={plant} size={120} radius={10} />;

  const cur=photos[0];
  return(
    <>
      {lbIdx!==null&&<Lightbox photos={photos} startIdx={lbIdx} onClose={()=>setLbIdx(null)} />}
      <div style={{flexShrink:0,width:200}}>
        <img src={cur.medium} alt={plant.common} onClick={()=>setLbIdx(0)} onError={e=>{e.target.src=cur.thumb||"";}}
          style={{width:200,height:165,objectFit:"cover",borderRadius:10,display:"block",cursor:"zoom-in"}} />
        {photos.length>1&&(
          <div style={{display:"flex",gap:5,marginTop:6,overflowX:"auto",paddingBottom:2}}>
            {photos.map((ph,i)=>(
              <img key={i} src={ph.thumb} alt="" onClick={()=>setLbIdx(i)} onError={e=>e.target.style.opacity="0.2"}
                style={{width:34,height:34,borderRadius:5,objectFit:"cover",flexShrink:0,cursor:"pointer",
                  border:`2px solid ${i===0?"#2d4a2d":"transparent"}`,opacity:i===0?1:0.55,transition:"opacity 0.15s"}} />
            ))}
          </div>
        )}
        {cur.credit&&<div style={{fontSize:9,color:"#bbb",marginTop:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{cur.credit.length>70?cur.credit.slice(0,70)+"…":cur.credit}</div>}
        <div style={{fontSize:9,color:"#ccc",marginTop:1}}>via iNaturalist · {photos.length} photo{photos.length!==1?"s":""} · click to enlarge</div>
      </div>
    </>
  );
}

// ── Seed section ───────────────────────────────────────────────────────────
function SeedSection({plant}){
  const[open,setOpen]=useState(false);
  if(!plant.seedStart&&!plant.seedNotes&&!plant.propagNotes)return null;
  return(
    <div style={{marginTop:10}}>
      <button onClick={e=>{e.stopPropagation();setOpen(!open);}} style={{display:"flex",alignItems:"center",gap:5,background:"none",border:"none",cursor:"pointer",fontSize:13,color:"#2d4a2d",fontFamily:"inherit",padding:0}}>
        <span>🌱</span><span style={{fontWeight:"bold"}}>{open?"▲ Hide":"▼ Seed & propagation"}</span>
      </button>
      {open&&(
        <div style={{marginTop:8,padding:"10px 12px",background:"#f0faf0",borderRadius:8,fontSize:13,lineHeight:1.6,color:"#444"}}>
          {plant.seedStart&&plant.seedEnd&&<div style={{marginBottom:5}}><span style={{color:"#888"}}>Seeds ripe: </span><strong>{plant.seedStart}–{plant.seedEnd}</strong></div>}
          {plant.seedNotes&&<div style={{marginBottom:plant.propagNotes?7:0}}><span style={{color:"#888"}}>Collecting: </span>{plant.seedNotes}</div>}
          {plant.propagNotes&&<div><span style={{color:"#888"}}>Propagation: </span>{plant.propagNotes}</div>}
        </div>
      )}
    </div>
  );
}

    <div className="print-card" style={{background:"white",border:"1px solid #e0ddd5",borderRadius:10,overflow:"hidden",boxShadow:open?"0 4px 16px rgba(0,0,0,0.08)":"none",marginBottom:8}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px"}}>

            <div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>

        </div>
        <button onClick={e=>{e.stopPropagation();onHeart(plant.latin);}}
          style={{background:"none",border:"none",cursor:"pointer",fontSize:24,color:hearted?"#e57373":"#ddd",flexShrink:0,padding:"4px",lineHeight:1}}
          onMouseEnter={e=>e.currentTarget.style.transform="scale(1.2)"}

        </button>
      </div>
      {open&&(
        <div style={{padding:"0 14px 16px",borderTop:"1px solid #f0ede4"}}>
          <div style={{display:"flex",gap:16,marginTop:14,flexWrap:"wrap"}}>
            <PhotoGallery plant={plant} />
            <div style={{flex:1,minWidth:180}}>
              {plant.notes&&<p style={{margin:"0 0 10px",fontSize:14,lineHeight:1.6,color:"#444"}}>{plant.notes}</p>}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"5px 12px",fontSize:13}}>
                {plant.sun&&<div><span style={{color:"#888"}}>Sun: </span>{plant.sun}</div>}
                {plant.moisture&&<div><span style={{color:"#888"}}>Moisture: </span>{plant.moisture}</div>}
                {plant.heightFt?<div><span style={{color:"#888"}}>Height: </span>{plant.heightFt} ft</div>:null}
                {plant.bloom&&plant.bloom!=="N/A"&&<div><span style={{color:"#888"}}>Bloom: </span>{plant.bloom}</div>}
                {plant.seasonal&&<div><span style={{color:"#888"}}>Interest: </span>{plant.seasonal}</div>}
                {plant.aggressive&&<div><span style={{color:"#888"}}>Spreads: </span>{plant.aggressive==="Y"?"🌿 Fills space well":plant.aggressive==="M"?"Moderately":"Stays put"}</div>}
                {plant.deerPressure&&<div><span style={{color:"#888"}}>Deer: </span>{plant.deerPressure}</div>}
                {plant.rabbitDamage&&<div><span style={{color:"#888"}}>Rabbit: </span>{plant.rabbitDamage}</div>}
                {plant.flowerColor&&<div style={{display:"flex",alignItems:"center",gap:5,gridColumn:"1/-1"}}><span style={{color:"#888"}}>Flower: </span><ColorDots colorStr={plant.flowerColor} size={12} /></div>}
