  // ── URL ────────────────────────────────────────────────────────────────────
  function readURL() {
    const p = new URLSearchParams(window.location.search);
    return {
      mode:p.get("mode")||"browse", label:p.get("label")||"",
      bzone:p.get("bzone")||null, bsearch:p.get("bq")||"",
      wsite:p.get("wsite")||null, wsun:p.get("wsun")||null,
      wmoisture:p.get("wmoisture")||null, wsize:p.get("wsize")||null,
      wconcerns:p.get("wconcerns")?p.get("wconcerns").split(","):[],
      wdone:p.get("wdone")==="1",
      rnative:p.get("rnative")==="1", rscore:parseInt(p.get("rscore")||"3"),
      rcats:p.get("rcats")?p.get("rcats").split(","):[],
      rflower:p.get("rflower")?p.get("rflower").split(","):[],
      rfoliage:p.get("rfoliage")?p.get("rfoliage").split(","):[],
      rwinter:p.get("rwinter")==="1",
      hheight:p.get("hheight")||"any", hsun:p.get("hsun")||null,
      hmoisture:p.get("hmoisture")||null, hnearnat:p.get("hnearnat")==="1",
      hwpine:p.get("hwpine")==="1", hnorway:p.get("hnorway")==="1",
    };
  }
  function pushURL(s) {
    const p = new URLSearchParams();
    const set = (k,v,def) => { if(v && v!==def) p.set(k,v); };
    set("mode",s.mode,"browse"); set("label",s.label,"");
    set("bzone",s.bzone,""); set("bq",s.bsearch,"");
    set("wsite",s.wsite,""); set("wsun",s.wsun,"");
    set("wmoisture",s.wmoisture,""); set("wsize",s.wsize,"");
    if(s.wconcerns?.length) p.set("wconcerns",s.wconcerns.join(","));
    if(s.wdone) p.set("wdone","1");
    if(s.rnative) p.set("rnative","1");
    if(s.rscore&&s.rscore!==3) p.set("rscore",String(s.rscore));
    if(s.rcats?.length)    p.set("rcats",s.rcats.join(","));
    if(s.rflower?.length)  p.set("rflower",s.rflower.join(","));
    if(s.rfoliage?.length) p.set("rfoliage",s.rfoliage.join(","));
    if(s.rwinter) p.set("rwinter","1");
    if(s.hheight&&s.hheight!=="any") p.set("hheight",s.hheight);
    set("hsun",s.hsun,""); set("hmoisture",s.hmoisture,"");
    if(s.hnearnat) p.set("hnearnat","1");
    if(s.hwpine)   p.set("hwpine","1");
    if(s.hnorway)  p.set("hnorway","1");
    const str=p.toString();
    window.history.replaceState(null,"",str?`${window.location.pathname}?${str}`:window.location.pathname);
  }

  // ── Data ───────────────────────────────────────────────────────────────────
  function parseCSV(text) {
    const lines=text.split(/\r?\n/); if(!lines.length)return[];
    function pl(line){
      const out=[];let f="";let q=false;
      for(let i=0;i<line.length;i++){
        const c=line[i];
        if(c==='"'){if(q&&line[i+1]==='"'){f+='"';i++;}else q=!q;}
        else if(c===','&&!q){out.push(f);f="";}else f+=c;
      }out.push(f);return out;
    }
    const headers=pl(lines[0]);const rows=[];
    for(let i=1;i<lines.length;i++){
      if(!lines[i].trim())continue;
      const vals=pl(lines[i]);const row={};
      headers.forEach((h,idx)=>{row[h.trim()]=(vals[idx]||"").trim();});
      rows.push(row);
    }return rows;
  }
  function rowToPlant(row){
    const scores={};
    ZONE_KEYS.forEach(k=>{const m=(row[k]||"").match(/\d/);scores[k]=m?parseInt(m[0]):0;});
    if(!Object.values(scores).some(s=>s>0))return null;
    return {
      common:row["Common Name"]||"", latin:row["Latin Name"]||"",
      category:row["Category"]||"", status:row["Ecological Status"]||"",
      bloom:row["Bloom Period"]||"", seasonal:row["Seasonal Interest"]||"",
      evergreen:row["Evergreen"]||"", height:row["Height Class"]||"",
      heightFt:parseFloat(row["Max Height (ft)"])||0,
      sun:row["Sun Exposure"]||"", moisture:row["Moisture Preference"]||"",
      notes:row["Notes"]||"", image:row["inaturalist image url"]||"",
      role:row["Habitat Patch Role"]||"", aggressive:row["Aggressive"]||"",
      flowerColor:row["Flower Color"]||"", foliageColor:row["Foliage Color"]||"",
      deerPressure:row["deer_pressure"]||"", rabbitDamage:row["rabbit_damage"]||"",
      toxicDogs:row["toxic_dogs"]||"", toxicCats:row["toxic_cats"]||"",
      toxicChildren:row["toxic_children"]||"",
      whitePine:row["white_pine_tolerance"]||"",
      norwayMaple:row["norway_maple_tolerance"]||"",
      scores, isWoody:WOODY_CATS.has(row["Category"]||""),
    };
  }
  function getSiteScore(plant,key){
    if(!key)return null;
    if(ZONE_KEYS.includes(key))return plant.scores[key]||0;
    if(key==="white-pine"){if(plant.whitePine==="avoid"||!plant.whitePine)return 0;const b=plant.scores["Conifer Shade"]||0;return plant.whitePine==="tolerant"?Math.min(5,b+1):b;}
    if(key==="norway-maple"){if(plant.norwayMaple==="avoid"||!plant.norwayMaple)return 0;const b=plant.scores["Conifer Shade"]||0;return plant.norwayMaple==="tolerant"?Math.min(5,b+1):b;}
    if(key==="post-construction")return Math.max(plant.scores["Dry Upper Slope"]||0,plant.scores["Dry Slope"]||0);
    return 0;
  }
  function applyWizardFilters(plants,a){
    return plants.filter(p=>{
      if(a.site){const s=getSiteScore(p,a.site);if(s<3)return false;if(a.site==="norway-maple"&&(p.norwayMaple==="avoid"||!p.norwayMaple))return false;if(a.site==="white-pine"&&p.whitePine==="avoid")return false;}
      if(a.sun){const s=(p.sun||"").toLowerCase();if(a.sun==="full"&&!s.startsWith("full sun"))return false;if(a.sun==="shade"&&!s.includes("shade"))return false;if(a.sun==="part"&&!s.includes("part"))return false;}
      if(a.moisture){const m=(p.moisture||"").toLowerCase();if(a.moisture==="dry"&&!m.includes("dry")&&m!=="mesic")return false;if(a.moisture==="moist"&&!m.includes("moist")&&!m.includes("wet"))return false;if(a.moisture==="average"&&!m.includes("mesic"))return false;}
      if(a.size&&a.size!=="any"){const h=(p.height||"").toLowerCase();const hft=p.heightFt||0;if(a.size==="low"&&h!=="low"&&!(hft>0&&hft<=2))return false;if(a.size==="mid"&&h!=="mid"&&!(hft>1&&hft<=4))return false;if(a.size==="tall"&&h!=="tall"&&h!=="structural"&&!(hft>4))return false;}
      const c=a.concerns||[];
      if(c.includes("deer")&&p.deerPressure==="high")return false;if(c.includes("rabbits")&&p.rabbitDamage==="high")return false;
      if(c.includes("dogs")&&p.toxicDogs==="yes")return false;if(c.includes("cats")&&p.toxicCats==="yes")return false;
      if(c.includes("children")&&p.toxicChildren==="yes")return false;if(c.includes("spread")&&p.aggressive==="Y")return false;
      return true;
    });
  }
  function applyResultFilters(plants,siteKey,rf){
    return plants.filter(p=>{
      if(siteKey&&rf.rscore>3&&(getSiteScore(p,siteKey)||0)<rf.rscore)return false;
      if(rf.rnative&&!p.status.startsWith("Native"))return false;
      if(rf.rcats?.length&&!rf.rcats.includes(p.category))return false;
      if(rf.rwinter){const w=(p.seasonal||"").toLowerCase().includes("winter")||(p.evergreen||"").toLowerCase()==="yes";if(!w)return false;}
      if(rf.rflower?.length){const cols=p.flowerColor.split(/\s*[|]\s*/).map(c=>c.trim().toLowerCase());if(!rf.rflower.some(rc=>cols.includes(rc)))return false;}
      if(rf.rfoliage?.length){const cols=p.foliageColor.split(/\s*[|]\s*/).map(c=>c.trim().toLowerCase());if(!rf.rfoliage.some(rc=>cols.includes(rc)))return false;}
      return true;
    });
  }

  // ── UI primitives ──────────────────────────────────────────────────────────
  function PlantImage({plant,size=48,radius=8}){
    const[failed,setFailed]=useState(false);
    const cat=CATEGORY_ICONS[plant.category]||{emoji:"🌿",bg:"#f0ede4",fg:"#4a7c59"};
    if(!plant.image||failed)return(
      <div style={{width:size,height:size,borderRadius:radius,flexShrink:0,background:cat.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <div style={{fontSize:size*0.38,lineHeight:1}}>{cat.emoji}</div>
        <div style={{fontSize:size*0.18,fontWeight:"bold",color:cat.fg}}>{plant.common.charAt(0)}</div>
      </div>
    );
    return <img src={plant.image} alt={plant.common} onError={()=>setFailed(true)} style={{width:size,height:size,borderRadius:radius,objectFit:"cover",flexShrink:0}} />;
  }
  function ColorDots({colorStr,size=10}){
    if(!colorStr)return null;
    return <div style={{display:"flex",gap:3,flexWrap:"wrap",alignItems:"center"}}>{colorStr.split(/\s*[|]\s*/).map(c=>c.trim()).filter(Boolean).map((c,i)=><div key={i} title={c} style={{width:size,height:size,borderRadius:"50%",background:COLOR_MAP[c]||"#ccc",border:c==="white"?"1px solid #ccc":"none",flexShrink:0}} />)}</div>;
  }
  function RiskBadges({plant}){
    const b=[];
    if(plant.deerPressure==="high")b.push({t:"🦌 High deer pressure",bg:"#fff3e0",fg:"#e65100"});
    if(plant.rabbitDamage==="high")b.push({t:"🐇 High rabbit damage",bg:"#fff3e0",fg:"#bf360c"});
    if(plant.aggressive==="Y")b.push({t:"⚠️ Spreads vigorously",bg:"#fff8e1",fg:"#f57f17"});
    if(plant.toxicDogs==="yes")b.push({t:"🐕 Toxic to dogs",bg:"#fce4ec",fg:"#c62828"});
    if(plant.toxicCats==="yes")b.push({t:"🐈 Toxic to cats",bg:"#fce4ec",fg:"#c62828"});
    if(plant.toxicChildren==="yes")b.push({t:"👶 Toxic to children",bg:"#fce4ec",fg:"#c62828"});
    if(!b.length)return null;
    return <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:8}}>{b.map((x,i)=><span key={i} style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:x.bg,color:x.fg,fontWeight:"bold"}}>{x.t}</span>)}</div>;
  }

  // ── iNaturalist gallery ────────────────────────────────────────────────────
  function taxonQ(latin){return latin.replace(/['''][^''']*[''']/g,"").replace(/\bcultivars?\b/ig,"").replace(/\bhybrids?\b/ig,"").replace(/\bspp?\b/ig,"").replace(/\bvar\b.*/ig,"").replace(/[×x]\s+/g,"").trim().split(/\s+/).slice(0,2).join(" ");}
  function PhotoGallery({latin,fallbackImage}){
    const[photos,setPhotos]=useState(null);const[idx,setIdx]=useState(0);
    useEffect(()=>{
      if(photos!==null)return;const q=taxonQ(latin);if(!q){setPhotos([]);return;}
      fetch(`https://api.inaturalist.org/v1/taxa?q=${encodeURIComponent(q)}&rank=species&per_page=1`)
        .then(r=>r.json()).then(d=>{
          const imgs=(d.results?.[0]?.taxon_photos||[]).slice(0,6).map(tp=>({thumb:(tp.photo?.url||""),medium:(tp.photo?.url||"").replace("square","medium"),credit:(tp.photo?.attribution||"").replace(/\(c\)/g,"©")})).filter(p=>p.medium?.includes("http"));
          if(!imgs.length&&fallbackImage)imgs.push({thumb:fallbackImage,medium:fallbackImage,credit:""});
          setPhotos(imgs);setIdx(0);
        }).catch(()=>setPhotos(fallbackImage?[{thumb:fallbackImage,medium:fallbackImage,credit:""}]:[]));
    },[latin]);
    if(photos===null)return <div style={{width:200,height:160,borderRadius:10,background:"#f0ede4",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:11,color:"#aaa",fontStyle:"italic"}}>Loading photos…</span></div>;
    if(!photos.length)return <PlantImage plant={{image:"",common:latin,category:""}} size={120} radius={10} />;
    const cur=photos[idx];
    return(
      <div style={{flexShrink:0,maxWidth:240}}>
        <img src={cur.medium} alt={latin} onError={e=>{e.target.src=cur.thumb;}} style={{width:"100%",height:180,objectFit:"cover",borderRadius:10,display:"block"}} />
        {photos.length>1&&<div style={{display:"flex",gap:5,marginTop:6,overflowX:"auto"}}>{photos.map((ph,i)=><img key={i} src={ph.thumb} alt="" onClick={()=>setIdx(i)} style={{width:38,height:38,borderRadius:5,objectFit:"cover",flexShrink:0,cursor:"pointer",border:`2px solid ${i===idx?"#2d4a2d":"transparent"}`,opacity:i===idx?1:0.6}} />)}</div>}
        {cur.credit&&<div style={{fontSize:9,color:"#bbb",marginTop:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{cur.credit.length>70?cur.credit.slice(0,70)+"…":cur.credit}</div>}
      </div>
    );
  }

  // ── Plant card ─────────────────────────────────────────────────────────────
  function PlantCard({plant,siteKey}){

    const score=siteKey?getSiteScore(plant,siteKey):null;

      <div className="print-card" style={{background:"white",border:"1px solid #e0ddd5",borderRadius:10,overflow:"hidden",boxShadow:open?"0 4px 16px rgba(0,0,0,0.08)":"none"}}>
        <div onClick={()=>setOpen(!open)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",cursor:"pointer"}}>

          <PlantImage plant={plant} size={48} radius={8} />
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:"bold",fontSize:15}}>{plant.common}</div>
            <div style={{fontSize:12,color:"#888",fontStyle:"italic",marginBottom:3}}>{plant.latin}</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>
              <span style={{background:ss.bg,color:ss.text,fontSize:10,padding:"2px 7px",borderRadius:10,fontWeight:"bold"}}>{ss.label}</span>
              <span style={{background:"#f0ede4",color:"#666",fontSize:10,padding:"2px 7px",borderRadius:10}}>{plant.category}</span>
              {plant.flowerColor&&<ColorDots colorStr={plant.flowerColor} size={9} />}
            </div>
          </div>
          <span className="no-print" style={{color:"#aaa",fontSize:18,flexShrink:0}}>{open?"▲":"▼"}</span>
        </div>
        {open&&(
          <div style={{padding:"0 14px 16px",borderTop:"1px solid #f0ede4"}}>
            <div style={{display:"flex",gap:16,marginTop:12,flexWrap:"wrap"}}>
              <PhotoGallery latin={plant.latin} fallbackImage={plant.image} />
              <div style={{flex:1,minWidth:200}}>
                {plant.notes&&<p style={{margin:"0 0 10px",fontSize:14,lineHeight:1.5,color:"#444"}}>{plant.notes}</p>}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"5px 12px",fontSize:12}}>
                  {plant.sun&&<div><span style={{color:"#888"}}>Sun: </span>{plant.sun}</div>}
                  {plant.moisture&&<div><span style={{color:"#888"}}>Moisture: </span>{plant.moisture}</div>}
                  {plant.heightFt?<div><span style={{color:"#888"}}>Height: </span>{plant.heightFt} ft</div>:plant.height?<div><span style={{color:"#888"}}>Height: </span>{plant.height}</div>:null}
                  {plant.bloom&&plant.bloom!=="N/A"&&<div><span style={{color:"#888"}}>Bloom: </span>{plant.bloom}</div>}
                  {plant.seasonal&&<div><span style={{color:"#888"}}>Interest: </span>{plant.seasonal}</div>}
                  {plant.role&&<div><span style={{color:"#888"}}>Role: </span>{plant.role}</div>}
                  {plant.deerPressure&&<div><span style={{color:"#888"}}>Deer: </span>{plant.deerPressure}</div>}
                  {plant.rabbitDamage&&<div><span style={{color:"#888"}}>Rabbit: </span>{plant.rabbitDamage}</div>}
                  {plant.flowerColor&&<div style={{display:"flex",alignItems:"center",gap:6}}><span style={{color:"#888"}}>Flower: </span><ColorDots colorStr={plant.flowerColor} size={11} /></div>}
                  {plant.foliageColor&&<div style={{display:"flex",alignItems:"center",gap:6}}><span style={{color:"#888"}}>Foliage: </span><ColorDots colorStr={plant.foliageColor} size={11} /></div>}
                </div>
                <RiskBadges plant={plant} />
              </div>
            </div>
            {siteKey&&ZONE_KEYS.includes(siteKey)&&(
              <div style={{marginTop:14}}>
                <div style={{fontSize:11,letterSpacing:1,textTransform:"uppercase",color:"#aaa",marginBottom:6}}>Suitability across all zones</div>
                <div style={{display:"flex",flexDirection:"column",gap:3}}>
                  {MICROZONES.map(z=>{const s=plant.scores[z.key]||0;return(
                    <div key={z.key} style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{fontSize:11,width:150,color:z.key===siteKey?"#2d4a2d":"#666",fontWeight:z.key===siteKey?"bold":"normal"}}>{z.emoji} {z.label}</div>
                      <div style={{flex:1,height:6,background:"#f0ede4",borderRadius:3,overflow:"hidden"}}><div style={{width:`${(s/5)*100}%`,height:"100%",background:SCORE_COLORS[s],borderRadius:3}} /></div>
                      <div style={{fontSize:10,color:"#aaa",width:50}}>{SCORE_LABELS[s]}</div>
                    </div>
                  );})}
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    );
  }

  // ── Result filters ─────────────────────────────────────────────────────────
  function ResultFilters({plants,siteKey,rf,onChange}){
    const[open,setOpen]=useState(false);
    const flowerColors=useMemo(()=>{const c={};plants.forEach(p=>p.flowerColor.split(/\s*[|]\s*/).forEach(x=>{const t=x.trim().toLowerCase();if(t&&COLOR_MAP[t])c[t]=(c[t]||0)+1;}));return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,12).map(([x])=>x);},[plants]);
    const foliageColors=useMemo(()=>{const c={};plants.forEach(p=>p.foliageColor.split(/\s*[|]\s*/).forEach(x=>{const t=x.trim().toLowerCase();if(t&&COLOR_MAP[t])c[t]=(c[t]||0)+1;}));return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([x])=>x);},[plants]);
    const allCats=useMemo(()=>[...new Set(plants.map(p=>p.category))].sort(),[plants]);
    const activeCount=(rf.rnative?1:0)+(rf.rwinter?1:0)+(rf.rscore>3?1:0)+(rf.rcats?.length||0)+(rf.rflower?.length||0)+(rf.rfoliage?.length||0);

    const ColorRow=({colors,selected,onToggle,label})=>(
      <div style={{marginBottom:12}}>
        <div style={{fontSize:11,color:"#aaa",letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>{label}</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
          {colors.map(c=>{const sel=selected?.includes(c);return(
            <button key={c} onClick={()=>onToggle(c)} title={c} style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:20,border:`1px solid ${sel?"#2d4a2d":"#ddd"}`,background:sel?"#f0faf0":"white",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>
              <div style={{width:11,height:11,borderRadius:"50%",flexShrink:0,background:COLOR_MAP[c]||"#ccc",border:c==="white"?"1px solid #ccc":"none"}} />{c}
            </button>
          );})}
        </div>
      </div>
    );

    return(
      <div className="no-print" style={{background:"white",border:"1px solid #e0ddd5",borderRadius:10,marginBottom:12,overflow:"hidden"}}>
        <div onClick={()=>setOpen(!open)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",cursor:"pointer"}}>
          <span style={{fontSize:13,fontWeight:"bold",color:"#555"}}>Refine results{activeCount>0&&<span style={{background:"#2d4a2d",color:"white",borderRadius:10,padding:"1px 7px",fontSize:11,marginLeft:6}}>{activeCount}</span>}</span>
          <span style={{flex:1}} />
          {activeCount>0&&<button onClick={e=>{e.stopPropagation();onChange({rnative:false,rscore:3,rcats:[],rflower:[],rfoliage:[],rwinter:false});}} style={{fontSize:11,color:"#e57373",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>Clear all</button>}
          <span style={{color:"#aaa",fontSize:14}}>{open?"▲":"▼"}</span>
        </div>
        {open&&(
          <div style={{padding:"0 14px 14px",borderTop:"1px solid #f0ede4"}}>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:12,marginBottom:14}}>
              {[{key:"rnative",label:"Natives only"},{key:"rwinter",label:"❄️ Winter interest"}].map(({key,label})=>(
                <button key={key} onClick={()=>onChange({...rf,[key]:!rf[key]})} style={{padding:"5px 13px",borderRadius:20,border:"1px solid",cursor:"pointer",fontSize:12,fontFamily:"inherit",background:rf[key]?"#2d4a2d":"transparent",color:rf[key]?"white":"#555",borderColor:rf[key]?"#2d4a2d":"#ccc"}}>{label}</button>
              ))}
            </div>
            {siteKey&&(
              <div style={{marginBottom:14}}>
                <div style={{fontSize:11,color:"#aaa",letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Suitability for conditions</div>
                <div style={{display:"flex",gap:6}}>
                  {[3,4,5].map(s=><button key={s} onClick={()=>onChange({...rf,rscore:s})} style={{padding:"4px 12px",borderRadius:6,border:"none",cursor:"pointer",fontSize:12,fontFamily:"inherit",background:rf.rscore===s?SCORE_COLORS[s]:"#f0ede4",color:rf.rscore===s?(s>=4?"white":"#333"):"#555",fontWeight:rf.rscore===s?"bold":"normal"}}>{SCORE_LABELS[s]}</button>)}
                </div>
              </div>
            )}
            <ColorRow colors={flowerColors} selected={rf.rflower} label="Flower color" onToggle={c=>onChange({...rf,rflower:rf.rflower?.includes(c)?rf.rflower.filter(x=>x!==c):[...(rf.rflower||[]),c]})} />
            <ColorRow colors={foliageColors} selected={rf.rfoliage} label="Foliage color" onToggle={c=>onChange({...rf,rfoliage:rf.rfoliage?.includes(c)?rf.rfoliage.filter(x=>x!==c):[...(rf.rfoliage||[]),c]})} />
            <div>
              <div style={{fontSize:11,color:"#aaa",letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>Plant type</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {allCats.map(cat=><button key={cat} onClick={()=>onChange({...rf,rcats:rf.rcats?.includes(cat)?rf.rcats.filter(x=>x!==cat):[...(rf.rcats||[]),cat]})} style={{padding:"3px 10px",borderRadius:20,border:"1px solid",cursor:"pointer",fontSize:11,fontFamily:"inherit",background:rf.rcats?.includes(cat)?"#2d4a2d":"transparent",color:rf.rcats?.includes(cat)?"white":"#555",borderColor:rf.rcats?.includes(cat)?"#2d4a2d":"#ccc"}}>{cat}</button>)}
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ── Share bar ──────────────────────────────────────────────────────────────
  function ShareBar({urlState,onLabelChange}){
    const[copied,setCopied]=useState(false);const[editing,setEditing]=useState(false);const[val,setVal]=useState(urlState.label||"");
    const copy=()=>navigator.clipboard.writeText(window.location.href).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
    const save=()=>{onLabelChange(val.trim());setEditing(false);};
    return(
      <div className="no-print" style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",background:"white",border:"1px solid #e0ddd5",borderRadius:10,padding:"10px 14px",marginBottom:12}}>
        {editing?(
          <><input autoFocus value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")save();if(e.key==="Escape")setEditing(false);}} placeholder="e.g. Johnson Residence" style={{flex:1,minWidth:160,border:"1px solid #ddd",borderRadius:6,padding:"5px 10px",fontSize:13,fontFamily:"inherit",outline:"none"}} />
          <button onClick={save} style={{background:"#2d4a2d",color:"white",border:"none",borderRadius:6,padding:"5px 14px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Save</button>
          <button onClick={()=>setEditing(false)} style={{background:"#f0ede4",color:"#555",border:"none",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Cancel</button></>
        ):(
          <><button onClick={()=>setEditing(true)} style={{background:"#f0ede4",color:"#555",border:"none",borderRadius:6,padding:"6px 13px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>{urlState.label?`✏️ ${urlState.label}`:"📋 Name this palette"}</button>
          <button onClick={copy} style={{background:copied?"#e8f5e9":"#f0ede4",color:copied?"#2e7d32":"#555",border:"none",borderRadius:6,padding:"6px 13px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>{copied?"✓ Link copied!":"🔗 Copy shareable link"}</button>
          <button onClick={()=>window.print()} style={{background:"#f0ede4",color:"#555",border:"none",borderRadius:6,padding:"6px 13px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>🖨️ Print / save PDF</button></>
        )}
      </div>
    );
  }

  // ── Browse mode ────────────────────────────────────────────────────────────
  function BrowseMode({plants,urlState,onURLChange}){
    const[search,setSearch]=useState(urlState.bsearch||"");
    const[zone,setZone]=useState(urlState.bzone||null);
    const[showZones,setShowZones]=useState(false);
    const[rf,setRf]=useState({rnative:urlState.rnative,rscore:urlState.rscore||3,rcats:urlState.rcats||[],rflower:urlState.rflower||[],rfoliage:urlState.rfoliage||[],rwinter:urlState.rwinter});
    useEffect(()=>{onURLChange({bzone:zone,bsearch:search,...rf});},[zone,search,rf]);
    const base=useMemo(()=>plants.filter(p=>{if(zone&&getSiteScore(p,zone)<1)return false;if(search){const q=search.toLowerCase();if(!p.common.toLowerCase().includes(q)&&!p.latin.toLowerCase().includes(q))return false;}return true;}),[plants,zone,search]);
    const results=useMemo(()=>applyResultFilters(base,zone,rf).sort((a,b)=>{if(zone){const d=getSiteScore(b,zone)-getSiteScore(a,zone);if(d!==0)return d;}return a.common.localeCompare(b.common);}),[base,zone,rf]);
    const zoneInfo=zone?ALL_WIZARD_SITES.find(z=>z.key===zone):null;
    return(
      <div>
        <div style={{padding:"20px 0 10px"}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={`Search ${plants.length} plants by name…`} style={{width:"100%",border:"1px solid #ddd",borderRadius:8,padding:"11px 16px",fontSize:15,fontFamily:"inherit",background:"white",outline:"none"}} />
        </div>
        <div className="no-print" style={{background:"white",border:"1px solid #e0ddd5",borderRadius:10,padding:"10px 14px",marginBottom:10,display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}}>
          <button onClick={()=>setShowZones(!showZones)} style={{background:zone?"#2d4a2d":showZones?"#2d4a2d":"#f0ede4",color:zone||showZones?"white":"#555",border:"none",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>
            {zone?`📍 ${zoneInfo?.label||zone}`:(showZones?"▲ Site type":"▼ Site type")}
          </button>
          {zone&&<button onClick={()=>setZone(null)} style={{fontSize:11,color:"#aaa",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>✕ clear</button>}
        </div>
        {showZones&&(
          <div className="no-print" style={{background:"white",border:"1px solid #e0ddd5",borderRadius:10,padding:"14px",marginBottom:10}}>
            <div style={{fontSize:12,color:"#888",marginBottom:10,fontStyle:"italic"}}>Choose a site type to sort plants by how well they fit.</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(170px, 1fr))",gap:8}}>
              {ALL_WIZARD_SITES.map(z=>(
                <button key={z.key} onClick={()=>{setZone(z.key);setShowZones(false);}} style={{background:zone===z.key?"#2d4a2d":"#fafaf7",color:zone===z.key?"white":"#2c2c2c",border:`2px solid ${zone===z.key?"#2d4a2d":"#e0ddd5"}`,borderRadius:8,padding:"10px 12px",cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>
                  <div style={{fontSize:18,marginBottom:2}}>{z.emoji}</div>
                  <div style={{fontWeight:"bold",fontSize:12,marginBottom:2}}>{z.label}</div>
                  <div style={{fontSize:10,opacity:0.65,lineHeight:1.4}}>{z.desc}</div>
                </button>
              ))}
            </div>
          </div>
        )}
        <ResultFilters plants={base} siteKey={zone} rf={rf} onChange={setRf} />
        <div style={{fontSize:13,color:"#888",marginBottom:12,fontStyle:"italic"}}>{results.length} plant{results.length!==1?"s":""}{zone?` rated for ${zoneInfo?.label||zone}`:" in database"}</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {results.map(p=><PlantCard key={p.latin} plant={p} siteKey={zone} />)}
          {results.length===0&&<div style={{textAlign:"center",padding:40,color:"#aaa",fontStyle:"italic"}}>No plants match — try adjusting your filters.</div>}
        </div>
      </div>
    );
  }

  // ── Wizard mode ────────────────────────────────────────────────────────────
  function WizardMode({plants,urlState,onURLChange}){
    const init={site:urlState.wsite||null,sun:urlState.wsun||null,moisture:urlState.wmoisture||null,size:urlState.wsize||null,concerns:urlState.wconcerns||[]};
    const[step,setStep]=useState(urlState.wdone?WIZARD_STEPS.length:0);
    const[answers,setAnswers]=useState(init);
    const[done,setDone]=useState(urlState.wdone||false);
    const[editing,setEditing]=useState(null);
    const[rf,setRf]=useState({rnative:urlState.rnative,rscore:urlState.rscore||3,rcats:urlState.rcats||[],rflower:urlState.rflower||[],rfoliage:urlState.rfoliage||[],rwinter:urlState.rwinter});
    useEffect(()=>{onURLChange({wsite:answers.site,wsun:answers.sun,wmoisture:answers.moisture,wsize:answers.size,wconcerns:answers.concerns,wdone:done,...rf});},[answers,done,rf]);
    const current=WIZARD_STEPS[step];
    const advance=()=>{if(editing){setEditing(null);return;}if(step<WIZARD_STEPS.length-1)setStep(s=>s+1);else setDone(true);};
    const select=(sid,value,stype)=>{
      if(stype==="single"){setAnswers(prev=>({...prev,[sid]:value}));if(editing===sid){setEditing(null);return;}setTimeout(advance,180);}
      else setAnswers(prev=>{const ex=prev[sid]||[];return{...prev,[sid]:ex.includes(value)?ex.filter(v=>v!==value):[...ex,value]};});
    };
    const reset=()=>{setStep(0);setAnswers({site:null,sun:null,moisture:null,size:null,concerns:[]});setDone(false);setEditing(null);setRf({rnative:false,rscore:3,rcats:[],rflower:[],rfoliage:[],rwinter:false});};
    const wizardResults=useMemo(()=>{if(!done)return[];return applyWizardFilters(plants,answers).sort((a,b)=>{if(answers.site){const d=getSiteScore(b,answers.site)-getSiteScore(a,answers.site);if(d!==0)return d;}return a.common.localeCompare(b.common);});},[done,plants,answers]);
    const filteredResults=useMemo(()=>applyResultFilters(wizardResults,answers.site,rf),[wizardResults,answers.site,rf]);

    function InlineEdit({stepId}){
      const sd=WIZARD_STEPS.find(s=>s.id===stepId);if(!sd)return null;
      return(
        <div style={{background:"#f9faf7",border:"1px solid #c8e6c9",borderRadius:12,padding:"16px",marginBottom:16}}>
          <div style={{fontWeight:"bold",fontSize:15,marginBottom:10,color:"#2d4a2d"}}>{sd.question}</div>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {sd.options.map(opt=>{
              const sel=sd.type==="single"?answers[stepId]===opt.value:(answers[stepId]||[]).includes(opt.value);
              return(
                <button key={opt.value} onClick={()=>select(stepId,opt.value,sd.type)} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:10,border:`2px solid ${sel?"#2d4a2d":"#e0ddd5"}`,background:sel?"#f0faf0":"white",cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>
                  <span style={{fontSize:20,flexShrink:0}}>{opt.emoji}</span>
                  <div style={{flex:1}}><div style={{fontWeight:"bold",fontSize:14,color:sel?"#2d4a2d":"#2c2c2c"}}>{opt.label}</div>{opt.desc&&<div style={{fontSize:11,color:"#888",marginTop:1}}>{opt.desc}</div>}</div>
                  {sd.type==="multi"&&<div style={{width:20,height:20,borderRadius:4,flexShrink:0,border:`2px solid ${sel?"#2d4a2d":"#ccc"}`,background:sel?"#2d4a2d":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{sel&&<span style={{color:"white",fontSize:12}}>✓</span>}</div>}
                </button>
              );
            })}
          </div>
          <button onClick={()=>setEditing(null)} style={{marginTop:12,fontSize:12,color:"#2d4a2d",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>✓ Done</button>
        </div>
      );
    }

    if(done)return(
      <div>
        <div style={{padding:"20px 0 14px",display:"flex",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
          <div style={{flex:1}}><div style={{fontWeight:"bold",fontSize:20,color:"#2d4a2d"}}>Your plant palette</div><div style={{fontSize:13,color:"#888",marginTop:3}}>{filteredResults.length} of {wizardResults.length} plants shown</div></div>
          <button onClick={reset} className="no-print" style={{background:"#f0ede4",border:"none",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontSize:13,fontFamily:"inherit",color:"#555"}}>↩ Start over</button>
        </div>
        <div className="no-print" style={{background:"#f0faf0",border:"1px solid #c8e6c9",borderRadius:10,padding:"12px 14px",marginBottom:12}}>
          <div style={{fontSize:11,color:"#777",marginBottom:8}}>Tap any selection below to change it — results update instantly.</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:editing?12:0}}>
            {WIZARD_STEPS.map(step=>{
              const ans=answers[step.id];if(!ans||(Array.isArray(ans)&&!ans.length))return null;
              const opts=Array.isArray(ans)?ans.map(v=>step.options.find(o=>o.value===v)).filter(Boolean):[step.options.find(o=>o.value===ans)].filter(Boolean);
              return opts.map((opt,i)=>(
                <button key={step.id+i} onClick={()=>setEditing(editing===step.id?null:step.id)} style={{display:"flex",alignItems:"center",gap:5,padding:"5px 12px",borderRadius:20,border:`1px solid ${editing===step.id?"#2d4a2d":"#c8e6c9"}`,background:editing===step.id?"#2d4a2d":"#e8f5e9",cursor:"pointer",fontSize:12,fontFamily:"inherit",color:editing===step.id?"white":"#2e7d32"}}>
                  <span>{opt.emoji}</span><span style={{fontWeight:"bold"}}>{opt.label}</span><span style={{fontSize:10,opacity:0.6}}>✏️</span>
                </button>
              ));
            })}
          </div>
          {editing&&<InlineEdit stepId={editing} />}
        </div>
        <ResultFilters plants={wizardResults} siteKey={answers.site} rf={rf} onChange={setRf} />
        {filteredResults.length===0?(
          <div style={{textAlign:"center",padding:"40px 20px",color:"#888"}}>
            <div style={{fontSize:36,marginBottom:12}}>🤔</div>
            <div style={{fontStyle:"italic",marginBottom:16}}>No plants matched all criteria. Try loosening a filter.</div>
            <button onClick={reset} style={{background:"#2d4a2d",color:"white",border:"none",borderRadius:8,padding:"10px 22px",cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>Start over</button>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>{filteredResults.map(p=><PlantCard key={p.latin} plant={p} siteKey={answers.site} />)}</div>
        )}
      </div>
    );

    return(
      <div style={{paddingTop:24}}>
        <div style={{display:"flex",gap:4,marginBottom:28}}>
          {WIZARD_STEPS.map((_,i)=><div key={i} style={{flex:1,height:3,borderRadius:2,background:i<=step?"#2d4a2d":"#e0ddd5",cursor:i<step?"pointer":"default"}} onClick={()=>{if(i<step)setStep(i);}} />)}
        </div>
        <div style={{marginBottom:22}}>
          <div style={{fontSize:21,fontWeight:"bold",color:"#2c2c2c",lineHeight:1.3,marginBottom:5}}>{current.question}</div>
          {current.subtext&&<div style={{fontSize:13,color:"#999",fontStyle:"italic"}}>{current.subtext}</div>}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:9}}>
          {current.options.map(opt=>{
            const sel=current.type==="single"?answers[current.id]===opt.value:(answers[current.id]||[]).includes(opt.value);
            return(
              <button key={opt.value} onClick={()=>select(current.id,opt.value,current.type)} style={{display:"flex",alignItems:"center",gap:14,padding:"13px 16px",borderRadius:12,border:`2px solid ${sel?"#2d4a2d":"#e0ddd5"}`,background:sel?"#f0faf0":"white",cursor:"pointer",textAlign:"left",transition:"all 0.15s",fontFamily:"inherit"}}>
                <span style={{fontSize:24,flexShrink:0,width:32,textAlign:"center"}}>{opt.emoji}</span>
                <div style={{flex:1}}><div style={{fontWeight:"bold",fontSize:15,color:sel?"#2d4a2d":"#2c2c2c"}}>{opt.label}</div>{opt.desc&&<div style={{fontSize:12,color:"#888",marginTop:2}}>{opt.desc}</div>}</div>
                {current.type==="multi"&&<div style={{width:22,height:22,borderRadius:5,flexShrink:0,border:`2px solid ${sel?"#2d4a2d":"#ccc"}`,background:sel?"#2d4a2d":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{sel&&<span style={{color:"white",fontSize:13}}>✓</span>}</div>}
              </button>
            );
          })}
        </div>
        <div style={{display:"flex",gap:10,marginTop:20,alignItems:"center"}}>
          {step>0&&<button onClick={()=>setStep(s=>s-1)} style={{background:"#f0ede4",border:"none",borderRadius:8,padding:"10px 18px",cursor:"pointer",fontSize:13,fontFamily:"inherit",color:"#555"}}>← Back</button>}
          <div style={{flex:1}} />
          {current.type==="multi"&&<button onClick={advance} style={{background:"#2d4a2d",color:"white",border:"none",borderRadius:8,padding:"10px 24px",cursor:"pointer",fontSize:14,fontFamily:"inherit",fontWeight:"bold"}}>{step===WIZARD_STEPS.length-1?"See my plants →":"Next →"}</button>}
          {current.skippable&&<button onClick={advance} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,fontFamily:"inherit",color:"#bbb"}}>Skip →</button>}
        </div>
      </div>
    );
  }

  // ── Habitat Builder ────────────────────────────────────────────────────────
  function HabitatMode({plants,urlState,onURLChange}){
    const[height,setHeight]=useState(urlState.hheight||"any");
    const[sun,setSun]=useState(urlState.hsun||null);
    const[moisture,setMoisture]=useState(urlState.hmoisture||null);
    const[nearNat,setNearNat]=useState(urlState.hnearnat||false);
    const[wpine,setWpine]=useState(urlState.hwpine||false);
    const[norway,setNorway]=useState(urlState.hnorway||false);
    useEffect(()=>{onURLChange({hheight:height,hsun:sun,hmoisture:moisture,hnearnat:nearNat,hwpine:wpine,hnorway:norway});},[height,sun,moisture,nearNat,wpine,norway]);

    const results=useMemo(()=>{
      return plants.filter(p=>{
        if(!nearNat&&!p.status.startsWith("Native"))return false;
        if(nearNat&&!p.status.startsWith("Native")&&p.status!=="Near-Native"&&p.status!=="Near Native")return false;
        if(wpine&&(p.whitePine==="avoid"||!p.whitePine))return false;
        if(norway&&(p.norwayMaple==="avoid"||!p.norwayMaple))return false;
        const hft=p.heightFt||0;
        if(height==="8"&&hft>8)return false;
        if(height==="25"&&hft>25)return false;
        if(sun){const s=(p.sun||"").toLowerCase();if(sun==="full"&&!s.startsWith("full sun"))return false;if(sun==="shade"&&!s.includes("shade"))return false;if(sun==="part"&&!s.includes("part"))return false;}
        if(moisture){const m=(p.moisture||"").toLowerCase();if(moisture==="dry"&&!m.includes("dry")&&m!=="mesic")return false;if(moisture==="moist"&&!m.includes("moist")&&!m.includes("wet"))return false;if(moisture==="mesic"&&!m.includes("mesic"))return false;}
        return true;
      }).sort((a,b)=>a.common.localeCompare(b.common));
    },[plants,height,sun,moisture,nearNat,wpine,norway]);

    const woody=results.filter(p=>p.isWoody);
    const herby=results.filter(p=>!p.isWoody);

    const Tog=({value,current,onChange,label,emoji,desc})=>{
      const active=current===value;
      return(
        <button onClick={()=>onChange(active?null:value)} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",borderRadius:8,border:`2px solid ${active?"#2d4a2d":"#e0ddd5"}`,background:active?"#2d4a2d":"white",color:active?"white":"#555",cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:active?"bold":"normal",textAlign:"left"}}>
          {emoji&&<span style={{fontSize:16}}>{emoji}</span>}
          <div><div>{label}</div>{desc&&<div style={{fontSize:10,opacity:0.7,fontWeight:"normal"}}>{desc}</div>}</div>
        </button>
      );
    };

    const Chk=({value,onChange,label,emoji,desc})=>(
      <button onClick={()=>onChange(!value)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:8,border:`2px solid ${value?"#2d4a2d":"#e0ddd5"}`,background:value?"#f0faf0":"white",cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>
        <span style={{fontSize:20}}>{emoji}</span>
        <div style={{flex:1}}><div style={{fontWeight:"bold",fontSize:13,color:value?"#2d4a2d":"#2c2c2c"}}>{label}</div>{desc&&<div style={{fontSize:11,color:"#888"}}>{desc}</div>}</div>
        <div style={{width:20,height:20,borderRadius:4,flexShrink:0,border:`2px solid ${value?"#2d4a2d":"#ccc"}`,background:value?"#2d4a2d":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{value&&<span style={{color:"white",fontSize:11}}>✓</span>}</div>
      </button>
    );

    function Group({title,emoji,group}){
      if(!group.length)return <div style={{background:"white",border:"1px solid #e0ddd5",borderRadius:10,padding:"20px",textAlign:"center",marginBottom:16}}><div style={{fontSize:13,color:"#aaa",fontStyle:"italic"}}>No {title.toLowerCase()} match these conditions.</div></div>;
      return(
        <div style={{marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <span style={{fontSize:20}}>{emoji}</span>
            <span style={{fontWeight:"bold",fontSize:16,color:"#2d4a2d"}}>{title}</span>
            <span style={{fontSize:13,color:"#888",background:"#f0ede4",borderRadius:20,padding:"1px 10px"}}>{group.length}</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>{group.map(p=><PlantCard key={p.latin} plant={p} siteKey={null} />)}</div>
        </div>
      );
    }

    return(
      <div style={{paddingTop:20}}>
        <div style={{background:"#f0faf0",border:"1px solid #c8e6c9",borderRadius:10,padding:"14px 16px",marginBottom:20}}>
          <div style={{fontWeight:"bold",fontSize:15,color:"#2d4a2d",marginBottom:4}}>Native Habitat Builder</div>
          <div style={{fontSize:13,color:"#555",lineHeight:1.6}}>Native plants for ecological habitat patches in the Lexington area. A typical patch mixes roughly equal parts woody and herbaceous plants. Use the filters below to match your site.</div>
        </div>

        <div style={{background:"white",border:"1px solid #e0ddd5",borderRadius:10,padding:"16px",marginBottom:16}}>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:"#aaa",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Max height</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <Tog value="8"   current={height} onChange={v=>setHeight(v||"any")} label="Under 8 ft"  emoji="🌼" />
              <Tog value="25"  current={height} onChange={v=>setHeight(v||"any")} label="Under 25 ft" emoji="🌳" />
              <Tog value="any" current={height} onChange={v=>setHeight(v||"any")} label="No limit"    emoji="✨" />
            </div>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:"#aaa",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Sun</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <Tog value="full"  current={sun} onChange={setSun} label="Full sun"   emoji="☀️" />
              <Tog value="part"  current={sun} onChange={setSun} label="Part shade" emoji="⛅" />
              <Tog value="shade" current={sun} onChange={setSun} label="Shade"      emoji="🌥️" />
            </div>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:"#aaa",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Moisture</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <Tog value="dry"   current={moisture} onChange={setMoisture} label="Dry"     emoji="🏜️" />
              <Tog value="mesic" current={moisture} onChange={setMoisture} label="Average" emoji="🌱" />
              <Tog value="moist" current={moisture} onChange={setMoisture} label="Moist"   emoji="💧" />
            </div>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:"#aaa",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Challenging conditions</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <Chk value={wpine}  onChange={setWpine}  emoji="🌲" label="Under white pines" desc="Dry, acidic, needle-carpeted" />
              <Chk value={norway} onChange={setNorway} emoji="🍁" label="Under Norway maple" desc="Allelopathic dry shade" />
            </div>
          </div>
          <div>
            <div style={{fontSize:11,color:"#aaa",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Status</div>
            <Chk value={nearNat} onChange={setNearNat} emoji="🌿" label="Include near-native species" desc="Native to eastern North America but not necessarily Massachusetts" />
          </div>
        </div>

        {(wpine||norway)&&(
          <div style={{background:"#fff8e1",border:"1px solid #ffe082",borderRadius:8,padding:"8px 14px",marginBottom:14,fontSize:12,color:"#5d4037"}}>
            Showing plants that tolerate: {[wpine&&"white pine understory",norway&&"Norway maple shade"].filter(Boolean).join(" and ")}
          </div>
        )}

        <div style={{fontSize:13,color:"#888",marginBottom:16,fontStyle:"italic"}}>
          {results.length} native plants match · {woody.length} woody · {herby.length} herbaceous
        </div>

        <Group title="Woody plants"      emoji="🌳" group={woody} />
        <Group title="Herbaceous plants" emoji="🌿" group={herby} />
      </div>
    );
  }

  // ── Root ───────────────────────────────────────────────────────────────────
  function App(){
    const[plants,setPlants]=useState([]);const[loading,setLoading]=useState(true);const[error,setError]=useState(null);
    const[urlState,setURLState]=useState(readURL);
    const setMode=mode=>{const next={...urlState,mode};setURLState(next);pushURL(next);};
    const handleURLChange=useCallback(partial=>{setURLState(prev=>{const next={...prev,...partial};pushURL(next);return next;});},[]);
    const handleLabelChange=useCallback(label=>{setURLState(prev=>{const next={...prev,label};pushURL(next);return next;});},[]);
    useEffect(()=>{fetch(SHEET_CSV_URL).then(r=>{if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.text();}).then(text=>{setPlants(parseCSV(text).map(rowToPlant).filter(Boolean));setLoading(false);}).catch(err=>{setError(err.message);setLoading(false);});},[]);
    const showShare=!loading&&!error&&(urlState.mode==="browse"||urlState.wdone);
    return(
      <div style={{fontFamily:"Georgia, serif",background:"#fafaf7",minHeight:"100vh",color:"#2c2c2c"}}>
        <div style={{background:"#2d4a2d",color:"#f0ede4",padding:"24px 24px 0",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:0,right:0,width:200,height:200,background:"rgba(255,255,255,0.03)",borderRadius:"0 0 0 100%"}} />
          <div style={{maxWidth:840,margin:"0 auto"}}>
            {urlState.label&&<div className="no-print" style={{fontSize:12,background:"rgba(255,255,255,0.12)",display:"inline-block",borderRadius:20,padding:"2px 12px",marginBottom:8,color:"#c8e6c9"}}>📋 {urlState.label}</div>}
            <div style={{fontSize:11,letterSpacing:3,textTransform:"uppercase",opacity:0.55,marginBottom:5}}>Summers Gardening</div>
            <h1 style={{margin:0,fontSize:26,fontWeight:"normal",letterSpacing:"-0.5px"}}>Plant Palette Finder</h1>
            <p style={{margin:"6px 0 22px",opacity:0.65,fontSize:14,fontStyle:"italic"}}>Match your site conditions to the right plants</p>
            <div className="no-print" style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {[{key:"browse",label:"Browse all plants"},{key:"wizard",label:"Get a plant palette ✨"},{key:"habitat",label:"Native Habitat Builder 🌿"}].map(tab=>(
                <button key={tab.key} onClick={()=>setMode(tab.key)} style={{padding:"10px 18px",border:"none",cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:"bold",borderRadius:"8px 8px 0 0",background:urlState.mode===tab.key?"#fafaf7":"rgba(255,255,255,0.1)",color:urlState.mode===tab.key?"#2d4a2d":"rgba(240,237,228,0.75)",transition:"all 0.2s"}}>{tab.label}</button>
              ))}
            </div>
          </div>
        </div>
        <div style={{maxWidth:840,margin:"0 auto",padding:"0 16px 60px"}}>
          {showShare&&<div style={{marginTop:16}}><ShareBar urlState={urlState} onLabelChange={handleLabelChange} /></div>}
          {loading&&<div style={{textAlign:"center",padding:"60px 20px",color:"#888"}}><div style={{fontSize:36,marginBottom:12}}>🌱</div><div style={{fontStyle:"italic"}}>Loading plant data…</div></div>}
          {error&&<div style={{textAlign:"center",padding:"60px 20px"}}><div style={{fontSize:36,marginBottom:12}}>⚠️</div><div style={{fontWeight:"bold",color:"#b71c1c",marginBottom:8}}>Could not load plant data</div><div style={{fontSize:12,color:"#888",maxWidth:400,margin:"0 auto"}}>Make sure the Google Sheet is published as CSV. Error: {error}</div></div>}
          {!loading&&!error&&urlState.mode==="browse"&&<BrowseMode plants={plants} urlState={urlState} onURLChange={handleURLChange} />}
          {!loading&&!error&&urlState.mode==="wizard"&&<WizardMode plants={plants} urlState={urlState} onURLChange={handleURLChange} />}
          {!loading&&!error&&urlState.mode==="habitat"&&<HabitatMode plants={plants} urlState={urlState} onURLChange={handleURLChange} />}
        </div>
        <div style={{textAlign:"center",padding:16,color:"#aaa",fontSize:11,borderTop:"1px solid #e0ddd5"}}>
          <a href="https://www.summersgardening.com" target="_blank" rel="noopener noreferrer" style={{color:"#2d4a2d",textDecoration:"none"}}>summersgardening.com</a>
          {" · "}Plant data by Rachel Summers · Photos via iNaturalist (CC BY-NC)
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
